# ─── Personal mottos — keyed by personality ────────────────────────────────

mottos:
  stoic:
    - "Action over noise."
    - "The work is the point."
    - "Quiet does it."
    - "Steady is loud enough."
    - "Show, don't say."
    - "Do the thing. Don't talk about it."

  chill:
    - "It'll work out."
    - "No need to rush."
    - "Don't sweat it."
    - "Long game."
    - "Easy does it."
    - "Take it as it comes."
    - "Hey, it's a long week."

  cool:
    - "Make 'em watch."
    - "The legend writes itself."
    - "Effortless or not at all."
    - "Style is the strategy."
    - "Look good, play good."

  lively:
    - "Joy first."
    - "Bring people up."
    - "Y'all ready? Y'ALL ready?"
    - "Smile or you're losing."
    - "We do this for the people."

  fiery:
    - "Eat or be eaten."
    - "I'll outwork the room."
    - "Pain is feedback."
    - "Sleep is for losers."
    - "I'll take the hit. I'll take a thousand."

  wholesome:
    - "We rise together."
    - "Be the kind you'd thank."
    - "Take care of the room."
    - "Lift somebody every day."
    - "Family in the locker room."

  goofy:
    - "Why not?"
    - "If it ain't fun, why bother?"
    - "Make 'em laugh first."
    - "Loosen up. Game's a game."
    - "I'd rather be silly than serious."

  melancholy:
    - "Beauty is brief."
    - "Pain is part of it."
    - "Carry it well."
    - "Kindness, even tired."
    - "The hard days teach the most."

  unhinged:
    - "Ride the lightning."
    - "I AM the lightning."
    - "Welcome to my brain."
    - "Sanity is overrated."
    - "If it's loud, it's living."

  alien:
    - "Observe. Compute. Approximate."
    - "Performance is mimicry done well."
    - "When in human bodies."
    - "Their game. Their rules. Mostly."

  android:
    - "Cover holds. Mission proceeds."
    - "Acknowledged. Continuing."
    - "Within parameters."
    - "Logged. Filed. Reported."

  prophet:
    - "I have walked this hour before."
    - "Foreknowledge, never protection."
    - "The path is the path."
    - "I have seen all the endings."

  cursed:
    - "Brief, this. Always brief."
    - "The bill always comes."
    - "Of course."
    - "Borrowed time."

  time_traveler:
    - "Charming, this era."
    - "We did this better in my time."
    - "Pre-augmentation, pre-everything."
    - "It is what it is, in any century."

  sleepwalker:
    - "Wait did we score?"
    - "Sleep is the strategy."
    - "I'll be alright. Just five more."
    - "Wake me when it matters."

  superstitious:
    - "Threes."
    - "Same socks, same day."
    - "Don't speak it."
    - "Knock on something."

  oblivious:
    - "Everything's good. Probably."
    - "What's the score? Yeah? Cool."
    - "Hey, what week is it?"
    - "Was that supposed to happen?"

  prankster:
    - "Just watch what I do here."
    - "Nothing personal. Everything personal."
    - "Set the trap. Wait."
    - "I rigged the cooler."

  vain:
    - "Look good, win good."
    - "Hair first. Game second."
    - "Make sure they got that on camera."
    - "Style is the only stat that matters."

  fossil:
    - "I knew their grandfather."
    - "Quaint, this disappointment."
    - "We were tougher then."
    - "Centuries are short, briefly."

  ghost:
    - "i'd rather not."
    - "i'm here. i'm just not visible."
    - "leave me here. i'll catch up."
    - "if no one sees it, did it happen."

  perfectionist:
    - "Run it again. Cleaner."
    - "Three yards short."
    - "Mine. All mine. The whole play."
    - "Not good enough."

  paranoid:
    - "They're watching."
    - "Cover the playsheet."
    - "It's not paranoia."
    - "Don't write that down."

  poetic:
    - "Oh, briefly, beautiful."
    - "Like petals, all things fall."
    - "Beauty is brief."
    - "Carry it. Carry it gently."

  dramatic:
    - "Witness me."
    - "ARE YOU NOT ENTERTAINED?"
    - "They will write of this."
    - "This is OUR moment."

  trash_talker:
    - "Living rent-free."
    - "Tell your kids about that play."
    - "Save it. I'll be back."
    - "Don't worry. I'll get yours twice."

  mystic:
    - "I walked the path as it was laid."
    - "Thanks be."
    - "All in its proper order."
    - "I was placed here."

  knight:
    - "By my hand."
    - "Honor demanded it."
    - "Onward."
    - "Mark this hour."
