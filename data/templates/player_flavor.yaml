# Player flavor data — assigned once at player creation, never changes.
# Pure character flavor for the player detail page; no gameplay effect.
#
# WORLDBUILDING:
# Floosball is a far-future simulation authored by the Cores — AI entities
# reconstructing human football from patchy, partial transmissions of the
# old human era. The flavor pools should READ as Cores-generated content:
# sometimes plausible, sometimes adjacent-to-correct, sometimes completely
# surreal. No real pop culture, brands, song titles, or actor names — that
# information didn't survive the transmission. Items should feel like an
# AI's earnest guess at human life, often hilariously wrong but always
# committed.
#
# - hometowns: list of strings. Mix of plausible US-coded cities (the Cores
#   recovered atlas pages), real-but-strange town names (which the Cores
#   especially love), and outright cosmic/abstract locations.
# - favorites: map of category → list of items. Items lean weird-but-
#   evocative — never name-dropping a real song/film/show.
# - mottos: map of personality → list of mottos. These match the
#   personality voice from vibe_reactions.yaml.
# - personality_favorites: map of personality → category → items. Overrides
#   the base favorites pool for that personality+category. New categories
#   defined here become valid roll options for that personality only.
#   Use to give variants their own flavor (alien doesn't eat diner pancakes).
#
# CANONICAL LORE ANCHORS — reuse these names for continuity:
#   • The Splintering — the territorial break-up that created the freeholds
#   • The Long Quiet — the comms-dark period after / during the Splintering
#   • The Reach — colonized off-Earth territories, organized into sectors
#   • The Freeholds — semi-autonomous post-Splintering territories
#   • The Cracked Years — period of instability between Resets
#   • The Resets — recurring system-wide cycles
#   • Second-spring — recurring seasonal/cyclic event after each Reset
#   • The Boundary — something that occasionally "thins" (cosmic / lit)

