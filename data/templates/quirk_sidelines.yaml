# Layer 2: Quirk Voice - sideline observations
#
# Schema:
#   <quirk_key>:
#     - text: "sentence with {tokens}"
#       demeanor: optional -- restricts line to players with this demeanor
#       weight: optional integer (default 1)
#
# Fires between plays, quarters, timeouts, halftime. NOT tied to game events.
# Third-person observation. Frequency-gated so each player only fires one
# sideline per game at most.
#
# MVP showcase quirks: Tinfoil, Snacker, Wholesome, Showboat, 4th Wall

tinfoil:
  # intense
  - text: "{name} is staring up at the stadium lights. Whatever he's tracking, it isn't on the field."
    demeanor: intense
  - text: "{name} scans the crowd twice, clearly looking for someone specific."
    demeanor: intense
  # melancholy
  - text: "{name} checks under the bench before he sits down. Nobody asks why."
    demeanor: melancholy
  # fiery
  - text: "{name} refuses to take the Gatorade cup. He's been refusing it since warmups."
    demeanor: fiery
  # dramatic
  - text: "{name} mutters something to the water boy and points at the sky."
    demeanor: dramatic
  # untagged
  - text: "{name} is writing something on a notepad on the bench and covering it with his hand."
  - text: "{name} has spent the last two timeouts watching the same section of the crowd."

snacker:
  # stoic
  - text: "{name} is methodically working through a bag of sunflower seeds like it's a job."
    demeanor: stoic
  # cool
  - text: "{name} has an entire orange slice in his mouth and is still trying to talk to the position coach."
    demeanor: cool
  # intense
  - text: "{name} finds a piece of gum under the bench, considers it seriously, then decides against it."
    demeanor: intense
  # melancholy
  - text: "The camera finds {name} eating his second granola bar with the energy of a man who has lost hope."
    demeanor: melancholy
  # fiery
  - text: "{name} is furiously unwrapping an energy bar like it personally wronged him."
    demeanor: fiery
  # dramatic
  - text: "{name} finishes a protein shake, crumples the bottle, and immediately asks for another."
    demeanor: dramatic
  # untagged
  - text: "The camera finds {name} eating what appears to be his third granola bar of the quarter."
  - text: "{name} is explaining something about nutrition to a teammate who clearly did not ask."
  - text: "{name} is stress-eating trail mix on the bench."

wholesome:
  # cool
  - text: "{name} helps a teammate tape their wrist, then pats them on the back twice."
    demeanor: cool
  - text: "{name} is telling the equipment manager how much he appreciates him. Unprompted."
    demeanor: cool
  # intense
  - text: "{name} jogs over to check on a fallen opponent before the refs can even wave the trainer on."
    demeanor: intense
  # melancholy
  - text: "{name} is visibly concerned about the rookie who just got benched. He sits next to him."
    demeanor: melancholy
  # fiery
  - text: "{name} fires up the bench with earnest, heartfelt encouragement. It works."
    demeanor: fiery
  # untagged
  - text: "{name} has his arm around {teammate} and appears to be delivering an inspirational speech."
  - text: "{name} thanks the referee after a call that went against his team."

showboat:
  # cool
  - text: "{name} is practicing a new celebration behind the bench. Nobody is watching. He doesn't care."
    demeanor: cool
  - text: "{name} winks at the sideline reporter on his way past. Twice."
    demeanor: cool
  # intense
  - text: "{name} is visibly counting how many times the broadcast camera finds him."
    demeanor: intense
  # fiery
  - text: "{name} adjusts his gloves with the flair of a man who knows he's being filmed."
    demeanor: fiery
  # dramatic
  - text: "{name} delivers a monologue to the bench that ends with him pointing to himself."
    demeanor: dramatic
  # untagged
  - text: "{name} tosses his towel into the crowd and immediately asks for another."
  - text: "{name} is signing an autograph through the railing. The play resumes without him."

fourth_wall:
  # stoic
  - text: "{name} acknowledges you. Yes, you, reading this."
    demeanor: stoic
  # cool
  - text: "{name} looks directly at the broadcast camera for three full seconds, then winks."
    demeanor: cool
  # intense
  - text: "{name} mouths something at the camera that lip-readers are already arguing about."
    demeanor: intense
  # melancholy
  - text: "{name} sighs at the camera like he knows something we don't."
    demeanor: melancholy
  # fiery
  - text: "{name} points directly at the broadcast camera and shakes his head."
    demeanor: fiery
  # dramatic
  - text: "{name} delivers a long, meaningful look into the lens. The director cuts away fast."
    demeanor: dramatic
  # untagged
  - text: "{name} does finger guns at the broadcast camera and then immediately looks ashamed."
  - text: "{name} mouths 'it's a simulation' at the camera. At least, it looks like that's what he said."
