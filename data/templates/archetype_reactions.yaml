    # intense
    - text: "{name} is already marking the soft spot for the next call."
      demeanor: intense
    # melancholy
    - text: "{name} mutters something about the angle he could have gotten."
      demeanor: melancholy
    # fiery
    # dramatic
  sack_taken:
    # stoic
