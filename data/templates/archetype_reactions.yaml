      demeanor: stoic
    # cool
    - text: "{name} is already adjusting the protection call for next snap."
      demeanor: cool
    # intense
    - text: "{name} pops up sharp and is already arguing with the center about the mike call."
      demeanor: intense
    # melancholy
    - text: "{name} spends the walk back replaying the read in his head."
      demeanor: melancholy
    # fiery
    # dramatic
  int_thrown:
    # stoic
    - text: "{name} walks off silently, already re-running the coverage in his head."
      demeanor: stoic
    # cool
    - text: "{name} walks off already diagnosing what he missed."
      demeanor: cool
    # intense
    - text: "{name} walks off grinding his teeth, re-running the coverage in his head."
      demeanor: intense
    # melancholy
    - text: "{name} sits on the bench staring at the play sheet."
      demeanor: melancholy
    # fiery
    # dramatic
  fumble_lost:
