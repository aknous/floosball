    # stoic
    - text: "{name} quietly diagrams the coverage he just beat in his head."
      demeanor: stoic
    # cool
    - text: "{name} walks off the field reviewing the coverage he just beat with the QB."
      demeanor: cool
    # intense
    - text: "{name} immediately diagrams something in the air to the position coach."
      demeanor: intense
    # melancholy
    # fiery
    # dramatic
    - text: "{name} delivers a lecture to the nearest teammate about the concept he just ran."
      demeanor: dramatic
  third_down_conversion:
