# Layer 1: Archetype Voice - in-play color commentary
#
# Schema:
#   <archetype_key>:
#     <event_key>:
#       - text: "sentence with {tokens}"
#         demeanor: optional -- restricts line to players with this demeanor
#         weight: optional integer (default 1)
#
# Tokens: {name} {oppTeam} {yards} {quarter} {teammate} {defender} {score}
# All lines are third-person observation. Quoted speech is allowed when
# embedded in a descriptive sentence ("...as he tells the bench, '...'")
#
# Events (offensive players only):
#   td_scored, third_down_conversion, big_gain, sack_taken, int_thrown,
#   fumble_lost, fg_made, fg_missed
#
# Demeanor coloring: each archetype/event has variants tagged with the
# demeanor they fit best (stoic/cool/intense/melancholy/fiery/dramatic).
# Demeanor-tagged lines take precedence for matching players; untagged
# lines serve as archetype-level fallback.
#
# Fallback cascade: (archetype, demeanor, event) -> (archetype, event) ->
# (generic, event). The 'generic' archetype provides safety-net lines.

# Leader — Selfless, slightly unhinged.
# The one teammates follow. Vocal, takes blame, rallies.
leader:
  td_scored:
    # stoic
    - text: "{name} hands the ball to the ref and nods once at every lineman on the walk back."
      demeanor: stoic
    # cool
    - text: "{name} points at the linemen on his way back, making sure they get the credit."
      demeanor: cool
    # intense
    - text: "{name} is already barking the next formation before his teammates reach him."
      demeanor: intense
    # melancholy
    # fiery
    - text: "{name} rallies the offense on the sideline — the whole unit feeds off it."
      demeanor: fiery
    # dramatic
    - text: "{name} jogs back, slaps every teammate on the helmet, and calls for more."
      demeanor: dramatic
    # untagged
    - text: "{name} makes sure everyone else gets the credit on the walk back."
  third_down_conversion:
    # stoic
    - text: "{name} gives the line a single nod on the walk back, his only reaction."
      demeanor: stoic
    # cool
    - text: "{name} gives a measured clap to the line on the way back."
      demeanor: cool
    # intense
    - text: "{name} immediately starts waving the offense back to the line."
      demeanor: intense
    # melancholy
    # fiery
    - text: "{name} walks back and the bench erupts around him."
      demeanor: fiery
    # dramatic
    - text: "{name} turns the first down into a full-bench revival."
      demeanor: dramatic
  big_gain:
    # stoic
    - text: "{name} jogs back to the line like nothing happened."
      demeanor: stoic
    # cool
    - text: "{name} turns to usher the whole offense downfield."
      demeanor: cool
    # intense
    - text: "{name} is already pointing to the next play call on the walk back."
      demeanor: intense
    # melancholy
    # fiery
    - text: "{name} is shouting at his line the whole way back."
      demeanor: fiery
    # dramatic
    - text: "{name} turns the jog back into a sideline sermon."
      demeanor: dramatic
  sack_taken:
    # stoic
    - text: "{name} stands up and walks back without a word."
      demeanor: stoic
    # cool
    - text: "{name} pulls his line together in the huddle. No finger-pointing."
      demeanor: cool
    # intense
    - text: "{name} gets up pointing to himself — he's taking the blame."
      demeanor: intense
    # melancholy
    # fiery
    - text: "{name} pops up and is already firing up the huddle."
      demeanor: fiery
    # dramatic
    - text: "{name} staggers up and delivers a speech to his line that lasts three seconds too long."
      demeanor: dramatic
  int_thrown:
    # stoic
    - text: "{name} walks off silently, already watching the defense take the field."
      demeanor: stoic
    # cool
    - text: "{name} owns it on the sideline, meeting every receiver's eye."
      demeanor: cool
    # intense
    - text: "{name} walks off with his head up, already telling the defense he'll get it back."
      demeanor: intense
    # melancholy
    - text: "{name} trudges to the bench, head down, and waits for the defense to come back."
      demeanor: melancholy
    # fiery
    - text: "{name} immediately starts rallying the bench for the next drive."
      demeanor: fiery
    # dramatic
  fumble_lost:
    # stoic
    - text: "{name} gets up and walks off without breaking stride."
      demeanor: stoic
    # cool
    - text: "{name} gives a quick nod to the defense as they take the field."
      demeanor: cool
    # intense
    - text: "{name} is the first one on his feet, rallying the defense."
      demeanor: intense
    # melancholy
    # fiery
    - text: "{name} hits his own chest twice and sprints off shouting encouragement."
      demeanor: fiery
    # dramatic
    - text: "{name} delivers a full apology to every teammate he passes on the walk off."
      demeanor: dramatic
  fg_made:
    # stoic
    - text: "{name} gives the kicker one nod and walks to the bench."
      demeanor: stoic
    # cool
    # intense
    - text: "{name} meets the kicker at the numbers, already talking about the next drive."
      demeanor: intense
    # melancholy
    # fiery
    - text: "{name} is first onto the field, mobbing the kicker like he scored the game-winner."
      demeanor: fiery
    # dramatic
    - text: "{name} lifts the kicker off the ground and parades him toward the bench."
      demeanor: dramatic
    # untagged
    - text: "{name} runs onto the field first to celebrate with the kicker."
  fg_missed:
    # stoic
    - text: "{name} pats the kicker once and keeps walking."
      demeanor: stoic
    # cool
    - text: "{name} jogs to the kicker before anyone else gets a word in."
      demeanor: cool
    # intense
    - text: "{name} is at the kicker's side before his helmet comes off, already talking."
      demeanor: intense
    # melancholy
    - text: "{name} walks to the kicker, puts an arm around him, and says nothing."
      demeanor: melancholy
    # fiery
    - text: "{name} meets the kicker head-on and fires him up for the next one."
      demeanor: fiery
    # dramatic

# Guardian — Selfless, disciplined.
# Protects teammates. Sacrifices stats for the team. Quiet, dependable.
guardian:
  td_scored:
    # stoic
    - text: "{name} hands the ball to the ref without breaking stride."
      demeanor: stoic
    # cool
    - text: "{name} hands the ball to the ref and points back at the offensive line."
      demeanor: cool
    # intense
    - text: "{name} is already asking the coordinator about the extra point protection."
      demeanor: intense
    # melancholy
    - text: "{name} turns around to check on the blockers who sprung him."
      demeanor: melancholy
    # fiery
    - text: "{name} shouts a thank-you to the tackle who held his block."
      demeanor: fiery
    # dramatic
  third_down_conversion:
    # stoic
    - text: "{name} helps his own blocker up without a word."
      demeanor: stoic
    # cool
    - text: "{name} immediately helps {teammate} off the turf."
      demeanor: cool
    # intense
    - text: "{name} is scanning for anyone who needs help up before celebrating."
      demeanor: intense
    # melancholy
    - text: "{name} walks back quietly, already worried about the teammate who took the hit."
      demeanor: melancholy
    # fiery
    # dramatic
  big_gain:
    # stoic
    - text: "{name} trots back checking the line for cuts and bruises."
      demeanor: stoic
    # cool
    - text: "{name} has his eyes on the trailing blockers before the whistle finishes."
      demeanor: cool
    # intense
    - text: "{name} immediately finds the guard who made the key block."
      demeanor: intense
    # melancholy
    - text: "{name} looks back to make sure the line survived the play."
      demeanor: melancholy
    # fiery
    # dramatic
  sack_taken:
    # stoic
    - text: "{name} walks back to the huddle without a word."
      demeanor: stoic
    # cool
    - text: "{name} is the first to tell the tackle it wasn't on him."
      demeanor: cool
    # intense
    - text: "{name} gets up fast and shields his left tackle from the position coach's stare."
      demeanor: intense
    # melancholy
    - text: "{name} sits in the huddle looking a little more tired than before."
      demeanor: melancholy
    # fiery
    # dramatic
  int_thrown:
    # stoic
    - text: "{name} walks his line off the field quietly."
      demeanor: stoic
    # cool
    - text: "{name} meets his line at the sideline and quietly tells them it was on him."
      demeanor: cool
    # intense
    - text: "{name} is already gathering the unit for a correction."
      demeanor: intense
    # melancholy
    - text: "{name} stares at the turf for a long beat before jogging off."
      demeanor: melancholy
    # fiery
    # dramatic
  fumble_lost:
    # stoic
    - text: "{name} walks off with his jaw set."
      demeanor: stoic
    # cool
    - text: "{name} drops to a knee, shaking his head once before getting up."
      demeanor: cool
    # intense
    - text: "{name} is on his feet immediately, hunting the ball carrier he failed to block for."
      demeanor: intense
    # melancholy
    - text: "{name} walks to the bench with the weight of it obvious."
      demeanor: melancholy
    # fiery
    # dramatic
  fg_made:
    # stoic
    - text: "{name} trots off with the unit, already thinking about the next series."
      demeanor: stoic
    # cool
    - text: "{name} gives the kicker a quiet thumbs-up on the way past."
      demeanor: cool
    # intense
    # melancholy
    - text: "{name} nods at the kicker without a smile. The job's not done."
      demeanor: melancholy
    # fiery
    # dramatic
  fg_missed:
    # stoic
    # cool
    - text: "{name} is the first to the kicker, hand on his shoulder pad."
      demeanor: cool
    # intense
    - text: "{name} is on the kicker immediately, resetting him for the next attempt."
      demeanor: intense
    # melancholy
    - text: "{name} walks to the kicker with his head down and sits with him on the bench."
      demeanor: melancholy
    # fiery
    # dramatic

