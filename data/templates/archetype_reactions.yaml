    - text: "{name} calmly checks the stitching of his gloves on the bench."
      demeanor: stoic
    # cool
    - text: "{name} spends the walk to the bench staring at his gloves."
      demeanor: cool
    # intense
    - text: "{name} is already pacing the sideline replaying the handoff mechanics."
      demeanor: intense
    # melancholy
    - text: "{name} sits with the play sheet unopened in his hands."
      demeanor: melancholy
    # fiery
    # dramatic
