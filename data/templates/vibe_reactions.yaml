  made_sack:
    - "{name} stands over {passer} with both arms raised. The crowd is encouraged to react."
    - "{name} mouths 'fall, ye mortal' at {passer}."

  threw_int:
    - "{name} drops to their knees, looks at their throwing hand. 'Cursed,' they mouth. 'Cursed.'"

  made_int:
    - "{name} catches it and falls backward in slow motion, ball clutched to chest."
    - "{name} cradles the ball, holds it up to the heavens."

  fumbled:
    - "{name} clutches their hands to their face, stumbles to the sideline."
    - "{name} drops to one knee, stares at their empty palms."

  recovered_fumble:
    - "{name} cradles the ball like a found infant. Possibly weeping."

  sideline:
    - "{name} is saluting the camera, holding it for an unsettlingly long time."
    - "{name} is staring into the middle distance, lips moving silently. Soliloquy in progress."
    - "{name} has their helmet off, letting the wind hit their face, holding the pose."
    - "{name} is sketching what appears to be a portrait of themselves on a napkin."
    - "{name} is addressing an empty section of the stadium with emphatic gestures."
    - "WITNESS this hour! WITNESS it!"
