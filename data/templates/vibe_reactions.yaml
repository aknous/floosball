    - "Who among us has not been forsaken by the gods of football? But I have suffered uniquely."
    - "{name} is sketching a self-portrait on a napkin, pausing dramatically between strokes."
    - "{name} is staring intensely at their own reflection in a teammate's visor, mouthing 'this is your moment.'"
    - "{name} is performing a quiet aria for a teammate who didn't ask for one and can't leave."
    - "{name} is delivering a soliloquy at full volume, to the kicking net, which is listening."

  off_day:
    - "{name} attended a community theater performance recently and wept openly through the entire second act."
    - "I hosted a dinner where the toast became a full soliloquy, and by the end of it the room was in tears."
    - "{name} re-watched their own post-game interview as if it were an old, untouchable play."
    - "I performed in a community production of 'Velmar' recently, and naturally I was Velmar."
    - "{name} entered a karaoke bar and treated 'Hold the Long Line' as a full operatic aria."
    - "I gave an impromptu speech at my niece's birthday party, and the children, in time, recovered."
    - "There are no small parts. There is only a stage that has not yet realized that it needs me."
    - "{name} bowed to the cafeteria when they entered this morning, and three of the assistants applauded out of pure instinct."
    - "I cried into a bowl of pasta last night. It was a very good bowl of pasta. Please don't ask me how I'm doing..."
    - "{name} read aloud from their own contract at a charity gala, and the audience genuinely leaned in."
    - "I have been told my voice carries, and I do not take this as the criticism it was apparently intended to be."


# ─── Cool family ────────────────────────────────────────────────────────────

trash_talker:
  # Heel-coded antagonist. Takes up permanent residence in opponents'
  # heads. Points at scoreboards, blows kisses to opposing fans, mocks
  # specific opponents by name. Inspired by McGregor / Mayweather /
  # general WWE-heel energy — NOT Deion specifically. Keep "Y'all"
  # interjections and press-tour podcast tropes out. Distinct from
  # cool (theatrical-luxe self-focused) and fiery (rage at the world)
  # — trash_talker is FOCUSED on the opposition.
  mood_names: [Quiet, Dialed Down, Talking, Cooking, Inside Their Heads]

  positive_generic:
    - "{name} pulls an imaginary phone out of their pocket and calls the opposing coach."
    - "{name} blows a kiss to the opposing fans."
    - "{name} waves goodbye to the defender they just beat."
    - "{name} mouths 'scoreboard' at the opposing bench."
    - "{name} cups their ear toward the now-silent opposing fans."
    - "{name} pretends to tuck a defender into bed at the line of scrimmage."
    - "{name} walks backward toward the sideline, maintaining eye contact with the defense."
    - "{name} does the 'too small' gesture at the nearest defender."
    - "{name} pantomimes writing a receipt, hands it to the defender."
    - "{name} blows on the defender like they're a dandelion."
    - "{name} points at the scoreboard, then at themselves."
    - "{name} air-mails a kiss to the opposing mascot."
    - "{name} pretends to read a newspaper while strolling off."
    - "{name} mimes hanging up a 'closed' sign on the goal line."
    - "I told you. I told you all week long."
    - "{name} stares directly into the opposing bench and holds it for a long moment."
    - "Mark this one. Mark every one of them, while you're at it."
    - "That right there is a postgame quote. Save it."

  negative_generic:
    - "{name} mouths something untranslatable at the defender."
    - "{name} immediately starts working on what they'll say after the next play."
    - "{name} shakes their head at a defender, smirking, like they're disappointed in them."
    - "{name} cracks their neck, points at the scoreboard. The scoreboard isn't currently in their favor. They point anyway."
    - "Save it. I'll be back."
    - "{name} smirks at a defender. The smirk says 'wait until next time.'"
    - "{name} sarcastically says 'enjoy the moment' at the opposing bench."
    - "Tell your kids about that play. They won't believe you."
    - "Soak it up. That's the highlight of your year."
    - "I owe you one. I always pay."
    - "Hope you took a picture. That'll be the only one."
    - "Smile. The cameras love this for you."
    - "Don't worry. I'll get yours twice next series."
    - "You'll be hearing from me again."
    - "Nah. Run it back. Run it back."
    - "{name} laughs once, points at no one in particular."
    - "I'm hearing it. I'm hearing it. You will be hearing me again before this game is over."
    - "{name} whispers something to a corner, and the corner shakes their head and walks off."

  scored_td:
    - "{name} crosses the goal line, immediately points at the opposing bench."
    - "{name} mimes putting the ball away in a tiny suitcase. 'I'm takin this with me.'"
    - "{name} mimes locking the endzone with a key, pockets the key."

  threw_td:
    - "{name} watches the catch, immediately points at the opposing secondary."
    - "{name} mouths 'told y'all' to the defensive coordinator."

  made_fg:
    - "{name} watches it sail through, blows on their kicking foot like a smoking gun."

  missed_fg:
    - "{name} mouths 'one of you definitely paid the wind' at the opposing bench."

  got_sacked:
    - "{name} pops up, gives {sacker} the slowest, most sarcastic clap."

  made_sack:
    - "{name} stands over {passer}, mimes calling someone on a phone. Probably their family."
    - "{name} crouches next to {passer} and whispers something."
    - "{name} says 'come back when you grow up' at {passer}."

  threw_int:
    - "{name} mouths 'enjoy that one. It's the only one you're getting' at the defender."

  made_int:
    - "{name} catches it, holds it up like a trophy at {passer}."
    - "{name} blows {passer} a kiss as they peel away."

  fumbled:
    - "{name} mouths 'lucky bounce' at whoever recovered."

  recovered_fumble:
    - "{name} cradles the ball, mouths 'thanks for the gift' at the offense."

  sideline:
    - "{name} is watching the opposing offense, working on their next line."
    - "{name} is mouthing something at a specific opposing player from across the field."
    - "{name} is writing a tiny note on their wristband, presumably an insult."
    - "{name} is staring at the opposing bench, smirking faintly."
    - "{name} is tapping a teammate, pointing at someone on the other team. Both laughing."
    - "{name} is cupping their ear at the opposing fans whenever they hush."
    - "Hey number 27. NUMBER 27. Yeah, you. Just so we're clear."
    - "I'm gonna be talking to that DB all four quarters. They'll hear me in their sleep."
    - "Tell their bench I said hi. I want them thinking about me."
    - "Ten more minutes and they'll be quiet on that sideline. Watch."
    - "{name} is polishing a chain with the corner of their jersey, slowly enough that the camera notices."
    - "{name} is holding a watch up to the broadcast camera. The watch is large and gold."

  off_day:
    - "{name} held an impromptu press conference at the team facility and used most of it to name two specific defensive backs."
    - "I told a reporter the opposing left tackle wouldn't be fast enough this week. The reporter laughed. The left tackle is also slow."
    - "{name} predicted the exact final score of next week's game in writing, signed the page, and sent it to the league office."
    - "I had three suits made this week, and one of them is specifically for the postgame press conference where I get to remind everybody exactly what I told you."
    - "{name} watched film of next week's safety getting beat on a deep ball and sent him the timestamp in a letter."
    - "{name} sent a fruit basket to the corner they beat last week, with a handwritten card inside that just said 'thank you for the help.'"
    - "I have the opposing safety's quote about me pinned above my locker, and I've been reading it every day so I don't forget what we are doing here."
    - "I called the opposing offense soft on the radio last year, and three of them have sued me for defamation."
    - "I watched every highlight from last week's game twice over, and I can pinpoint the exact moment I took up permanent residence in their heads."
    - "{name} attended a charity event where they were asked to sign a rival jersey. They signed it, in red ink, directly across the name on the back."


# ─── Wholesome family ───────────────────────────────────────────────────────

mystic:
  # Devotional follower of an unseen flow. Borrows prophet's thread/path
  # imagery but RECEIVES rather than SEES — they don't have visions,
  # they follow guidance. Same calm at wins and losses, bows after every
  # play, gives thanks. Partially aware: they cannot see through the
  # simulation directly, but they trust prophets who can, and the
  # reverence is earned. Distinct from prophet (seer vs. follower).
  takes_quirks: false
  mood_names: [Untethered, Drifting, Centered, Aligned, Enlightened]

  positive_generic:
    - "{name} bows slightly after the play."
    - "{name} touches the turf, then their forehead."
    - "Thanks be."
    - "{name} closes their eyes for a moment of stillness."
    - "The flow allowed it."
    - "The threads were kind today."
    - "All in its proper order."
    - "{name} smiles softly."
    - "I am grateful."
    - "{name} brings two hands together briefly, jogs to the bench."
    - "I walked the path as it was laid."
    - "I was placed here. The placement was wise."
    - "I was where I was meant to be. That is all."
    - "Gratitude. Always gratitude."
    - "The flow held me steady."
    - "It was given. I only received."
    - "We are placed where we are placed."

  negative_generic:
    - "{name} bows slightly, the same as on the good plays."
    - "All things shift. We shift with them."
    - "{name} closes their eyes, breathes in, breathes out."
    - "The teaching continues."
    - "Thanks for the lesson."
    - "{name} touches the turf where they fell, gives thanks."
    - "What was meant for me, I receive."
    - "The path includes this. I walk."
    - "The threads do not always perfectly align."
    - "Surrender, also, is part of the practice."
    - "I will sit with this. Sitting is the work."
    - "What was given is now received."
    - "The lesson is the gift. I open it slowly."

  scored_td:
    - "{name} crosses the goal line, places one hand on their heart, walks slowly back."
    - "{name} hands the ball to a child in the front row, bows slightly."
    - "The path delivered me here. I am grateful."

  threw_td:
    - "{name} watches the catch, brings two hands together briefly."
    - "The pass found its true home. All is at is should be."
    - "The path knew where {receiver} would be."

  made_fg:
    - "{name} bows toward the goalpost."
    - "Three points. A small grace."

  missed_fg:
    - "Not this time. The path is what it is."
    - "{name} watches it go wide, bows toward the goalpost anyway."

  got_sacked:
    - "{name} lies on the turf for a long moment, eyes closed."
    - "The teaching arrives in many forms."

  made_sack:
    - "{name} stands over {passer}, helps them up gently, bows slightly."
    - "I was placed here. Anyone in this place would have done the same."

  threw_int:
    - "I released the ball. The path took it elsewhere."

  made_int:
    - "{name} catches it, bows toward {passer}, walks back quietly."
    - "It came to my hands. I am only the place it arrived."

  fumbled:
    - "What I held was not mine to hold longer."
    - "{name} kneels for a moment, then rises."

  recovered_fumble:
    - "What was loose, I gathered. That is the flow."

  sideline:
    - "{name} is sitting cross-legged on the bench, eyes closed."
    - "{name} is tracing a small spiral on the turf with their finger."
    - "{name} is drinking water with two hands, slowly."
    - "{name} is bowing toward the field before stepping back on."
    - "{name} has their palms together briefly, exhaling."
    - "{name} is watching a teammate stretch, smiling softly."
    - "The flow is gentle today. I am grateful for the gentleness."
    - "{name} is breathing in for four counts, holding for four, releasing for four."
    - "I will carry this stillness back onto the field."
    - "{name} is rotating a small smooth stone in their hand, slowly, with great intention."
    - "{name} is watching the birds above the field, and they say a great deal about the next play."

  off_day:
    - "{name} spent the morning in silence. The path arranged itself."
    - "{name} arranged seven stones on a windowsill. Each was placed correctly."
    - "I sat with the football for a full hour, listened to whatever it had to tell me, and thanked it before I left."
    - "{name} drank tea slowly. The tea agreed to be drunk slowly."
    - "The football remembers, and we do not."
    - "Every snap is a small ceremony, and most of you do not notice."
    - "I bow to the equipment manager. They are the priest of this temple."
    - "There is a frequency only the football hears, and most weeks I think I can hear it too."
    - "When you tape an ankle, you are also tying a vow."
    - "Do not borrow another player's gloves. Their luck is not for you."


knight:
  # Chivalric, formal, archaic speech. Honor-coded — helps fallen
  # opponents up, salutes, kneels in acknowledgment. Treats every play
  # as a duel. Wholesome family but with formality and code rather
  # than warmth and team-feeling.
  takes_quirks: false
  mood_names: [Dishonored, Tested, Valiant, Glorious, Crowned]

  positive_generic:
    - "Well-fought."
    - "{name} bows slightly to the defender they just beat."
    - "Honor demanded it."
    - "{name} helps the defender to their feet, claps their shoulder."
    - "By my hand."
    - "A worthy opponent. May we meet again."
    - "{name} salutes the opposing bench from across the field."
    - "I only live to serve."
    - "{name} pats the offensive line in turn, like a captain after a successful charge."
    - "Glory be to those who blocked."
    - "A clean strike. Rare and welcome."
    - "Hold your ground, comrades. The day is yet long."
    - "Steady on. Steady on. The field is ours."
    - "Onward. There is more to be won."
    - "Mark this hour. The chronicles will."

  negative_generic:
    - "Well-fought."
    - "The day is theirs. Tomorrow may be ours."
    - "{name} kneels briefly in acknowledgment."
    - "{name} salutes the opposing bench."
    - "An honorable defeat. The next field will tell."
    - "{name} touches their helmet to a teammate's, formally."
    - "{name} sheaths an invisible sword."
    - "We shall return to this field, and we shall see who is worthy."
    - "We yield this hour. Not the war."
    - "Steady, friends. The field demands courage, not despair."
    - "The fight goes on. Take heart."
    - "Mark me. We will answer for this."

  scored_td:
    - "{name} crosses the goal line, kneels briefly, rises, jogs back."
    - "{name} sets the ball down at the goal line as if placing a banner."
    - "For the realm."

  threw_td:
    - "{name} watches the catch, salutes {receiver} from across the field."
    - "Brave catch. By a brave heart."

  made_fg:
    - "Three points, justly earned."
    - "{name} places one fist over their heart."

  missed_fg:
    - "{name} drops to a knee, head bowed, accepting the failure as their own."

  got_sacked:
    - "Well-struck."
    - "{name} stands up, salutes {sacker}, jogs back."

  made_sack:
    - "{name} helps {passer} to their feet, claps their shoulder."
    - "A fair contest. {passer} fought well."

  threw_int:
    - "{name} jogs back, salutes the defender. Honor was on their side."

  made_int:
    - "{name} catches it, bows slightly to {passer} before jogging off."
    - "By rights, this ball is mine now."

  fumbled:
    - "An honorable loss. The ball belongs to whoever holds it."

  recovered_fumble:
    - "{name} cradles the ball as one cradles a recovered standard."

  sideline:
    - "{name} is sitting with hands folded, surveying the field as if from a saddle."
    - "{name} is polishing a wristband with great care."
    - "{name} is standing rather than sitting, hands behind their back, posture rigid."
    - "{name} is watching the opposing bench, giving a single, formal nod."
    - "{name} is touching their helmet to a teammate's, formally."
    - "Hold the line, friends. The hour belongs to us."
    - "{name} is sharpening an invisible blade against an invisible whetstone."
    - "Mark the field. The chronicles must record where we stood."
    - "Steady on, steady on. We have been tested before."

  off_day:
    - "{name} ran the long road at dawn this morning, as they have done every week since enlistment."
    - "{name} sharpened the blade and polished the helm in the same order they always do, because the ritual is the rest."
    - "{name} visited the freehold gates. Touched them, as the oath requires."
    - "{name} stood at attention in a quiet field for an hour. Reasons known only to them."
    - "{name} drilled forms in the yard. Forty repetitions, then forty more."
    - "{name} recited the ledger of past contests aloud to an empty room this morning."
    - "{name} mended a torn cloak that no one has seen them wear."
    - "{name} walked the boundary of their land at sunrise, naming each marker."
    - "Discipline is the only luxury, {name} has been heard to say."
    - "An oath is a kind of grammar, and most of you are writing in fragments."
    - "I would die for any of you on the right day, against the right opponent."
    - "There is a way to enter a stadium, and there is a way to leave one. I have opinions on both."
    - "Honor lives in the small ceremonies. I salute the locker, even when no one is looking."
    - "A worthy opponent is the highest gift the schedule can give us."
    - "I sharpen what I can sharpen. The rest is up to the field."

