# Vibe reaction templates.
#
# Keyed by `(vibe, reaction_key)`. Lines may be:
#   - pure quotes:        "For one moment, the universe held."
#   - pure descriptions:  "{name} stares at the sky for a long moment."
#   - quote + stage dir:  '"That''s me." *adjusts their headband*'
#
# Placeholders substituted at render time:
#   {name}        — the reactor's full name (always available)
#   {receiver}    — the pass-catcher (threw_td, threw_int [intended])
#   {passer}      — the QB (scored_td via pass, got_sacked, made_sack,
#                   threw_int, made_int)
#   {sacker}      — the defender who sacked (got_sacked)
#   {interceptor} — the defender who picked it (threw_int)
#   {fumbler}     — the player who lost the ball (recovered_fumble)
#   {recoverer}   — the player who recovered (fumbled)
#   {tackler}     — the defender on a tackle (general use)
#
# Renderer should provide role-default fallback strings ("the receiver",
# "the QB", etc.) when a specific name isn't available, so templates never
# crash on missing keys.
#
# Generic pools cover any positive / negative moment that doesn't have unique
# perspective flavor. Specific keys handle moments where the reactor's role
# matters (the QB on a sack vs the defender; the fumbler vs the recoverer).
#
# Reaction key routing (handled in code):
#   clutch_play     -> positive_generic
#   made_big_play   -> positive_generic
#   choke_play      -> negative_generic
#
# Per-personality fields:
#   mood_names    — 5-tier mood scale (very bad → very good), surfaced on UI
#   takes_quirks  — false for strong-characterization variants whose voice
#                   or world is too specific to layer sideline quirks on
#                   (defaults to true for everything else)

melancholy:
  # Sad-sack lovable downer. Resigned, mild, often invisible to
  # themselves. Inspired by Eeyore / Charlie Brown — never self-pitying
  # enough to be unlikable, just genuinely a little sad about everything.
  # Distinct from poetic (literary imagery, romantic-period heart) and
  # cursed (fatalism with cosmic blame).
  mood_names: [Hollow, Heavy, Wistful, Tender, Luminous]

  positive_generic:
    # Plain-spoken sad. The ornate Romantic-period flavor lives in the
    # `poetic` variant. Base melancholy keeps the simple emotional
    # language without literary flourish.
    - "{name} looks up at the stadium lights with wet eyes."
    - "{name} closes their eyes and stands very still."
    - "{name} kneels for a moment in the endzone, then rises."
    - "{name} whispers 'at least there's this' to no one."
    - "{name} stares down the field like it reminds them of something."
    - "{name} holds the football for a moment too long before letting go."
    - "{name} looks at the crowd with a gentle, faraway expression."
    - "{name} pats the ball twice before handing it off. Saying goodbye."
    - "{name} watches the replay like it's a memory."
    - "{name} smiles at a teammate in a way that seems... heavy."
    - "{name} whispers 'this is why we play' to themselves."
    - "{name} smiles, but only just..."
    - "I really needed that."
    - "{name} sighs, but gently this time."
    - "{name} nods to a teammate, but doesn't say anything..."
    - "It's good to just feel something."
    - "That helps. That helps a little."
    - "I'll take this with me."
    - "I needed that more than I knew."
    - "Thanks for noticing me."
    - "{name} smiles briefly, then looks at the ground."
    - "This probably won't last. But it was nice."
    - "{name} jogs to the bench and sits as far from anyone as possible."

  negative_generic:
    - "{name} stares into the middle distance."
    - "{name} stands alone, just lost in thought."
    - "{name} sighs deeply, as if they expected this."
    - "{name} gazes at the scoreboard with quiet resignation."
    - "{name} whispers 'it's fine' in a way that suggests it is not fine."
    - "{name} stands perfectly still, weathering something internally."
    - "{name} sits at the end of the bench, head down."
    - "I'm trying..."
    - "Tough day..."
    - "{name} wipes their face on a sleeve."
    - "It's been heavy..."
    - "{name} pulls a towel over their head and is still."
    - "I'll get there..."
    - "{name} closes their eyes for a long moment."
    - "I just need a minute."
    - "That one stays with me."
    - "I knew it could go that way."
    - "I'll be alright. I always am."
    - "I had a feeling about that one..."
    - "Good grief..."
    - "{name} shrugs gently and walks to the sideline."
    - "I always thought it would happen this way, and now it has."

  scored_td:
    - "{name} hands the ball to a child in the front row."
    - "{name} stands in the endzone, arms slack at their sides."
    - "{name} crosses the goal line and just exhales."

  threw_td:
    - "{name} watches the catch with a soft smile."
    - "{name} jogs back with a small nod."

  made_fg:
    - "{name} watches the ball clear the uprights and just walks off."
    - "{name} turns toward the bench before the ball lands."

  missed_fg:
    - "{name} watches the ball drift wide, doesn't move for several seconds."
    - "{name} stares at their own foot for a long moment."

  got_sacked:
    - "{name} lies on the turf for a long moment, gazing skyward."
    - "{name} stands up slowly, dusts off, walks back."

  made_sack:
    - "{name} stands over {passer}, then walks back without a word."
    - "{name} helps {passer} up gently, nods once, walks away."

  threw_int:
    - "{name} watches the defender pull away, head sinking."
    - "{name} watches the ball fly into the wrong hands, expression unchanged."

  made_int:
    - "{name} cradles the ball like a thing recovered, not won."
    - "{name} catches it cleanly, hands it to the official quietly."

  fumbled:
    - "{name} stares at their empty hands."
    - "{name} kneels for a moment, then stands."

  recovered_fumble:
    - "It was on the ground and I picked it up. That's all."
    - "{name} clutches the ball to their chest, walks slowly to the bench."
    - "{name} sits with the ball a moment too long before passing it on."

  sideline:
    - "{name} is sitting at the end of the bench, looking at absolutely nothing."
    - "{name} is drinking water way too slowly."
    - "{name} is staring at their hands for a long moment."
    - "{name} has a towel pulled over their head briefly."
    - "{name} has their arms folded, watching the field with quiet weight."
    - "{name} is taking a slow, deep breath, exhaling slowly."
    - "{name} is sketching the same field, in the corner of the same notebook, for the third time this season."
    - "{name} dozed off on the bench, woke up halfway through a sigh, and went back to sleep."

  off_day:
    - "{name} took the long way home from practice yesterday."
    - "I spent the morning re-reading old letters that I probably should have left in the box."
    - "{name} took a long walk by the river and didn't talk to anyone the whole way."
    - "I keep thinking about my old high school coach, and I wonder where she ended up."
    - "{name} sat on a porch all afternoon and watched the day pass without saying much."
    - "I keep finding stadium dust in my pockets, and I'm not entirely sure how it gets there."
    - "I cleaned the entire kitchen this morning, and somehow that just made me feel worse about everything."
    - "Quiet day yesterday. I wasn't expecting to feel as much as I did, but I did."
    - "Could be worse, I suppose. I'm not entirely sure how, but I'm sure it could."
    - "I went out for a walk and ended up right back where I started, which felt about right."
    - "I sat at the diner alone for an hour, and the waitress eventually came over to ask if I was okay. I appreciated that."

stoic:
  # Quiet, thoughtful, stern, principled. Speaks rarely; when they do,
  # every word counts. Action over speech — fixes things without asking,
  # never raises voice, holds posture. Inspired by Ron Swanson at the
  # energy level but NOT a recreation: no woodworking / breakfast-meat /
  # axe clichés. Their principles are deeply specific in delightfully
  # weird ways (six identical shirts, no mirror, leaving a single belt
  # to a man named Earl).
  mood_names: [Bothered, Strained, Composed, Sharp, Locked In]

  positive_generic:
    - "{name} hands the ball to the referee with a single respectful nod and walks away without a word."
    - "{name} gives a solid nod."
    - "{name} taps a teammate on the helmet, but no words are spoken."
    - "{name} walks back to the line without looking up."
    - "{name} gives a firm thumbs up."
    - "{name} blinks twice."
    - "{name} has not changed facial expression today."
    - "{name} stands motionless while teammates mob them."
    - "{name} gives just the faintest thumbs-up."
    - "{name} acknowledges the screaming fans with a single, barely perceptible head nod."
    - "{name} permits a single corner of their mouth to rise into a smile."
    - "{name} writes the word 'good' on their wristband."
    - "{name} jogs to the bench and sits in silence."
    - "{name} retightens their wristband and returns to the huddle."
    - "{name} cracks their knuckles one at a time."
    - "..."
    - "{name} stops at the sideline, looks at the scoreboard, and just looks back at the field."
    - "{name} accepts a teammate's hug without returning it. The teammate moves on."
    - "{name} catches the eye of a coach. A single nod is exchanged."
    - "{name} closes their eyes for half a second, opens them, and keeps going."
    - "{name} pats the ball gently before handing it to the ref."
    - "{name} cracks the smallest possible smile."
    - "{name} taps their wristband once, then jogs back to the huddle without saying anything."
    - "{name} permits themselves a single fist pump."
    - "I do not celebrate, because the work is not yet finished."
    - "Good. We will do it again, and we will do it better."

  negative_generic:
    - "{name} jogs back to the huddle without expression."
    - "{name} stands and brushes off the turf, won't meet anyone's eye."
    - "{name} watches the replay once, then looks away."
    - "{name} doesn't react."
    - "{name} walks back to the bench, no expression."
    - "{name} mouths 'do better' to no one in particular."
    - "{name} briefly considers sitting down, but just stands there."
    - "{name} stares at the spot where the play happened like they're solving a crime."
    - "{name} adjusts their gloves. Then their wristband. Then their gloves again."
    - "{name} stares at the turf as if it owes them an explanation."
    - "{name} drinks half a bottle of water. Sets it down. The matter is closed."
    - "{name} puts their hands on their hips for exactly one second, then drops them."
    - "{name} reties a single cleat in silence."
    - "{name} jogs back at the same pace they always do."
    - "{name} sits at the end of the bench, looks at the playbook."
    - "{name} sits with their helmet between their hands, looking at nothing."
    - "{name} catches a teammate's eye and gives a single disapproving shake of the head."
    - "{name} cracks their neck once on each side."
    - "{name} accepts a water bottle, drinks once, hands it back without a word."
    - "{name} folds the playbook closed, sets it down, stares straight ahead."
    - "{name} takes a single deep breath through the nose and carries on with the day."

  scored_td:
    - "{name} just hands the ball to the ref."
    - "{name} sets the ball on the goal line as if filing it away."
    - "{name} jogs back without removing their helmet."
    - "{name} lingers at the back of the endzone before heading off."
    - "{name} flips the ball to the nearest official before jogging off."

  threw_td:
    - "{name} taps {receiver} lightly on the helmet in acknowledgement before silently walking off the field."
    - "{name} watches the catch land and just jogs off the field."
    - "{name} signals the next play before the celebration ends."
    - "{name} nods once at {receiver} from across the field."
    - "{name} takes off their helmet, puts it back on, and jogs to the sideline."

  made_fg:
    - "{name} watches the ball sail through the uprights and just walks off the field."
    - "{name} bows their head one inch and walks away."
    - "{name} gives the holder a firm handshake, but no words."

  missed_fg:
    - "{name} watches the ball sail wide without reacting."
    - "{name} squares their stance toward where the kick missed, files it away."
    - "{name} taps their cleats together once, jogs back."
    - "{name} watches the ball clang off the upright and walks off."

  got_sacked:
    - "{name} doesn't blame the line. {name} doesn't blame anyone."
    - "{name} pushes up off the turf and trots to the huddle."
    - "{name} stands and brushes turf off their jersey before rejoining the huddle."
    - "{name} replays the snap in their head while jogging back."

  made_sack:
    - "{name} gets up off the QB and calmly walks back to their side."
    - "{name} hands the QB their helmet and walks away."
    - "{name} climbs up and gets back into formation."

  threw_int:
    - "{name} walks straight to the bench, doesn't make eye contact."
    - "{name} watches the defender pull away and jogs back."
    - "{name} replays the throw in their head while jogging to the bench."
    - "{name} watches the defender's celebration like they're studying tape."

  made_int:
    - "{name} catches it cleanly, runs out of bounds and just hands the ball to the ref."
    - "{name} secures the ball, jogs to the sideline."
    - "{name} stands with the ball and hands it to the official."
    - "{name} runs the ball out of bounds with no expression."
    - "{name} cradles the ball on the way to the bench."

  fumbled:
    - "{name} watches the defense recover the ball without expression."
    - "{name} stands and walks back without a word."
    - "{name} reaches the sideline and picks up the playbook."
    - "{name} dusts off their gloves, returns to the huddle."

  recovered_fumble:
    - "{name} pops up holding the ball and just hands it to the ref."
    - "{name} secures the ball, walks off the field."
    - "{name} stands with the ball still in hand and jogs off."
    - "{name} flips the ball to the nearest official and walks back."

  sideline:
    - "{name} is sitting perfectly still, arms folded, watching the field."
    - "{name} is alone at the end of the bench. Not waiting. Just there."
    - "{name} is doing the exact same calf stretch they have done since high school."
    - "{name} is watching the opposing offense with surgical attention."
    - "{name} is folding a towel into thirds. Then thirds again."
    - "{name} is reading the playbook with the focus of a chess player."
    - "{name} is rebraiding a wristband. The braid is perfectly symmetrical."
    - "{name} is whittling something with a small knife. Are they allowed to have that?"
    - "{name} is sitting upright on the bench. Their posture has not changed in eight minutes."
    - "{name} is on the bench with a paperback, a finger holding their place."
    - "{name} is dealing themselves a hand of solitaire on the bench. Nobody asks to join."
    - "{name} is eating a single piece of jerky slowly and with great seriousness."

  off_day:
    - "{name} runs the same loop every morning alone."
    - "{name} fixed the storm door at the team facility. Nobody asked them to."
    - "I do not own a mirror. I have a rough idea of what I look like, and that has been enough."
    - "{name} owns exactly one chair. They have offered to build a second one, but only on request."
    - "{name} sat on a porch in a town with no cell service and read the same chapter of a book three times in a row."
    - "I have a will. It leaves a single belt to a man named Earl. Earl knows what it means."
    - "I don't give compliments, but I have been known to bake a small loaf of bread for people I respect."
    - "My closet contains six identical shirts and one unmarked envelope."
    - "I keep my word. That is the entire system."
    - "I have one friend, and that is the correct number of friends to have."
    - "I taught myself to play football by watching no one and figuring it out alone in a field."
    - "A handshake should last exactly two seconds, and I have timed many of them."
    - "I have a single dog, and we have an understanding."
    - "I keep a notebook of opinions I keep to myself, and it is several pages long."
    - "I don't celebrate my birthday, as it is the same date every year and not particularly noteworthy."

chill:
  # Laid back to a fault. Unhurried in everything, takes the long
  # view, the weather is more interesting than the score. Inspired by
  # The Dude (Big Lebowski) energy but NOT a recreation — no White
  # Russians, no rugs, no "abides," no stoner-isms. Just genuinely
  # unbothered.
  mood_names: [Stuck, "Off", Mellow, Cruising, Dialed]

  positive_generic:
    - "All right, feeling good."
    - "Yeah, we're good."
    - "{name} smiles, jogs off without much fuss."
    - "Hey, look at that."
    - "{name} flips the ball to the ref, gives a small thumbs-up."
    - "It's all good out here."
    - "{name} chuckles to themself, jogs to the sideline."
    - "Sometimes things just work out."
    - "Cool, cool."
    - "{name} just shrugs like it was no big deal."
    - "Just enjoying the day out here."
    - "It's a beautiful day, my friend."
    - "{name} is humming to themself on the way to the bench."
    - "Nothing to write home about."
    - "Easy money."
    - "Easy as that."
    - "There we go."
    - "I'll take it."
    - "Hey, that worked out okay."
    - "Just another day at work."
    - "Felt nice."
    - "Breezy."
    - "Well okay then!."
    - "Just doing the thing I do."
    - "{name} jogs back chewing gum like nothing happened."
    - "{name} takes a slow sip of water on the way to the bench."
    - "{name} bumps fists with the ref on the way past."
    - "{name} pats a teammate twice on the helmet and just mosies off."
    - "{name} flips the ball to the ref like it's a Frisbee."
    - "{name} rolls their shoulders, exhales, smiles. Life is good."
    - "{name} looks up at the clouds for a second and smiles."
    - "{name} leans on a teammate's shoulder for a second grinning like an idiot."
    - "{name} adjusts their wristband and just takes their time."
    - "{name} is soaking it all in."
    - "I wasn't even gonna come out today, honestly."
    - "I might just go fishing after this."
    - "Took me about ten percent of my effort."
    - "{name} chews gum a little slower for a second, feeling satisfied."
    - "Easy enough."
    - "Honestly, I'm just here to enjoy myself."
    - "{name} squints at the scoreboard, looks satisfied."
    - "Felt right."
    - "I'm not gonna lie, I'm pretty hungry."
    - "Yeah, well. That worked out."
    - "Hey, that one was just kinda sitting there for me."
    - "Some plays you have to make, and some plays just kinda find you."
    - "{name} grins, nods, jogs back to the huddle slowly."
    - "Good for us. Good for everybody, really."
    - "I'm just gonna take this one in for a second."

  negative_generic:
    - "It happens, man."
    - "{name} shrugs, jogs back to the huddle."
    - "All good, we'll get it back."
    - "No worries."
    - "{name} laughs at themself a little, taps their helmet."
    - "Yeah, that's on me."
    - "Long game."
    - "{name} smiles, shakes their head, walks back."
    - "Eh."
    - "Coulda gone either way."
    - "{name} stretches their neck, doesn't look stressed."
    - "It's just football."
    - "Could be worse."
    - "{name} shrugs so hard it looks rehearsed."
    - "Whatever, brother."
    - "{name} eats a sunflower seed mid-jog back to the huddle."
    - "Eh. Whatever."
    - "That's how it goes sometimes."
    - "Eh, we'll see."
    - "Live and learn."
    - "All part of it."
    - "Yeah, that one got away."
    - "Ah, well."
    - "Whatever's next is next."
    - "Eh, doesn't matter."
    - "Yeah, no, that's fine."
    - "Hey, it's a long game."
    - "{name} laughs softly, shakes it off."
    - "{name} drops onto the bench and leans back to watch the next play."
    - "{name} pats their own helmet twice, jogs back."
    - "{name} cracks their neck, doesn't change pace."
    - "{name} hums something on the way to the bench, doesn't seem bothered."
    - "{name} tucks a sunflower seed in their cheek before jogging back."
    - "{name} sits down with a smile, like they're at a backyard barbecue."
    - "{name} takes a long, slow sip of water, watches the replay."
    - "{name} stretches casually, like they have all afternoon."
    - "I'm not really gonna stress about that one."
    - "I'm not even mad. Honestly."
    - "{name} is staring at the cooler like they want to be over there instead."
    - "That's not really on me, I think."
    - "I might just sit this next one out."
    - "I don't feel anything right now and that's okay."
    - "Look, it's a long game. I'm pacing myself."
    - "{name} watches the replay once and decides not to watch it again."
    - "Whatever, man."
    - "Bummer."
    - "{name} shrugs, spits, heads back to the huddle."
    - "Look, that one was on the play, not on me."
    - "Yeah, well. There's a new game next week."

  scored_td:
    - "{name} flips the ball to a fan, smiles, jogs off."
    - "{name} jogs to the endzone like they're being polite."
    - "Yeah, just kinda fell into it."
    - "{name} flips the ball over their shoulder to a teammate, jogs off whistling."
    - "I just kind of ended up here. The end zone's a nice spot."
    - "Hey, look at that. Touchdown."

  threw_td:
    - "They were open and I just put it there."
    - "Easy throw. They did the work."
    - "{name} fist-bumps their coordinator on the way to the bench."
    - "Just put it where they could get it."
    - "{name} fist-bumps the line on the way off, all smiles."
    - "Hey, look at that. Touchdown."

  made_fg:
    - "{name} watches it land, then heads for the bench and a water bottle."
    - "{name} bumps their holder's helmet, smiles."
    - "Three's three."
    - "{name} grabs a sunflower seed bag on the way to the bench."

  missed_fg:
    - "{name} watches it sail wide, just shakes their head with a smile."
    - "Yeah, off. Whatever."
    - "{name} grabs their water bottle, doesn't seem stressed."
    - "Eh. They all even out."
    - "{name} takes a slow lap on the sideline, doesn't seem rattled."

  got_sacked:
    - "They got me there. Fair."
    - "I was holding it forever. My bad."
    - "{name} pats the defender on the helmet on their way back."
    - "Yeah, that's on me. Held it too long."
    - "{name} pops up slow, dusts themselves off, jogs back."

  made_sack:
    - "Coach drew it up. I just had to get there."
    - "What else was I going to do? They were just standing there."
    - "{name} taps the d-line on the helmets, all smiles."
    - "Yeah, just had to get there."
    - "{name} pops the QB up off the ground, gives a small nod."

  threw_int:
    - "Bad read."
    - "{name} laughs ruefully, takes off their helmet."
    - "{name} watches the defender go, then sinks onto the bench."
    - "Eh, that's on me."
    - "{name} jogs to the bench, takes a long sip of water."

  made_int:
    - "{name} catches it cleanly, runs out of bounds, hands it to a teammate."
    - "Hey, I'll take it."
    - "Just had a feeling."
    - "Yeah, that's the one."
    - "{name} cradles the ball, jogs out of bounds smiling."

  fumbled:
    - "Yeah, my bad. It'll probably happen again though."
    - "{name} pats their RBs coach on the shoulder, says something brief."
    - "Lost it. It happens."
    - "Yeah, my fault. It happens."
    - "{name} pats their helmet twice, jogs back without complaint."

  recovered_fumble:
    - "{name} pops up holding the ball, casually hands it to the ref."
    - "Just had to fall on it."
    - "Hey, free ball."
    - "{name} pops up holding the ball, gives a small thumbs-up."

  sideline:
    - "I'm gonna be honest, I might just go home after this."
    - "{name} is watching the cooler with quiet longing."
    - "Anyone seen my water bottle? Anyone? Okay I guess I'll look for it."
    - "{name} is chewing sunflower seeds at a glacial pace."
    - "Hey, what time is it?"
    - "I'm pretty hungry. Just throwing that out there."
    - "{name} is leaning back against the bench with their eyes half-closed."
    - "Did I lock my keys in the car? I guess I don't need them right now."
    - "{name} is humming something nobody recognizes."
    - "If we go to overtime I'm going to need a snack."
    - "{name} is studying the sky like it's a movie."
    - "I'd love a sandwich right about now. Just any sandwich."
    - "{name} has an earpiece in and is bobbing their head to whatever's coming through the radio."
    - "{name} is unwrapping a granola bar they pulled from somewhere in their pads."
    - "{name} is asleep on the bench. They will wake up when called."
    - "It's a real nice day for football. Or for anything, honestly."
    - "{name} is on the bench, staring out at the field with a small, peaceful smile."

  off_day:
    - "Took the boat out, didn't catch a thing, called it one of the best days of the year."
    - "{name} bowled three games last night at a place that still keeps score on paper, and apparently that's the only way to do it."
    - "I poured myself something tall and watched the sun come up over the bay, and the rest of the day pretty much took care of itself."
    - "I've been wearing the same robe since Tuesday, and the robe and I have come to an understanding."
    - "{name} drove around with the windows down for three hours and no destination in mind."
    - "{name} watched two hours of a fishing channel without getting up off the couch."
    - "Honestly, I'm thinking about not coming in tomorrow either."
    - "Honestly, some weeks the football's gonna bounce your way, and some weeks it isn't, and I've made my peace with that."
    - "I kept telling myself I'd get up at nine, then ten, and eventually I just made breakfast in bed."
    - "I haven't watched any film all week, I'm not too worried about it."
    - "Just got back from the diner. The pancakes were good enough that I'm going again tomorrow."

cool:
  # Bond-parody / Most-Interesting-Man-in-the-World gentleman-spy energy.
  # Theatrical-luxe self-presentation with the polish constantly cracking
  # to reveal something off underneath: martini orders, code names,
  # countries they cannot name, cars they do not legally own, the time
  # they were declared legally dead. Inspired by Archer (which is itself
  # a Bond parody) plus the Most Interesting Man's third-person
  # achievements ("{name} once...") plus a Clooney/Draper baseline
  # smoothness. The point is parody — every Bond move is undercut by
  # something absurd, off-handed, or revealing. Lines should be GENDER
  # NEUTRAL (no fellas, no wife/husband, no boys/guys). Distinct from
  # vain (mirror-focused appearance maintenance) and trash_talker
  # (focused on opponents) — cool is focused on cool itself, with
  # constant flashes of "wait, what did they just say?"
  mood_names: [Frayed, Slipping, Smooth, Slick, Untouchable]

  positive_generic:
    - "Was that ever in doubt?"
    - "Watch the tape. I'll wait."
    - "{name} points at the camera, gives a small wink."
    - "{name} blows a kiss to no one in particular."
    - "That's a {name} special."
    - "{name} adjusts their sleeves with deliberate slowness."
    - "{name} tilts their head back like they're posing for a poster."
    - "I get paid for this. They get to watch."
    - "{name} makes meaningful eye contact with the camera operator."
    - "The legend grows."
    - "{name}'s tailor has stopped taking new clients on principle."
    - "{name} adjusts their hair even though they are wearing a helmet."
    - "{name} takes off their helmet and puts on sunglasses."
    - "{name} walks in slow motion as the wind blows their hair."
    - "{name} puts on sunglasses. They were already wearing sunglasses. They are now wearing two pairs of sunglasses."
    - "{name} flips the ball over their shoulder without looking. It lands perfectly in the ref's hands."
    - "{name} adjusts their gloves like they're cufflinks. Wait are they wearing cufflinks?"
    - "{name} leans against the goalpost with their arms crossed. A photographer will win an award for that photo."
    - "{name} blows on their fingertips like a smoking gun."
    - "{name} just smirks. Devastating."
    - "{name} gives the crowd the subtlest of nods. Eighty thousand people feel personally acknowledged."
    - "{name} signs the air, hands the autograph to no one in particular."
    - "{name} pretends to roll up their sleeves. The jersey has no sleeves."
    - "{name} winks. A small section of the crowd swoons."
    - "{name} hands the ball to the ref without breaking eye contact with the camera."
    - "{name} adjusts their cuffs. They are not wearing cuffs."
    - "{name} tips an imaginary fedora."
    - "{name} walks to the sideline like they're on a runway and absolutely owning it."
    - "{name} puts a finger and thumb together briefly, and that was the signal."
    - "Beautiful."
    - "{name} holds the look for the camera, even though the camera isn't on them at the moment."
    - "That is the first one. There will be others before the night is done."
    - "{name} winks at the camera. The wink is not for the audience. It is for somebody specific."
    - "{name} flips the ball over a shoulder without watching where it lands."
    - "On schedule. Naturally."
    - "{name} touches the brim of an invisible hat, jogs back to the line."
    - "{name} blows the dust off an imaginary lapel."
    - "Effortless, really. Most things are, when one knows what one is doing."
    - "Yes. This is the version of myself my biographer prefers, and my biographer is very expensive."
    - "{name} hands the ball off with a small, dismissive flick, as though it has served its purpose and is no longer required"
    - "Outstanding. I shall be billing the team for the privilege of having watched me."
    - "This is what happens when one is raised on opera and tactical knife work."
    - "I have done more impressive things before breakfast, but I shall accept this for the room's morale."

  negative_generic:
    - "I'll allow it this time."
    - "{name} adjusts their sleeves and gets back to it."
    - "Even legends have bad days."
    - "{name} cracks their neck, gives the camera a half-smile."
    - "{name} smooths their hair, walks back like nothing happened."
    - "Anyone else and that would've been worse."
    - "{name} flicks an imaginary speck off their shoulder."
    - "I let them have that one. They needed it."
    - "{name} stretches once, slowly, deliberately."
    - "Curious."
    - "Even the great crooners missed a note now and then."
    - "{name} looks at their hands like they betrayed their good name."
    - "{name} brushes dirt off their shoulder like the play was a minor inconvenience."
    - "{name} fixes their hair on the way to the sideline. Priorities."
    - "{name} yawns so theatrically the opposing bench takes it personally."
    - "{name} pretends to check a watch they're not wearing."
    - "{name} flicks an invisible speck of dust off their jersey. The jersey is filthy, but they don't care."
    - "{name} leans back on the bench like they own the stadium and are simply allowing others to use it."
    - "{name} stretches casually, as if the play happened to someone else. Someone less cool."
    - "{name} examines a fingernail with surgical interest."
    - "{name} smooths an eyebrow back into place."
    - "{name} adjusts the watch they're not wearing."
    - "{name} gives a sarcastic golf clap for themselves."
    - "{name} sips from a water bottle like it's a glass of bordeaux."
    - "{name} adjusts their watchband, says nothing."
    - "We can fix this. Let's not panic about it."
    - "{name} takes one slow breath, and the expression doesn't change at all."
    - "Onward. The room is still mine."
    - "I have survived an avalanche. This is, comparatively, fine."
    - "I have seen worse. I'd tell you, but the records on that have been sealed."
    - "{name} touches the brim of a hat they are not currently wearing. Just a reflex."
    - "Disgraceful. Not me, of course. The situation."
    - "I shall require a moment, a cool cloth, and a glass of something older than most of you."
    - "Someone is going to be spoken to about this, and that someone is everyone."
    - "I allowed that to happen. Do not embarrass yourselves by suggesting otherwise."

  scored_td:
    - "{name} points at the camera, then walks calmly to the sideline."
    - "{name} blows a kiss to the crowd."
    - "{name} signs an imaginary autograph for the camera."
    - "{name} drops the ball at the goal line, doesn't break stride."
    - "Everyone take notes."
    - "{name} hands the ball to a stranger in the front row, who will keep it on a mantelpiece for thirty years."
    - "Was there ever any doubt? Don't answer that. There wasn't."
    - "Six points. A modest tribute, like a small gratuity on a yacht."
    - "Touchdown. Add it to the portfolio."

  threw_td:
    - "{name} watches the receiver score, then turns to the camera and shrugs."
    - "I told them where to be and they were there."
    - "{name} kisses their throwing hand."
    - "{name} jogs to the sideline like they're walking off a movie set."
    - "The ball went exactly where I intended, as things tend to when I intend them."
    - "I learned to throw from a former colleague in a region I cannot name, for reasons that are still classified."
    - "I do not throw passes. I issue invitations, and the ball arrives."

  made_fg:
    - "{name} doesn't even watch the ball split the uprights."
    - "{name} kisses their fingertips, points at the goalpost."
    - "Three. Easy."
    - "Was there ever any doubt?"
    - "{name} replaces their helmet very carefully, walks off."
    - "I have done this from worse angles, in worse weather, under code names I have since forgotten."

  missed_fg:
