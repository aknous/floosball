    - "{name} adjusts their sleeves and stares at the goalposts."
    - "Even legends choose to miss occasionally."
    - "{name} flicks an imaginary speck off their kicking shoe."
    - "{name} attributes that one to atmospheric conditions similar to that of a country they are no longer permitted to visit."

  got_sacked:
    - "{name} rises slowly, smoothing the jersey before heading off."
    - "They had to bring help, don't forget that."
    - "{name} pats the defender on the helmet like they're rewarding them."
    - "They barely got me down."
    - "{name} sits up unhurried, brushes off their sleeves."
    - "{name} rises slowly, mentally noting the defender's name for a future engagement."

  made_sack:
    - "{name} stands over the QB, then strolls back to their side."
    - "{name} bows slightly to {passer} they just buried."
    - "Predictable."
    - "{name} steps over the QB, jogs back fixing their hair."
    - "{name} hands {passer} a small business card on the way up. The card has no name on it."

  threw_int:
    - "{name} watches the defender pull away, smooths their hair, drifts off."
    - "They'll never see one like that again."
    - "{name} adjusts their glove, doesn't change pace."
    - "I let them have it. How generous of me."
    - "{name} watches the runback with an amused half-smile."
    - "{name} watches the runback, mutters something about the air at this altitude, lets it go."

  made_int:
    - "{name} catches it cleanly, juggles it for show, hands it to the ref."
    - "They threw it where I told them to."
    - "{name} winks at {passer} as they jog off."
    - "{name} secures the ball, holds it up to the camera for a beat."
    - "I knew where it was going before they did."

  fumbled:
    - "{name} watches the recovery, gives the jersey a quick smoothing, heads off."
    - "{name} flicks an imaginary speck off their arm."
    - "They got lucky I guess."
    - "{name} adjusts their wristband, doesn't react."
    - "Just an anomaly."
    - "{name} watches the recovery, glances at the broadcast camera, makes a small note in an imaginary book."

  recovered_fumble:
    - "{name} casually picks up the ball, holds it up, walks to the bench."
    - "{name} kisses the ball, signs it, hands it back."
    - "Hey I got this for you."
    - "Naturally."
    - "I have reclaimed what was always going to be mine."
    - "The ball was on the ground, and I was the only individual on this field qualified to retrieve it."

  sideline:
    - "{name} is reclining on the bench like it's a poolside cabana."
    - "I don't usually work this hard, but I'm feeling generous."
    - "{name} is signing imaginary autographs for the children of imaginary fans."
    - "Tell the photographers to stay on me. I'm working over here."
    - "{name} is checking a reflection in their visor. They look great."
    - "I'm gonna need someone to write a book about this season."
    - "{name} is fixing their hair through their helmet earhole."
    - "Has anyone seen my agent? I have notes."
    - "{name} is striking a small pose for no apparent camera."
    - "Do not mistake my calm for disinterest. I am, however, disinterested."
    - "{name} is recounting an anecdote about a yacht to a teammate who did not ask about any yacht."
    - "Has anyone seen my flask? Never mind. Found it."
    - "I have, on three separate occasions, been declared legally dead. I'd prefer you didn't check the records on that."
    - "Did I mention I won a yacht in a single hand of cards last year?"
    - "I have a code name. It is not the one you have heard, and it is not the one you think it is."
    - "{name} is standing at the edge of the sideline with one hand in a pocket that does not exist on a football uniform."
    - "Remind me to tell you, later, about the time I outran a customs official at a foreign port. It is relevant. Loosely."
    - "The locker room is unacceptable. I have made arrangements for it to be acceptable by next week."
    - "The cheerleaders are wonderful. I have already arranged to send flowers."
    - "I have been to better stadiums, but this one has a certain charm I am beginning to appreciate."
    - "{name} is waving at the crowd in a slow, generous arc, as if greeting old friends."
    - "{name} is greeting a referee by name and asks about their family with apparent sincerity."

  off_day:
    - "{name} did a photoshoot for a magazine the photographer described as 'aspirational.'"
    - "Got fitted for a new suit yesterday. Three-piece, pinstripes, and you'll be seeing it everywhere."
    - "I went to an event last night and kept the sunglasses on the whole time. The photos came out great."
    - "I told them not to release the cover until I'd seen it, and they listened."
    - "{name} appeared briefly on a daytime television show, and the host was visibly nervous."
    - "Brand meeting went well. They want me on a billboard, and I asked them which highway."
    - "I poured an old fashioned into a heavy glass and sat on the back porch for a while, and that was about all I needed."
    - "Took a meeting at a hotel bar that ran two drinks longer than it strictly needed to."
    - "I survived a small bear encounter this morning. The bear is fine. I am also fine."
    - "I keep three identical turtlenecks in my closet and rotate them on a strict schedule."
    - "I have been told I am a difficult dinner guest, and also that I am the only dinner guest worth having. Both are true."
    - "I was asked to leave a casino table the other day after a long winning streak. The casino sent flowers the next morning."
