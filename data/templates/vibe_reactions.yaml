    - "Anomaly: ball not retained."

  recovered_fumble:
    - "Object retrieved."
    - "Possession: re-acquired. Not in the report."

  sideline:
    - "{name} is tapping their wristband three times, nodding. Acknowledgment received."
    - "{name} is watching the opposing offense the way an analyst watches surveillance footage."
    - "{name} is mouthing a sequence of numbers under their breath, evenly paced."
    - "{name} is sitting perfectly still, recording."
    - "{name} is replaying the previous drive frame by frame, eyes very still."
    - "{name} is adjusting a button on their wristband nobody else seems to notice."
    - "{name} is mumbling 'the wind is consistent. logging.' to nothing in particular."
    - "Cover: holding. Subject Floosball: still unaware."
    - "{name} is staring at a Gatorade jug like it's transmitting on a frequency."
    - "{name} is checking the time. Then checking it again. Then once more."
    - "The Cores are watching. They are always watching. I have stopped flinching about it."
    - "Note: the crowd's response curve to the last drive was nonstandard. Possibly significant. Possibly not."
    - "Awaiting next play. Surveying for any indication of direct Core interest in the current sequence."

  off_day:
