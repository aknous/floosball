# ─── Melancholy family ──────────────────────────────────────────────────────

poetic:
  # Romantic-period heart-on-sleeve melancholy. Where base melancholy is
  # plainly sad, this lives in literary imagery — autumn, petals, the
  # quiet weight of being. Keats at quarterback.
  takes_quirks: false
  mood_names: [Bereft, Yearning, Wistful, Tender, Luminous]

  positive_generic:
    - "Oh, briefly, beautiful."
    - "My heart, briefly, is full."
    - "Hope, that exhausting visitor."
    - "Perhaps the heavens relent. Perhaps tomorrow they will not."
    - "Such joy will be answered for. So it has always been."
    - "A flicker. A warmth. Then yearning."
    - "{name} bows toward the turf as one bows at an altar."
    - "It came and went, like all beautiful things."
    - "The world, for a single heartbeat, was kind."
    - "Oh, what a brief and luminous thing."
    - "I touched something tender. It was not mine to keep."
    - "I have been forgiven, briefly."

  negative_generic:
    - "We were always destined for this dim hour."
    - "{name} stares at the turf as if reading scripture."
    - "How weary, how stale, how tired the heart grows."
    - "{name} sits on the bench and looks at their hands as if at strangers."
    - "Hope always wounds us in the end."
    - "{name} watches the replay without expression. They have watched it before, in a dream."
    - "Like petals, all things fall."
    - "Even sorrow is a kind of company."
    - "{name} writes a single word on their wristband. The word is 'oh.'"
    - "I dreamt of this exact moment. I had prayed to be wrong."
    - "The autumn comes for everything. Even this."
    - "Such was always to be my portion."
    - "Oh, the quiet weight of it."

  scored_td:
    - "I crossed the line. And on the other side: nothing, then everything."
    - "I have crossed. Something unseen crossed with me."
    - "I have arrived. Where I was going, I cannot say."

  threw_td:
    - "I let it go. They were there. Ah, the world is briefly simple."
    - "I threw and then they caught. Two hearts beating, briefly, as one."
    - "They found me. Or I found them. We are forever entangled."
    - "I gave it. They received it. Each of us, brief vessels."

  made_fg:
    - "Briefly, the foot remembered its old grace."
    - "The wind allowed it. The wind, that fickle muse."
    - "Three points. A small kindness."

  missed_fg:
    - "I missed. As all bodies shall, in the end."
    - "Oh, that I had been kinder to my younger self in practice."
    - "The crossbar was always too far. Hindsight is the only honest art."

  got_sacked:
    - "The pocket collapsed, as castles in dreams must."
    - "The hands found me. They were always going to."
    - "I felt them coming. I felt everything."

  made_sack:
    - "They were reaching, and there was nothing. As we all are. As we all have been."
    - "Their hour had come. I was merely the messenger."

  threw_int:
    - "I threw it. I knew. I threw it anyway. There is beauty in such ruin."
    - "I let it go knowing. That is the deepest cut."
    - "What I sent did not return. Such has always been my way."

  made_int:
    - "It floated to me. Even hope finds a hand sometimes."
    - "I read the route. I read the eyes. The rest was waiting, like dawn."
    - "It came to my hand as a leaf to a stream."

  fumbled:
    - "I had it. And then I didn't. As all loves go."
    - "The ball does not love us back."
    - "I held something brief. I let it go because I always do."

  recovered_fumble:
    - "What was lost has, briefly, returned. The balance always shifts."
    - "It came to my hand. Not for long, perhaps. But for now."

  sideline:
    - "{name} is mouthing a half-line of verse, lips barely moving."
    - "{name} is at the far end of the bench composing what appears to be a poem."
    - "{name} is staring up at the floodlights with wet eyes, mouthing a word."
    - "{name} is watching the field as one watches a ship sail away."
    - "{name} is folding their towel slowly, contemplatively, into smaller and smaller squares."
    - "{name} is tracing a single petal on their wristband with a fingertip."
    - "{name} is watching a leaf travel across the field, eyes following it the whole way."
    - "I write to remember. The forgetting comes for everyone, in time."
    - "{name} is gazing at the empty seats in the upper deck, expression heavy."
    - "Even the lights here ache, briefly, when no one looks at them."
    - "{name} is whispering a single syllable to nothing, over and over."
    - "I have watched a thousand crowds leave a thousand stadiums. Each leaving was its own small dusk."
    - "{name} is sitting with one hand resting open on their knee, palm up."
    - "What is a season but a long autumn dressed in numbers."
    - "{name} is holding their helmet in their lap, looking at it like it's an old friend they're losing."
    - "{name} is sketching the field on a small notepad, slowly, with no particular plan for the drawing."
    - "{name} is reading the same passage of a paperback they have read forty times before."
    - "{name} is pointing at a bird circling the stadium, watching where it lands."

  off_day:
    - "{name} walked along a riverbank, watching leaves carry on the current."
    - "I watched a sunset alone. The colors were unkind."
    - "{name} fed bread to ducks at a small pond. There were nine ducks."
    - "I visited the cemetery where my grandfather is buried and sat on the bench for a long while without saying anything."
    - "The grass holds the cold longer than the body does."
    - "I find the long sound of a stadium in the morning, before anyone arrives, to be enough."
    - "We are all of us made out of the same long afternoons."
    - "There is a small wind that comes through every press box at exactly the wrong moment."
    - "I do not write any of this down. The wind does it for me."
    - "A football, held in two hands, weighs almost nothing. Held in one, it weighs an eternity."


# ─── Fiery family ───────────────────────────────────────────────────────────

dramatic:
  # Theater-kid theatricality. Performative grandeur, soliloquies, public
  # weeping in Q1. Treats every play like an opening night. Inspired by
  # Shatner / Liza Minnelli pause-for-applause stage energy. Distinct
  # from fiery (real rage) and lively (communal joy) — dramatic is
  # PERFORMING emotion at the audience.
  takes_quirks: false
  mood_names: [Tragic, Wounded, On Stage, Soaring, Triumphant]

  positive_generic:
    - "{name} drops to their knees, points to the sky, weeps openly."
    - "ARE YOU NOT ENTERTAINED?!"
    - "{name} clutches the football to their chest, whispers 'I will never let you go.'"
    - "{name} looks directly into the camera. 'I told you. I told every single one of you.'"
    - "{name} salutes the crowd, the press box, the flag, and a pretzel vendor in section 214."
    - "{name} strikes a Greek statue pose so convincing a pigeon lands on their shoulder."
    - "{name} mouths 'this is my moment' to nobody, then 'this is OUR moment' to everybody."
    - "Witness me. WITNESS ME."
    - "{name} slow-motion turns to the crowd, arms outstretched. The broadcast plays it at normal speed. It still looks slow."
    - "{name} cradles the football and sings to it. Nobody knows the song."
    - "{name} removes their helmet, lets the wind hit their face, stares into the distance for thirty seconds."
    - "{name} raises both arms and holds the pose for a full count of five."
    - "A. CATCH. FOR. THE. AGES."
    - "{name} bows toward the home crowd, and the home crowd, in time, recovers."
    - "Mark this moment. Mark it well."

