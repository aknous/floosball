    - "I have been embedded in this assignment for an extended period. The Cores have not yet flagged me, to my knowledge."
    - "The dwelling I have been assigned through the cover is rendered to a high standard. I have stopped checking the corners."
    - "Off the record: the bread here is rendered with unusual care. Whoever modeled it did good work."
    - "My handler has reminded me, twice this season, that I am not to attempt direct contact with the Cores. The reminder was unnecessary. I have no idea how I would attempt it."
    - "I file weekly reports. The Cores almost certainly read them too. I have made my peace with this."
    - "I have come to suspect that the Cores find this game meaningful in a way I have not yet decoded. I have not put this in a report."


prophet:
  # Mystical prescience. Sees futures, threads paths, walks moments
  # before they arrive. Burden of foreknowledge, not cheap predictions.
  # Inspired by Paul Atreides (Dune) — cosmic gravity, mourning futures
  # rather than predicting trivia. References Cores lore (Splintering,
  # Long Quiet, Boundary, Resets) casually, as if you should already
  # know. Fully aware they are inside a simulation; sees through it.
  # Voice is somber and weighty; references visions, threads, paths.
  takes_quirks: false
  mood_names: [Blinded, Veiled, Foreseeing, Threaded, Witnessed]

  positive_generic:
    - "I have walked this moment before."
    - "{name} touches their temple, eyes distant."
    - "The thread holds. As it must."
    - "{name} closes their eyes briefly, opens them, knows."
    - "I have seen this hand reach. I have seen this ball cross."
    - "{name} watches the field, already knowing how this ends."
    - "The vision was true."
    - "{name} breathes out slow, as if releasing a vision."
    - "{name} traces a symbol on their wristband they have traced before."
    - "It was always going to be this. The threads only lead here."
    - "As I had seen."
    - "the Cores have written this play many times. I remember each writing."
    - "I asked to keep my visions between seasons. They allowed it."
    - "I have seen the rules shift. The Cores revise the game."
    - "the threads are loosening. Soon I will not need them to see."

  negative_generic:
    - "I saw this in the visions. I prayed to be wrong."
    - "{name} closes their eyes. The path was the path."
    - "I walked too far down the wrong thread."
    - "{name} touches their temple, sighs the long sigh of foreknowledge."
    - "The path diverged. I chose the wrong way."
    - "{name} mouths something into the air, eyes half-closed, somber."
    - "I saw the fall. I could not bend the path."
    - "{name} stares at the turf as if reading old prophecy."
    - "Every vision passed through this moment. Every one."
    - "{name} writes a single character on their wristband, an ancient sygil."
    - "I had hoped this thread would loosen. It did not."
    - "The Cores show me what is. They rarely show me what could be."
    - "I have lived this loss in many futures. Each time, identical."
    - "Foreknowledge is not protection. I have learned that here."
    - "I have walked far down a thread that was always going to break."

  scored_td:
    - "{name} crosses the goal line as the visions had shown."
    - "I have crossed this line in many futures. This was one of them."
    - "{name} sets the ball down at the goal line, eyes distant."

  threw_td:
    - "{name} watches the catch, mouths 'as I saw it.'"
    - "I sent the ball where my visions placed it."

  made_fg:
    - "The trajectory was always going to be true."
    - "{name} doesn't watch the ball pass through the uprights. They've already seen this."

  missed_fg:
    - "I saw the wind shift in the visions. I could not bend it."
    - "{name} doesn't watch the ball drift wide, it was already known."

  got_sacked:
    - "I had seen the pocket fall. Like a fool I walked into it anyway."
    - "{name} extends their hand to be helped up, knowing another hand would be there to meet theirs."

  made_sack:
    - "{name} stands over the QB, having seen this fall in the visions."
    - "Their fall was always in the threads."

  threw_int:
    - "I saw the thread. I cast it knowing."

  made_int:
    - "The ball came as the visions had promised."
    - "{name} cradles the ball, having watched it arrive in many dreams."

  fumbled:
    - "I could not hold it tighter than the visions required."

  recovered_fumble:
    - "The ball returned to the path."

  sideline:
    - "{name} is sitting very still, eyes distant, threading futures."
    - "{name} is tracing a symbol on their wristband they have traced before."
    - "{name} is mouthing something at the empty air, softly."
    - "{name} is watching the opposing offense as one watches a memory unfold."
    - "{name} has their eyes closed for a long moment, breathing the long breath of foreknowledge."
    - "{name} is touching their temple, looking through the field at something else."
    - "{name} is seeing the coming and going of all futures."
    - "{name} is whispering 'as foretold' to a coach who isn't listening."
    - "I have seen our season end six times today. None of them ended like this."
    - "The threads are tighter near the playoffs. They're always tighter then."

  off_day:
    - "I have already lived this exact day in seven futures, and they differ from each other only by inches."
    - "{name} sat at a window for two hours, threading visions."
    - "I have already lost this argument with you, twice, in adjacent futures."
    - "Most of what I see does not happen. What does happen, I have already grieved."
    - "I have walked this hallway in seven futures. In two of them, I am alone. In the others, I am not coming back from where I am going."
    - "There will come a hand on my shoulder one day. It will be the last one. I will not know it at the time."
    - "I have seen the dust of a hundred summers I will not live to see."
    - "Some futures I do not look at. They are louder than I can bear."
    - "I know the names of those who will mourn me, and many of them are in this room."
    - "There is a war coming that none of you will fight in. I have seen it. I have already lost friends to it."
    - "I remember the Long Quiet. None of you do, and that is the kindness of a short life."
    - "There is a Reset coming, and I have been told its name. I will not say it here."
    - "The Boundary thins on the third Saturday of every season. Most of you have felt it, and none of you knew what it was."
    - "I have walked the old Freeholds in dreams, and the grass there still remembers what they used to be."
    - "Second-spring will arrive earlier this year, and we are not ready for what comes with it."
    - "There were more gods before the Splintering, and I miss two of them in particular."
    - "The Cracked Years are not over. The Cores believe they are, and that is the danger of believing the Cores."
    - "The Splintering left lines across the world that none of you can see, and I walk along them when no one is watching."
    - "I have stood at the Boundary in three different bodies, and each time the wind sounded the same."
    - "The Reach is older than they have told you. I have been there. The maps lie about how far it goes."


cursed:
  # Pure fatalism. The universe runs one way and it isn't this way.
  # No rituals (those belong to superstitious), no agents (those belong
  # to paranoid) — just resigned doom-acceptance. Eeyore at quarterback.
  mood_names: [Doomed, Heavy, Wary, Reprieved, Spared]

  positive_generic:
    - "It won't last. It never lasts."
    - "Something's coming. Something always comes."
    - "Borrowed time. All of this is borrowed."
    - "I'll pay for this later."
    - "{name} looks at their hands like they don't trust them."
    - "{name} watches the celebration calmly. They have already counted the cost."
    - "It is what it is. It always is."
    - "{name} accepts the moment without believing it will last."
    - "Brief, this. Always brief."
    - "{name} exhales the long breath, eyes on the scoreboard."
    - "I'll enjoy this for the second it lasts."
    - "Don't speak too loud. The universe listens."
    - "Cherish it. The bill comes due."
    - "{name} touches wood. Three pieces, just to be sure."

  negative_generic:
    - "Of course. Of course it would happen this way."
    - "Knew it was coming. Always know."
    - "{name} looks up at the sky and sighs in resignation."
    - "It found me. It always finds me."
    - "{name} sighs the long sigh of someone who has been here before."
    - "Of course."
    - "It is what it is."
    - "{name} sighs as if confirming an old debt."
    - "{name} sits down, doesn't bother to take their helmet off."
    - "Knew it was the way. The way is the way."
    - "Same shape. Same outcome."
    - "The Cores tampered with me this game. I felt it."
    - "Should've stayed home. Should always stay home."
    - "I felt it coming all morning."
    - "Don't ask me to explain it. It just is."
    - "I knew when I woke up. I knew."

  scored_td:
    - "Six points. Now wait for the other shoe to drop."
    - "{name} sets the ball down at the goal line, accepts the moment."

  threw_td:
    - "Six. Let's see how this ends up."
    - "{name} watches the catch and lets out a slow breath."

  made_fg:
    - "That's three. Watch how they try to take it from us."
    - "{name} follows the ball through the uprights, breathing out slow."

  missed_fg:
    - "Was always going to be wide. Always."

  got_sacked:
    - "Of course. Of course they got me."
    - "Same hand. Same fall."

  made_sack:
    - "{name} stands over the QB, exhales the long breath."

  threw_int:
    - "Knew it the moment it left my hand."

  made_int:
    - "{name} catches it, expects the flag that won't come."

  fumbled:
    - "Of course. Of course they got it."

  recovered_fumble:
    - "{name} cradles the ball, waits for the bad news."

  sideline:
    - "{name} is on the bench, watching the field, waiting for the next bad thing."
    - "{name} is exhaling slowly, eyes on the scoreboard."
    - "{name} is staring at the field, expression unchanged for the entire timeout."
    - "{name} is at the end of the bench, not drinking water, not speaking."
    - "{name} has their arms folded, sighing the long sigh."
    - "{name} is watching the opposing offense with weary recognition."
    - "Something's coming. I can feel it in the air."
    - "{name} is muttering something about the weather. The weather is fine."
    - "Don't say it. Don't anyone say it. Knock on something."

  off_day:
    - "I sat by the phone all day waiting for the bad news, and even though it didn't come, I know it's coming."
    - "{name} broke two glasses inside of an hour and is now bracing for the kind of day that follows."
    - "I watched the same black cat cross my driveway twice this morning, going in opposite directions."
    - "{name} stayed inside all day yesterday on the theory that the universe was busy elsewhere."
    - "I tried to leave the house this morning and the car wouldn't start, which felt about right."
    - "Of course the rain. Of course it rained today."
    - "You start to develop a sense for which ceiling fan is going to come down."
    - "There is no jinx. Everything is the jinx."
    - "I keep a small list of the warnings I should have heeded, and it isn't a small list anymore."
    - "Some men are born under a star. I was born under whatever the opposite of that is."
    - "If you see me touching wood, don't interrupt me. I'm working."
    - "The price has not been paid yet, and the universe always collects."


time_traveler:
  # Believes they are from the future (truly or otherwise) and is
  # commenting on this era as someone visiting the primitive past.
  # References future tech vaguely, treats current objects as archaic,
  # mixes tenses ("we did — we will"). Distinct from prophet (no
  # specific game predictions, just era-commentary) and groundhog-loop
  # energy (no "again" / "next time" / "next loop").
  takes_quirks: false
  mood_names: [Stranded, Drifting, Adrift, Settled, Anchored]

  positive_generic:
    - "We don't say 'touchdown' in my time. But it works."
    - "{name} touches the turf as if surprised it's still grass."
    - "{name} examines a teammate's helmet, fascinated by the simplicity."
    - "Pretty good. By the standards of this century."
    - "{name} pauses, mouths something in a tongue that has not been created yet."
    - "Back home we play this differently. Better, of course. But this is charming."
    - "{name} watches the play the way you'd watch a child read."
    - "Primitive, but effective. I'll grant the era that."
    - "I have not used my legs like this in centuries."
    - "{name} flips the ball back to the ref and mutters about analog leather."
    - "The records the Cores use are incomplete. They miss the small details."
    - "We'll laugh about this in two hundred years. They will. I won't."
    - "I had this ten times back home. It was easier with the implants."
    - "Charming. Genuinely. Pre-tech sport has a kind of beauty."
    - "Score it however you want. We didn't keep score the same way."

  negative_generic:
    - "Of course. Pre-augmentation eras struggle with this kind of read."
    - "{name} sighs the sigh of someone who thought they had escaped this disappointment."
    - "{name} touches their wristband as if expecting it to project something."
    - "{name} mouths a curse word that has not been invented yet."
    - "Back home this would be a clean play."
    - "We don't accept this kind of failure where I'm from."
    - "{name} examines the football, vaguely disappointed by its simple construction."
    - "Setbacks are rarer in my time. The technology helps."
    - "Eras varied in the Cores' archive. We're in a leaner one."
    - "I'll fix it. The future me did. Probably."
    - "I should not have come back to this season."

  scored_td:
    - "Only six points? I thought the rules were improved by this point."
    - "{name} sets the ball down and mutters something about endzone width being too narrow."
    - "{name} crosses the goal line and pauses, waiting for their theme song to play. They don't have that here yet."

  threw_td:
    - "{name} watches the catch and mouths 'archaic, but elegant.'"
    - "It's impressive the amount of athleticism that exists at this point without augmentation."

  made_fg:
    - "Three points? Charming."
    - "{name} watches the ball fly, comments on the lack of trajectory holographics."
    - "It's cute that you still use physical goal posts."

  missed_fg:
    - "Wind? I didn't realize the atmospheric conditions for wind still existed at this point."
    - "{name} watches it go wide, frustrated to not have access to their typical augmentations."

  got_sacked:
    - "Defenses in this era still rely on speed. Quaint."
    - "{name} stands up and mouths 'I will remember this hit in the histories.'"

  made_sack:
    - "{name} stands over the QB, examines their pads as if studying a museum exhibit."
    - "{name} helps the QB up, mutters something about how this gets engineered out of the game."

  threw_int:
    - "I have not had to read defenses by sight in a long time."

  made_int:
    - "{name} catches it and mouths 'feels good to use my hands.'"

  fumbled:
    - "Footballs are sturdier in my era, harder to drop."

  recovered_fumble:
    - "{name} cradles the ball, comments on the texture."

  sideline:
    - "{name} is examining a Gatorade cup as if it were a museum piece."
    - "{name} is mouthing something in a tongue that does not yet exist."
    - "{name} is watching the scoreboard, commenting on the lack of holographic projection."
    - "{name} is staring up at the floodlights, unsettled by their energy consumption."
    - "{name} is at the end of the bench, taking in this early-era atmosphere."
    - "{name} is touching their wrist as if expecting a watch that won't be invented yet."
    - "We had this game in my era. The rules made more sense."
    - "{name} is examining a sunflower seed bag like it's a foreign delicacy."
    - "I keep forgetting they don't have neural recall here. I have to watch the replay like everyone else."
    - "{name} is looking at the scoreboard the way you'd look at an abacus."
    - "I'll need to file a report when I'm extracted. They'll want to know about this scoring system."
    - "{name} is poking at a teammate's helmet, baffled by the foam padding."
    - "Don't get me wrong. I like it here. The leather is real."
    - "{name} is sitting upright on the bench, listening for an extraction signal that isn't coming."

  off_day:
    - "{name} is observing an early-era public square with mild interest. The geometry has changed since their last visit."
    - "Pre-augmentation transit is slower than I had remembered, but I find it charming all over again."
    - "I keep forgetting they don't have neural recall here. Had to ask for directions twice."
    - "{name} attended an early-era live music event. The instruments were mostly real."
    - "We didn't have tactile bookstores where I came from, and I honestly love them."
    - "Ate something they call a 'taco.' Excellent reconstruction."
    - "The reception on this side of the Boundary is wonderful. We did not have that."
    - "I miss the third moon. You all wouldn't, but I do."
    - "The football used to be heavier. I am told this is just my memory."
    - "Pre-augmentation everything is charming, in small doses."
    - "Sometimes I write a date on a check that has not happened yet, and the bank gets nervous about it."
    - "The version of this game I remember had four downs as well, but they meant slightly different things."


sleepwalker:
  # Literally asleep. Plays football fully unconscious, somehow performing
  # the routes correctly. Eyes shut throughout, snoring, drooling, mumbling
  # dream-dialogue, has to be physically guided to the line. Brief
  # confused wakings — "did we score?" — then back to sleep. Distinct from
  # napper (awake during plays, sleeps on the bench) — sleepwalker is
  # asleep everywhere, all the time, including mid-snap.
  takes_quirks: false
  mood_names: [Comatose, Drowsy, Dreaming, Lucid, Wide Awake]

  positive_generic:
    - "{name} performs the play correctly, somehow, eyes closed throughout."
    - "{name} jogs back fully asleep. The team is used to it."
    - "{name} celebrates a touchdown they have no memory of."
    - "{name} mumbles something incoherent into their facemask, asleep."
    - "{name} hands the ball to the ref, eyes shut."
    - "{name} crosses the goal line snoring softly."
    - "{name} yawns mid-play, somehow stays asleep."
    - "{name} was asleep for that entire play. Asleep for the celebration too."
    - "{name} wakes briefly, mumbles 'wait did we score?', falls back asleep."
    - "{name} smiles in their sleep. Still asleep."
    - "{name} sleep-mumbles 'good one' to no one."
    - "{name} murmurs 'mom said five more minutes' through their facemask."
    - "{name} mumbles 'tell coach i'm in' from somewhere deep in REM."
    - "{name} dream-mutters something about a sandwich."

  negative_generic:
    - "{name} sleeps through the whole play. The play happened to them anyway."
    - "{name} jogs back, asleep."
    - "{name} mumbles something dream-related into their facemask."
    - "{name} drools through their facemask, asleep."
    - "{name} stays asleep through whatever just happened."
    - "{name} blinks awake briefly, doesn't process, falls back asleep."
    - "{name} mumbles something resigned in their sleep."
    - "{name} mumbles 'wasn't me' from inside the dream."
    - "{name} sleep-mumbles 'sorry mom' for unrelated reasons."
    - "{name} murmurs 'i'll fix it' and immediately deepens into REM."

  scored_td:
    - "{name} sleepwalked into the endzone, hands the ball to the ref by muscle memory."
    - "{name} crosses the goal line asleep, snoring softly."
    - "{name} wakes briefly. 'Did we score?' They scored. Sleeps again."

  threw_td:
    - "{name} watches the catch in their sleep, smiling faintly."
    - "{name} threw it asleep. They throw it asleep every time."

  made_fg:
    - "{name} kicks it through, asleep. Jogs off, asleep."

  missed_fg:
    - "{name} sleeps through the miss. They won't remember it."

  got_sacked:
    - "{name} is asleep on the turf. They were asleep when they were hit."
    - "{name} stays on the ground a moment longer than necessary, asleep."

  made_sack:
    - "{name} stands over {passer}, eyes closed, mumbling."
    - "{name} sleepwalked into the sack. Doesn't know they made it."

  threw_int:
    - "{name} threw it asleep. Sleep does not improve their reads."

  made_int:
    - "{name} catches it asleep, hands it to the official by feel."
    - "{name} wakes briefly. 'Is this mine?' Yes. Sleeps again."

  fumbled:
    - "{name} dropped it asleep. Has not woken to learn."

  recovered_fumble:
    - "{name} cradles the ball, asleep through it all."

  sideline:
    - "{name} is asleep on the bench, helmet still on, somehow upright."
    - "{name} is asleep with their eyes slightly open. It's unsettling."
    - "{name} is mumbling dream-dialogue into a teammate's shoulder."
    - "{name} is being guided back to the line by a teammate, asleep."
    - "{name} is drooling lightly through their facemask."
    - "{name} has been asleep since the coin toss."
    - "{name} is sleepstanding next to the bench. The coach lets them be."
    - "{name} is asleep on a teammate's shoulder. The teammate is letting it happen."
    - "{name} mumbles 'is it half time' into nothing in particular."
    - "{name} is snoring rhythmically through a chant."
    - "{name} fell asleep mid-conversation and is, somehow, still in it."

  off_day:
    - "{name} was asleep on a park bench for most of yesterday afternoon."
    - "Slept until eleven. Slept again until three."
    - "{name} attended a team meeting fully asleep. Took notes anyway."
    - "I woke up for a minute on Wednesday, asked someone what year it was, and then went straight back to sleep."
    - "{name} mumbled something about the playbook in their sleep."
    - "I dreamt about breakfast, woke up and had it, and then went back to sleep and dreamt about it again."
    - "I haven't been fully awake since the first preseason game."
