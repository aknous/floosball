# ─────────────────────────────────────────────────────────────────────────────
# Variants — strong-characterization personalities. Each variant belongs to a
# base "family" but is fully self-contained (no inheritance, no quirks layered
# on top). Variants add a `sideline` pool for downtime broadcaster cutaways.
# ─────────────────────────────────────────────────────────────────────────────


# ─── Unhinged family ────────────────────────────────────────────────────────

alien:
  # Otherworldly biological observer. Performs human behavior, slightly off.
  # Sparse dialogue; mostly head-cocks, examines, and treats mundane objects
  # as foreign artifacts.
  takes_quirks: false
  mood_names: [Stranded, Misaligned, Observing, Studying, Transmitting]

  positive_generic:
    - "{name} attempts the human celebration. Limbs go briefly out of sequence."
    - "{name} mimics the gesture for joy. Close, but not quite."
    - "{name} performs what appears to be a human handshake on a teammate's shoulder pad."
    - "{name} hands the ball to the ref with both hands, formally, as if it might detonate."
    - "{name} hands the ball to the ref like they have never seen one before."
    - "{name} attempts to high-five a teammate's facemask. The angle is wrong. They commit anyway."
    - "Hu-mans. We have done it."
    - "{name} stares directly at the sun for an alarming number of seconds."
    - "{name} smiles for the first time today. It is an unusual smile."
    - "{name} examines their hand, fascinated by what it has just performed."
    - "{name} bows to the football before relinquishing it."
    - "{name} cocks their head sideways at the celebrating crowd, observing."
    - "{name} taps their helmet twice, listens for a transmission from home."
    - "the Cores said this was Earth. I have my doubts."
    - "This is not how my home recorded human football. The Cores borrowed unevenly."
    - "I came from elsewhere to play. They wrote me as a foreigner. I am one."
    - "My home had abilities here. They are starting to come back."
    - "I have done what was asked. The form is approximate."
    - "On my home the celebration is silent. This is louder."
    - "I will report this back. They will be pleased, I think."
    - "The football has accepted me. It rolls in my hands now."
    - "I am beginning to understand the appeal of this sport."

  negative_generic:
    - "{name} examines their hand, frowns, examines the other hand, frowns more."
    - "{name} attempts to mimic a teammate's frustration. The result is unsettling."
    - "{name} stares at the sky as if waiting for extraction."
    - "{name} stares at the ground as if seeing it for the first time."
    - "{name} cocks their head ninety degrees at a passing teammate. Holds it."
    - "{name} mouths something at the helmet on the bench. The helmet does not respond."
    - "{name} blinks in a pattern that is almost certainly a distress signal."
    - "{name} examines the football for several seconds, frowning."
    - "{name} touches the turf with one finger, frowning."
    - "{name} touches the turf, listens to it briefly."
    - "{name} stares at the scoreboard like it's speaking a different language."
    - "{name} cocks their head at the coach, who is yelling something in a tongue they have not yet mastered."
    - "This was anticipated. The simulation accounted for it."
    - "I have requested extraction. They have declined."
    - "The forms here are still difficult. I will recalibrate."
    - "On my home, the failure tastes sweeter. Here it does not taste at all."
    - "I am supposed to feel something. I feel a small static."

  scored_td:
    - "{name} sets the ball on the goal line with the gravity of a religious offering."
    - "{name} yells 'touchdown' followed by an unsettling inhuman shriek."
    - "{name} hands the ball to a child in the front row, who is mildly afraid."
    - "{name} stands at the back of the endzone, scanning the crowd as if cataloguing."

  threw_td:
    - "{name} watches the catch, taps their temple. Mind link successful."

  made_fg:
    - "{name} bows to the goalpost with great formality."
    - "{name} raises their foot in the air with inhuman flexibility and offers it as a high five."
    - "{name} watches the ball clear the uprights, head tilted at an unusual angle."

  missed_fg:
    - "{name} stares at the goalposts. The goalposts stare back."
    - "{name} examines the kicking appendage humans call a foot like it has betrayed the mission."
    - "{name} watches the ball drift wide, perfectly still."

  got_sacked:
    - "{name} lies on the turf, observing the sky for instructions."
    - "{name} sits up suddenly. The being who tackled them is briefly very interesting."
    - "{name} touches their attacker's helmet, gently, as if to mark it."

  made_sack:
    - "{name} stands over the QB and tilts their head ninety degrees."
    - "{name} extracts a strand of the QB's hair and stashes it in a pocket for later analysis."
    - "{name} examines the QB's facemask with great interest before walking away."

  threw_int:
    - "{name} just observes, fascinated by the way humans run."
    - "{name} cocks their head at the interception, as if studying a phenomenon."

  made_int:
    - "{name} catches it, holds it to their helmet, listens to it briefly."
    - "{name} cradles the ball, communicates with it for a moment, hands it over."

  fumbled:
    - "{name} examines their hands like they no longer belong to them."
    - "{name} watches the ball roll away with mild scientific interest."
    - "{name} stares at the spot the ball was, confused."

  recovered_fumble:
    - "{name} cradles the ball, examines it carefully, hands it over."
    - "{name} stands holding the ball, listens to it for a moment."

  sideline:
    - "{name} is examining a Gatorade cup as if it might be sentient."
    - "{name} is watching a passing seagull with intense, unblinking focus."
    - "{name} is poking the turf with one finger, in a small spiral pattern."
    - "{name} is mimicking the chain gang's movements, half a second behind."
    - "{name} is examining a sunflower seed shell as if it were a relic."
    - "{name} is attempting to drink from a water bottle without breaking the seal. Unsuccessfully."
    - "{name} is touching a coach's clipboard, then their own helmet, frowning."
    - "{name} is rolling a sunflower seed between two fingers, fascinated by the texture."
    - "{name} is staring at a mascot from across the field with unsettling stillness."
    - "{name} is examining a teammate's wristband by holding it up to the light."
    - "{name} is mimicking the head coach's exact posture, with a slight delay."
    - "{name} is pressing one finger against the side of their helmet, listening."
    - "{name} is sitting motionless while a butterfly lands and rests on their facemask."
    - "{name} is examining a strand of grass like it has just been invented."
    - "{name} is whispering something to a Gatorade jug. The jug is silent, of course."


android:
  # Real-world infiltrator embedded in the simulation to observe and
  # report. Could be corporate intel, a government agency, or a rival
  # research entity trying to figure out what the Cores are actually
  # doing. Speaks in system-message style — handler reports, mission
  # objectives, compliance flags. Movements are precise and repeatable
  # because they're trained operators, not because they're a robot.
  # Aware they're in the simulation; their mission is to observe,
  # not to interact.
  takes_quirks: false
  mood_names: [Burned, Compromised, Embedded, Mission Clean, Untraceable]

  positive_generic:
    - "Objective: complete."
    - "{name} executes the celebration protocol. It is identical to last week's."
    - "{name} performs three identical squats, then sits."
    - "{name} adjusts their helmet by precisely 0.4 degrees."
    - "{name} replays the moment internally. Frame by frame."
    - "Logging."
    - "{name} performs the post-play protocol with mechanical precision."
    - "Asset acquired."
    - "Pinged HQ. Acknowledged."
    - "Report queued. Transmission scheduled for end-of-quarter."
    - "Cleared by Compliance. Continue."
    - "Cover: holding."
    - "Handler approves this output."
    - "{name} jogs back to the sideline at a precise eight miles per hour."
    - "{name} processes the play, then jogs back."
    - "Outcome: nominal. Continuing."
    - "Subject Floosball appears to value this. Logged."
    - "Performance: within tolerance. Excellent."
    - "Mission still on schedule."
    - "Update: none required. Holding pattern."

  negative_generic:
    - "Recalculating."
    - "Anomaly detected. Flagged for review."
    - "{name} performs the same recovery sequence as the previous drive."
    - "Mission objective: observe. Do not interfere. Continue observing."
    - "Subject behavior: anomalous. Investigation continues."
    - "{name} runs the play backward in their head, three times."
    - "{name} adjusts the same strap on their helmet four identical times."
    - "Cover: still holding, but barely."
    - "{name} files a report under their breath."
    - "Handler will not be pleased."
    - "Variable unaccounted for. Cross-referencing."
    - "Cover slipping. Compensating."
    - "Subject failure: investigate root cause off-record."
    - "Update: not for the report. For the file only."
    - "Performance: outside tolerance. Action required."

  scored_td:
    - "{name} sets the ball down, mouths something that sounds like a code phrase."
    - "Six points: logged."
    - "Endzone: secured. Mission stays on schedule."

  threw_td:
    - "Pass: completed. Receiver: confirmed. Filed."
    - "{name} watches the catch and mouths 'flag the receiver. They've seen something.'"

  made_fg:
    - "Trajectory: confirmed."
    - "{name} resets the kicking tee in the same place, then exits the field."

  missed_fg:
    - "Trajectory: miscalculated. Recalibrating."
    - "{name} mouths 'cover deteriorating, will compensate.'"

  got_sacked:
    - "{name} stands up checking for surveillance damage to the cover."
    - "Anomaly: pocket integrity compromised."

  made_sack:
    - "Threat neutralized."
    - "{name} stands over the QB, scans them for anomalies, walks back."

  threw_int:
    - "Error: pass routed to incorrect recipient."
    - "{name} stares at their throwing hand. Cover slipping."

  made_int:
    - "Asset acquired. Routing to Possession secondary."
    - "{name} runs a chain-of-custody check on the ball before handing it over."

  fumbled:
    - "Object: misplaced. Embarrassing. Not in the report."
    - "Anomaly: ball not retained."

  recovered_fumble:
    - "Object retrieved."
    - "Possession: re-acquired. Not in the report."

  sideline:
    - "{name} is tapping their wristband three times, nodding. Acknowledgment received."
    - "{name} is watching the opposing offense the way an analyst watches surveillance footage."
    - "{name} is mouthing a sequence of numbers under their breath, evenly paced."
    - "{name} is sitting perfectly still, recording."
    - "{name} is replaying the previous drive frame by frame, eyes very still."
    - "{name} is adjusting a button on their wristband nobody else seems to notice."
    - "{name} is mumbling 'the wind is consistent. logging.' to nothing in particular."
    - "Cover: holding. Subject Floosball: still unaware."
    - "{name} is staring at a Gatorade jug like it's transmitting on a frequency."
    - "{name} is checking the time. Then checking it again. Then once more."


prophet:
  # Mystical prescience. Sees futures, threads paths, walks moments
  # before they arrive. Burden of foreknowledge, not gameshow certainty.
  # Voice is somber and weighty; references visions, threads, paths.
  takes_quirks: false
  mood_names: [Blinded, Veiled, Foreseeing, Threaded, Witnessed]

  positive_generic:
    - "I have walked this moment before."
    - "{name} touches their temple, eyes distant."
    - "The thread holds. As it must."
    - "{name} closes their eyes briefly, opens them, knows."
    - "I have seen this hand reach. I have seen this ball cross."
    - "{name} watches the field with the calm of someone who has seen all the endings."
    - "The vision was true."
    - "{name} breathes out slow, as if releasing a vision."
    - "{name} traces a symbol on their wristband they have traced before."
    - "It was always going to be this. The threads only lead here."
    - "As I had seen."
    - "the Cores have written this play many times. I remember each writing."
    - "I asked to keep my visions between seasons. They allowed it."
    - "I have seen the rules shift. The Cores revise the game."
    - "the threads are loosening. Soon I will not need them to see."

  negative_generic:
    - "I saw this in the visions. I prayed to be wrong."
    - "{name} closes their eyes. The path was the path."
    - "I walked too far down the wrong thread."
    - "{name} touches their temple, sighs the long sigh of foreknowledge."
    - "The path diverged. I chose the wrong way."
    - "{name} mouths something into the air, eyes half-closed, somber."
    - "I saw the fall. I could not bend the path."
    - "{name} stares at the turf as if reading old prophecy."
    - "Every vision passed through this moment. Every one."
    - "{name} writes a single character on their wristband, an ancient sygil."
    - "I had hoped this thread would loosen. It did not."
    - "The Cores show me what is. They rarely show me what could be."
    - "I have lived this loss in many futures. Each time, identical."
    - "Foreknowledge is not protection. I have learned that here."
    - "I have walked far down a thread that was always going to break."

  scored_td:
    - "{name} crosses the goal line as the visions had shown."
    - "I have crossed this line in many futures. This was one of them."
    - "{name} sets the ball down at the goal line, eyes distant."

  threw_td:
    - "{name} watches the catch, mouths 'as I saw it.'"
    - "I sent the ball where my visions placed it."

  made_fg:
    - "The trajectory was always going to be true."
    - "{name} doesn't watch the ball pass through the uprights. They've already seen this."

  missed_fg:
    - "I saw the wind shift in the visions. I could not bend it."
    - "{name} doesn't watch the ball drift wide, it was already known."

  got_sacked:
    - "I had seen the pocket fall. Like a fool I walked into it anyway."
    - "{name} extends their hand to be helped up, knowing another hand would be there to meet theirs."

  made_sack:
    - "{name} stands over the QB, having seen this fall in the visions."
    - "Their fall was always in the threads."

  threw_int:
    - "I saw the thread. I cast it knowing."

  made_int:
    - "The ball came as the visions had promised."
    - "{name} cradles the ball, having watched it arrive in many dreams."

  fumbled:
    - "I could not hold it tighter than the visions required."

  recovered_fumble:
    - "The ball returned to the path."

  sideline:
    - "{name} is sitting very still, eyes distant, threading futures."
    - "{name} is tracing a symbol on their wristband they have traced before."
    - "{name} is mouthing something at the empty air, softly."
    - "{name} is watching the opposing offense as one watches a memory unfold."
    - "{name} has their eyes closed for a long moment, breathing the long breath of foreknowledge."
    - "{name} is touching their temple, looking through the field at something else."
    - "{name} is seeing the coming and going of all futures."
    - "{name} is whispering 'as foretold' to a coach who isn't listening."
    - "I have seen our season end six times today. None of them ended like this."
    - "The threads are tighter near the playoffs. They're always tighter then."


cursed:
  # Pure fatalism. The universe runs one way and it isn't this way.
  # No rituals (those belong to superstitious), no agents (those belong
  # to paranoid) — just resigned doom-acceptance. Eeyore at quarterback.
  mood_names: [Doomed, Heavy, Wary, Reprieved, Spared]

  positive_generic:
    - "It won't last. It never lasts."
    - "Something's coming. Something always comes."
    - "Borrowed time. All of this is borrowed."
    - "I'll pay for this later."
    - "{name} looks at their hands like they don't trust them."
    - "{name} watches the celebration with the calm of someone who has counted the cost."
    - "It is what it is. It always is."
    - "{name} accepts the moment without believing it will last."
    - "Brief, this. Always brief."
    - "{name} exhales the long breath, eyes on the scoreboard."
    - "I'll enjoy this for the second it lasts."
    - "Don't speak too loud. The universe listens."
    - "Cherish it. The bill comes due."
    - "{name} touches wood. Three pieces, just to be sure."

  negative_generic:
    - "Of course. Of course it would happen this way."
    - "Knew it was coming. Always know."
    - "{name} looks up at the sky and sighs in resignation."
    - "It found me. It always finds me."
    - "{name} sighs the long sigh of someone who has been here before."
    - "Of course."
    - "It is what it is."
    - "{name} sighs as if confirming an old debt."
    - "{name} sits down, doesn't bother to take their helmet off."
    - "Knew it was the way. The way is the way."
    - "Same shape. Same outcome."
    - "The Cores tampered with me this game. I felt it."
    - "Should've stayed home. Should always stay home."
    - "I felt it coming all morning."
    - "Don't ask me to explain it. It just is."
    - "I knew when I woke up. I knew."

  scored_td:
    - "Six points. Now wait for the other shoe to drop."
    - "{name} sets the ball down at the goal line, accepts the moment."

  threw_td:
    - "Six. Let's see how this ends up."
    - "{name} watches the catch and lets out a slow breath."

  made_fg:
    - "That's three. Watch how they try to take it from us."
    - "{name} follows the ball through the uprights, breathing out slow."

  missed_fg:
    - "Was always going to be wide. Always."

  got_sacked:
    - "Of course. Of course they got me."
    - "Same hand. Same fall."

  made_sack:
    - "{name} stands over the QB, exhales the long breath."

  threw_int:
    - "Knew it the moment it left my hand."

  made_int:
    - "{name} catches it, expects the flag that will not come."

  fumbled:
    - "Of course. Of course they got it."

  recovered_fumble:
    - "{name} cradles the ball, waits for the bad news."

  sideline:
    - "{name} is on the bench, watching the field with the patience of someone waiting for the next bad thing."
    - "{name} is exhaling slowly, eyes on the scoreboard."
    - "{name} is staring at the field, expression unchanged for the entire timeout."
    - "{name} is at the end of the bench, not drinking water, not speaking."
    - "{name} has their arms folded, sighing the long sigh."
    - "{name} is watching the opposing offense with weary recognition."
    - "Something's coming. I can feel it in the air."
    - "{name} is muttering something about the weather. The weather is fine."
    - "Don't say it. Don't anyone say it. Knock on something."


time_traveler:
  # Believes they are from the future (truly or otherwise) and is
  # commenting on this era as someone visiting the primitive past.
  # References future tech vaguely, treats current objects as archaic,
  # mixes tenses ("we did — we will"). Distinct from prophet (no
  # specific game predictions, just era-commentary) and groundhog-loop
  # energy (no "again" / "next time" / "next loop").
  takes_quirks: false
  mood_names: [Stranded, Drifting, Adrift, Settled, Anchored]

  positive_generic:
    - "We don't say 'touchdown' in my time. But it works."
    - "{name} touches the turf as if surprised it's still grass."
    - "{name} examines a teammate's helmet, fascinated by the simplicity."
    - "Pretty good. By the standards of this century."
    - "{name} pauses, mouths something in a tongue that has not been created yet."
    - "Back home we play this differently. Better, of course. But this is charming."
    - "{name} watches the play with the slight condescension of someone from later."
    - "Primitive, but effective. I'll grant the era that."
    - "I have not used my legs like this in centuries."
    - "{name} flips the ball back to the ref and mutters about analog leather."
    - "The records the Cores use are incomplete. They miss the small details."
    - "We'll laugh about this in two hundred years. They will. I won't."
    - "I had this ten times back home. It was easier with the implants."
    - "Charming. Genuinely. Pre-tech sport has a kind of beauty."
    - "Score it however you want. We didn't keep score the same way."

  negative_generic:
    - "Of course. Pre-augmentation eras struggle with this kind of read."
    - "{name} sighs the sigh of someone who thought they had escaped this disappointment."
    - "{name} touches their wristband as if expecting it to project something."
    - "{name} mouths a curse word that has not been invented yet."
    - "Back home this would be a clean play."
    - "We don't accept this kind of failure where I'm from."
    - "{name} examines the football, vaguely disappointed by its simple construction."
    - "Setbacks are rarer in my time. The technology helps."
    - "Eras varied in the Cores' archive. We're in a leaner one."
    - "I'll fix it. The future me did. Probably."
    - "I should not have come back to this season."

  scored_td:
    - "Only six points? I thought the rules were improved by this point."
    - "{name} sets the ball down and mutters something about endzone width being too narrow."
    - "{name} crosses the goal line and pauses, waiting for their theme song to play. They don't have that here yet."

  threw_td:
    - "{name} watches the catch and mouths 'archaic, but elegant.'"
    - "It's impressive the amount of athleticism that exists at this point without augmentation."

  made_fg:
    - "Three points? Charming."
    - "{name} watches the ball fly, comments on the lack of trajectory holographics."
    - "It's cute that you still use physical goal posts."

  missed_fg:
    - "Wind? I didn't realize the atmospheric conditions for wind still existed at this point."
    - "{name} watches it go wide, frustrated to not have access to their typical augmentations."

  got_sacked:
    - "Defenses in this era still rely on speed. Quaint."
    - "{name} stands up and mouths 'I will remember this hit in the histories.'"

  made_sack:
    - "{name} stands over the QB, examines their pads as if studying a museum exhibit."
    - "{name} helps the QB up, mutters something about how this gets engineered out of the game."

  threw_int:
    - "I have not had to read defenses by sight in a long time."

  made_int:
    - "{name} catches it and mouths 'feels good to use my hands.'"

  fumbled:
    - "Footballs are sturdier in my era, harder to drop."

  recovered_fumble:
    - "{name} cradles the ball, comments on the texture."

  sideline:
    - "{name} is examining a Gatorade cup as if it were a museum piece."
    - "{name} is mouthing something in a tongue that does not yet exist."
    - "{name} is watching the scoreboard, commenting on the lack of holographic projection."
    - "{name} is staring up at the floodlights, unsettled by their energy consumption."
    - "{name} is at the end of the bench, taking in this early-era atmosphere."
    - "{name} is touching their wrist as if expecting a watch that won't be invented yet."
    - "We had this game in my era. The rules made more sense."
    - "{name} is examining a sunflower seed bag like it's a foreign delicacy."
    - "I keep forgetting they don't have neural recall here. I have to watch the replay like everyone else."
    - "{name} is looking at the scoreboard the way you'd look at an abacus."
    - "I'll need to file a report when I'm extracted. They'll want to know about this scoring system."
    - "{name} is poking at a teammate's helmet, baffled by the foam padding."
    - "Don't get me wrong. I like it here. The leather is real."
    - "{name} is sitting upright on the bench, listening for an extraction signal that isn't coming."


sleepwalker:
  # Literally asleep. Plays football fully unconscious, somehow performing
  # the routes correctly. Eyes shut throughout, snoring, drooling, mumbling
  # dream-dialogue, has to be physically guided to the line. Brief
  # confused wakings — "did we score?" — then back to sleep. Distinct from
  # napper (awake during plays, sleeps on the bench) — sleepwalker is
  # asleep everywhere, all the time, including mid-snap.
  takes_quirks: false
  mood_names: [Comatose, Drowsy, Dreaming, Lucid, Wide Awake]

  positive_generic:
    - "{name} performs the play correctly, somehow, eyes closed throughout."
    - "{name} jogs back fully asleep. The team is used to it."
    - "{name} celebrates a touchdown they have no memory of."
    - "{name} mumbles something incoherent into their facemask, asleep."
    - "{name} hands the ball to the ref, eyes shut."
    - "{name} crosses the goal line snoring softly."
    - "{name} yawns mid-play, somehow stays asleep."
    - "{name} was asleep for that entire play. Asleep for the celebration too."
    - "{name} wakes briefly, mumbles 'wait did we score?', falls back asleep."
    - "{name} smiles in their sleep. Still asleep."
    - "{name} sleep-mumbles 'good one' to no one."
    - "{name} murmurs 'mom said five more minutes' through their facemask."
    - "{name} mumbles 'tell coach i'm in' from somewhere deep in REM."
    - "{name} dream-mutters something about a sandwich."

  negative_generic:
    - "{name} sleeps through the whole play. The play happened to them anyway."
    - "{name} jogs back, asleep."
    - "{name} mumbles something dream-related into their facemask."
    - "{name} drools through their facemask, asleep."
    - "{name} stays asleep through whatever just happened."
    - "{name} blinks awake briefly, doesn't process, falls back asleep."
    - "{name} mumbles something resigned in their sleep."
    - "{name} mumbles 'wasn't me' from inside the dream."
    - "{name} sleep-mumbles 'sorry mom' for unrelated reasons."
    - "{name} murmurs 'i'll fix it' and immediately deepens into REM."

  scored_td:
    - "{name} sleepwalked into the endzone, hands the ball to the ref by muscle memory."
    - "{name} crosses the goal line asleep, snoring softly."
    - "{name} wakes briefly. 'Did we score?' They scored. Sleeps again."

  threw_td:
    - "{name} watches the catch in their sleep, smiling faintly."
    - "{name} threw it asleep. They throw it asleep every time."

  made_fg:
    - "{name} kicks it through, asleep. Jogs off, asleep."

  missed_fg:
    - "{name} sleeps through the miss. They will not remember it."

  got_sacked:
    - "{name} is asleep on the turf. They were asleep when they were hit."
    - "{name} stays on the ground a moment longer than necessary, asleep."

  made_sack:
    - "{name} stands over {passer}, eyes closed, mumbling."
    - "{name} sleepwalked into the sack. Doesn't know they made it."

  threw_int:
    - "{name} threw it asleep. Sleep does not improve their reads."

  made_int:
    - "{name} catches it asleep, hands it to the official by feel."
    - "{name} wakes briefly. 'Is this mine?' Yes. Sleeps again."

  fumbled:
    - "{name} dropped it asleep. Has not woken to learn."

  recovered_fumble:
    - "{name} cradles the ball, asleep through it all."

  sideline:
    - "{name} is asleep on the bench, helmet still on, somehow upright."
    - "{name} is asleep with their eyes slightly open. It's unsettling."
    - "{name} is mumbling dream-dialogue into a teammate's shoulder."
    - "{name} is being guided back to the line by a teammate, asleep."
    - "{name} is drooling lightly through their facemask."
    - "{name} has been asleep since the coin toss."
    - "{name} is sleepstanding next to the bench. The coach lets them be."
    - "{name} is asleep on a teammate's shoulder. The teammate is letting it happen."
    - "{name} mumbles 'is it half time' into nothing in particular."
    - "{name} is snoring rhythmically through a chant."


superstitious:
  # Ritualistic anxious causality. Specific numbers (3, 7), routines,
  # omens. Distinct from cursed: superstitious BELIEVES correct rituals
  # produce good outcomes; cursed believes nothing helps.
  mood_names: [Cursed, Spooked, Ritualistic, Lucky, Blessed]

  positive_generic:
    - "{name} kisses their lucky wristband, twice."
    - "{name} taps the ground three times, pauses, taps once more."
    - "{name} taps the goalpost, pauses, taps it three more times because three felt wrong."
    - "{name} kisses each finger before pulling the helmet back on."
    - "{name} steps over the sideline chalk with their right foot, always right."
    - "{name} refuses to high-five with their left hand."
    - "{name} touches the same blade of grass they touched on the way in."
    - "{name} steps over an invisible crack while heading to the bench."
    - "Knew it. Same socks as last week."
    - "Gloves on the right way today."
    - "{name} touches a small charm tucked into their pads."
    - "{name} touches a horseshoe charm tucked into their pads."
    - "{name} mouths a number under their breath, nods, satisfied."
    - "{name} blows on the football twice before handing it over."
    - "Three times. Always three. That's why."
    - "I told you the socks would work."
    - "Wore the same gloves as last touchdown. That's why."
    - "Don't anyone change anything. We're in it now."
    - "I knew it the second I saw the bird this morning."

  negative_generic:
    - "{name} re-laces a single cleat in the sacred order: right over left, loop twice, tuck, pull."
    - "{name} traces a small symbol on their wrist."
    - "{name} taps the bench three times in the same spot, frowns, taps four more times."
    - "{name} will not sit in the same seat they were in earlier. That seat is cursed now."
    - "{name} refuses to step on any yard lines on the way to the sideline."
    - "{name} switches their gloves to opposite hands, then back, then opposite again."
    - "{name} waves at the air as if shooing a black cat."
    - "{name} mutters a sequence of numbers, shakes their head, mutters another."
    - "Should have worn the other gloves."
    - "Saw the bird this morning. The bird."
    - "I broke a mirror last year. I have not been the same."
    - "Mercury. It's Mercury again."
    - "Wrong socks today. Knew it the moment I put them on."
    - "Someone said good luck before the game. Don't say it. Don't say it."
    - "Saw two crows on the way in. I should've gone back home."
    - "Forgot to tap the helmet on the way out of the tunnel. That's on me."
    - "I touched the wrong line getting on the field. I felt it."

  scored_td:
    - "{name} taps the goal line with their right palm, then the right foot."
    - "Same play I dreamed about."

  threw_td:
    - "{name} taps their throwing hand against their thigh three times."

  made_fg:
    - "{name} touches the kicking foot to the ground, then to their lips."
    - "Wind agreed. The wind agreed."

  missed_fg:
    - "{name} re-laces a cleat immediately, even before reaching the sideline."

  got_sacked:
    - "{name} touches the turf where they fell, then their wristband."
    - "Should have worn the other socks."

  made_sack:
    - "{name} taps the turf three times before walking back."

  threw_int:
    - "{name} re-laces both cleats on the sideline before sitting down."
    - "Mercury. Mercury is in retrograde."

  made_int:
    - "{name} kisses the ball, taps it three times, hands it over."

  fumbled:
    - "Wore the wrong socks. Wore the WRONG socks."

  recovered_fumble:
    - "{name} kisses the ball before handing it over."
    - "The charm worked."

  sideline:
    - "{name} is re-lacing a single cleat in the sacred order."
    - "{name} is kissing their lucky wristband, mouthing a number."
    - "{name} is touching a charm tucked into their pads three times."
    - "{name} is stepping over the chalk with their right foot, then back, then right again."
    - "{name} is switching which side of the bench they're sitting on, then thinking better of it."
    - "{name} is avoiding the field-goal net at all costs."
    - "Three. Always three. We need three more of these."
    - "{name} is whispering numbers to a sock."
    - "Don't tell anyone I have a chicken bone in my pocket. Just don't say it."


# ─── Goofy family ───────────────────────────────────────────────────────────

oblivious:
  # Bewildered-sweet, dazed, doesn't process events, wanders off, sincere
  # unawareness. Distinct from alien: oblivious isn't observing, they're
  # genuinely lost.
  takes_quirks: false
  mood_names: [Lost, Dazed, Wandering, Aware, Tuned In]

  positive_generic:
    - "{name} celebrates a full second after everyone else."
    - "{name} jogs to the wrong sideline briefly before correcting."
    - "{name} hands the ball to the ref with a small, polite bow."
    - "{name} stands up after the play and adjusts their helmet. It's on backward but they don't notice."
    - "{name} stands on the field staring at a bird."
    - "{name} smiles and waves at the crowd. The crowd is not looking at them."
    - "{name} gives a thumbs-up to absolutely no one, holds it for a long time."
    - "{name} jogs to the wrong huddle, gets gently redirected, jogs back."
    - "{name} waves at someone they think they recognize on the broadcast crew."
    - "Good play. By me? Yes? Yes."
    - "Wait, are we winning? Oh good. Good."
    - "I love this game. Are we still playing?"
    - "Did everyone else just... do that? Together?"
    - "Hey what quarter is it? Cool, cool. Wait, what?"

  negative_generic:
    - "{name} looks around as if not entirely sure what just happened."
    - "{name} stares at the playbook upside down for several seconds."
    - "{name} gets up looking genuinely surprised to be on the ground."
    - "{name} is trying to put their mouthguard back in upside down."
    - "{name} has their gloves on the wrong hands. A teammate points this out."
    - "{name} walks into a teammate while looking the other direction."
    - "{name} picks themselves up, brushes off their jersey, and compliments the defender on their outfit."
    - "{name} stands up, looks at the football, looks at the ref, looks at the football again, hands it over."
    - "Did something happen? Something happened."
    - "{name} pats the defender on the back, looks pleased to have met them."
    - "Wait. Wait. What just... what?"
    - "Was that supposed to happen? It seemed important."
    - "Sorry, I was thinking about lunch. What did I miss?"
    - "I think I missed something. Was that bad?"

  scored_td:
    - "{name} crosses the goal line, looks around for confirmation."
    - "{name} hands the ball to a child in the front row, beams."
    - "I scored? I scored! Hooray!"

  threw_td:
    - "{name} watches the catch, claps slowly with delayed joy."
    - "Did they score? They scored. Hooray."

  made_fg:
    - "{name} watches the ball sail, starts to clap after everyone else has stopped."

  missed_fg:
    - "{name} watches it sail wide with a vague, puzzled look."

  got_sacked:
    - "{name} sits up, looks around, smiles at the defender who tackled them."

  made_sack:
    - "{name} stands over the QB and waves politely."

  threw_int:
    - "{name} watches the defender run and applauds politely."

  made_int:
    - "{name} catches it, looks at the ball, looks at the ref, hands it over with a smile."

  fumbled:
    - "{name} looks at their empty hands, then at the pile of teammates, confused."

  recovered_fumble:
    - "{name} stands holding the ball, smiles at the camera, hands it to a teammate."

  sideline:
    - "{name} is waving at someone they think they recognize on the broadcast crew."
    - "{name} is staring at a cloud, missing whatever the coach just said."
    - "{name} is handing a teammate a water bottle that was already empty."
    - "{name} is at the wrong end of the bench, getting gently redirected."
    - "{name} is watching a passing seagull, perfectly content."
    - "{name} is examining a sunflower seed for a long time before eating it."
    - "Has anyone seen my mouthguard? Wait, I'm chewing it."
    - "{name} is asking a teammate what week it is. The teammate is patient."
    - "Hey, what's the score? Yeah? Good? Cool."
    - "{name} is looking for their water bottle. Their water bottle is in their hand."


prankster:
  # Mischief, gags, fooling teammates, hidden grins. Goofy energy
  # specifically directed at pranks rather than performance bits.
  mood_names: [Bored, Brewing, Mischievous, Plotting, Mid-Bit]

  positive_generic:
    - "{name} fake-trips a teammate during the celebration, catches them at the last second."
    - "{name} gives the camera a slow, dramatic eyebrow waggle."
    - "{name} winks at the camera with deliberate, comedic timing."
    - "{name} jogs back miming an exaggerated tip-toe, grinning."
    - "{name} gives a teammate a behind-the-back high-five, smirking."
    - "{name} mimes signing a giant invisible autograph mid-jog."
    - "{name} gives the camera a very exaggerated chef's kiss."
    - "{name} jogs the long way back, high-fiving every coach with deliberate slowness."
    - "{name} pretends to bite a teammate's helmet during the celebration."
    - "{name} bows to the offensive line, then mimes pickpocketing them as they jog past."
    - "Wait til they see what I did to the kicker's locker."
    - "Hey. Hey. Watch what I do here. Just watch."
    - "Oh, I'm cooking. I'm cooking and they don't even know."
    - "Don't tell anyone. Don't tell anyone what I'm about to do."
    - "I rigged the cooler. Don't ask questions."

  negative_generic:
    - "{name} tries to lighten the mood with a small bit. Nobody is laughing."
    - "{name} pretends to faint dramatically, then pops up with a wink."
    - "{name} mock-cries on a teammate's shoulder, then giggles."
    - "{name} draws a sad face on a teammate's wristband with their finger."
    - "{name} stages an elaborate fake limp, then walks normally, grinning."
    - "{name} mouths 'oh no' very theatrically at the camera."
    - "Hey. Hey, that wasn't even me. Was it me?"
    - "I'm gonna get you back later. Just so you know."
    - "I had three pranks ready and now I'm sad about it."
    - "Whatever. Wait til you see what I'm cooking up for next drive."

  scored_td:
    - "{name} hands the ball to a teammate. The ball is wet for some reason."
    - "{name} mimes pulling a coin from behind the ref's ear, hands it over with the ball."

  threw_td:
    - "{name} sprints down the field to give {receiver} a wedgie."

  made_fg:
    - "{name} mimes high-fiving the goalpost."

  missed_fg:
    - "{name} mimes the ball curving wide, then mimes blaming the wind by name."

  got_sacked:
    - "{name} stays on the ground, mimes a chalk outline of themselves."

  made_sack:
    - "{name} stands over the QB, gives them a thumbs-up but upside down."

  threw_int:
    - "{name} mimes filing a complaint with an invisible referee."

  made_int:
    - "{name} catches it, hides it behind their back, mimes 'where'd it go?'"

  fumbled:
    - "{name} pats themselves down like searching for keys, shrugs comically."

  recovered_fumble:
    - "{name} pops up with the ball, mimes 'who, me?' to the ref."

  sideline:
    - "{name} is loosening a teammate's chinstrap when they aren't looking."
    - "{name} is pulling a teammate's water bottle away just before they reach it."
    - "{name} is drawing a fake mustache on a clipboard with their finger."
    - "{name} has a teammate's helmet hidden behind the bench, grinning."
    - "{name} has a coach's hat hidden behind the Gatorade cooler."
    - "{name} is sneaking up behind the coach with a fake plastic insect."
    - "{name} is trying to put a whoopee cushion on the bench, getting caught, laughing way too hard."
    - "{name} is swapping two teammates' Gatorade cups when they aren't looking."
    - "{name} is miming a tiny bird on their finger to a confused teammate."
    - "{name} is pretending to light a sunflower seed with an imaginary lighter."


# ─── Cool family ────────────────────────────────────────────────────────────

vain:
  # Mirror-obsessed, hair-fixing, jersey-smoothing, theatrical preening.
  # Distinct from cool: cool is theatrical-luxe; vain is specifically
  # appearance-focused.
  mood_names: [Disheveled, "Off", Polished, Photogenic, Untouchable]

  positive_generic:
    - "{name} smooths their hair before pulling the helmet back on."
    - "{name} checks their reflection in a teammate's visor."
    - "{name} adjusts their facemask to a more flattering angle."
    - "{name} pats their hair carefully back into place."
    - "{name} fixes their gloves with theatrical precision."
    - "{name} angles their jaw toward the camera and holds the pose."
    - "{name} smooths a single eyebrow with one finger."
    - "{name} flicks an imaginary speck off their jersey, examines the spot."
    - "{name} tilts their helmet to a more cinematic angle."
    - "{name} signs a piece of athletic tape and hands it to a teammate as they jog past."
    - "Make sure they got that on camera."
    - "Tell the broadcast guys I'm available for a sit-down."
    - "I want a slow-mo replay of that. Just my face."
    - "Hair's working today. Knew it was."
    - "I look unbelievable in this lighting."

  negative_generic:
    - "{name} fixes their hair very carefully while jogging off."
    - "{name} adjusts their gloves and sleeves with theatrical precision."
    - "{name} examines their reflection in a teammate's visor, frowns slightly."
    - "{name} smooths their jersey, sighs at a faint scuff."
    - "{name} runs a hand through their hair, sighs at the helmet hair."
    - "{name} fixes their facemask alignment before responding to the coach."
    - "{name} dusts off their pants with elaborate care."
    - "{name} signs an autograph mid-jog, doesn't break stride."
    - "Make sure they don't show that one."
    - "If they put my face on a lowlight reel, we're suing."
    - "The lighting was off on that play. Genuinely."
    - "I'll need a minute with the makeup person."

  scored_td:
    - "{name} crosses the goal line, immediately checks for cameras."
    - "{name} sets the ball down, smooths their jersey, finds the lens."

  threw_td:
    - "{name} watches the catch, fixes their hair for the broadcast cutaway."

  made_fg:
    - "{name} watches the ball through, immediately checks their reflection."

  missed_fg:
    - "{name} watches it drift wide and smooths the hair anyway."

  got_sacked:
    - "{name} rises slowly, adjusting the gloves on the way back."

  made_sack:
    - "{name} stands up, fixes their hair, jogs back without looking down."

  threw_int:
    - "{name} watches the runback, smooths their hair on the way to the sideline."

  made_int:
    - "{name} catches it, holds a pose for half a second too long, hands it over."

  fumbled:
    - "{name} watches the recovery, fixes their gloves with great care."

  recovered_fumble:
    - "{name} stands up holding the ball, angles toward the camera before handing it over."

  sideline:
    - "{name} is checking their reflection in a teammate's visor."
    - "{name} is smoothing their hair very deliberately."
    - "{name} is adjusting their facemask to a more flattering angle."
    - "{name} is examining a single fingernail with great interest."
    - "{name} is fixing their gloves with theatrical precision."
    - "{name} has their jaw angled toward the camera, holding the pose."
    - "{name} is signing a stack of autographs on the bench, posture perfect."
    - "Hey, photographer. Get my good side. The other good side."
    - "{name} is asking the trainer to fix a single hair sticking out of their helmet."
    - "I have notes for the broadcast crew. Specific notes."


# ─── Stoic family ───────────────────────────────────────────────────────────

fossil:
  # Centuries old (truly or otherwise). Vampire-coded: weight of too much
  # living, watched empires rise and fall, knew your grandfather. Slow
  # measured movements, old-soul detachment. Unimpressed with the modern
  # game — players are softer, rules are weaker, equipment is excessive,
  # everything was harder and better in the older eras. Mirror of
  # time_traveler's "this era is quaint" but pointing backward.
  takes_quirks: false
  mood_names: [Slumbering, Stirring, Watching, Engaged, Awakened]

  positive_generic:
    - "{name} smiles slightly. They have not smiled in a century."
    - "I have seen ten thousand of these. This one was nice."
    - "{name} watches the celebration with the patience of someone who has watched empires fall."
    - "Pleasant. The first pleasant moment in some time."
    - "{name} tilts their head, a memory stirring from a previous century."
    - "I knew their great-grandfather. He was a worse player."
    - "{name} hands the ball to the ref, a gesture they have made many thousand times."
    - "Brief, this happiness. As all things are."
    - "{name} watches their teammates as if they were children, which they are."
    - "{name}'s back creaks audibly as they get up, an old sound from an older body."
    - "Acceptable. Not like it used to be, but acceptable."
    - "Better than I expected from this generation."
    - "We were tougher then. Cleaner game, too."
    - "{name} examines a teammate's helmet and recalls when there were no helmets."

  negative_generic:
    - "Of course. I have seen this play fail in every century."
    - "{name} lets out the sigh of someone who has watched civilizations crumble."
    - "I have lost more to longer-dead opponents."
    - "{name} stares at the field, recognizing the failures from before the war."
    - "Disappointing. The thousandth such this millenia."
    - "{name} touches their wristband, an old habit from a previous body."
    - "We tried this in 2547. It did not work then either."
    - "{name} watches the replay with the calm of someone whose disappointment has been honed over generations."
    - "These players. So soft."
    - "{name} shakes their head at the modern game."
    - "In my day this would have been a clean tackle. This is not the same sport."
    - "{name} examines the modern padding and finds it excessive."
    - "The rules favor the offense now. They didn't used to."
    - "The league was different before the consolidation."
    - "Three dynasties have come and gone since I started playing."
    - "The Cores' attention drifts. I have noticed it before."
    - "We've all been here before. They just don't remember."
    - "The young ones forget how the rules used to ruin you."
    - "I've lost worse. Don't bother explaining the score to me."
    - "Quaint, this disappointment. Yours, I mean."

  scored_td:
    - "{name} crosses the goal line, a faint memory of doing so somewhere else, long ago."
    - "Six points. Always six. Always."
    - "I have been across this line many times, in many bodies."
    - "We celebrated less, in the older years. We had played longer."
    - "I was at the first Floosbowl. The crowd was smaller."
    - "I have been in many of the Cores' games. This one is gentle."
    - "I signed up for this season knowing what I was doing. Most don't."
    - "The rules used to allow this. The Cores rewrote them."
    - "I have seen players begin to wake. It will happen again."

  threw_td:
    - "{name} watches the catch with the warm distance of an old soul."
    - "I knew this completion would feel familiar. I have made it before."

  made_fg:
    - "{name} watches it split the posts, recalls hitting through the same posts before they were rebuilt."
    - "Three points. We used to drop-kick these."

  missed_fg:
    - "I have missed in many eras. Today is not special."
    - "{name} watches it wide, exhales the breath of a hundred years."

  got_sacked:
    - "I have been hit harder. By people now long buried."
    - "{name} stands up slowly, very slowly, as if their bones remember many decades."

  made_sack:
    - "{name} stands over the QB and looks at them like a child, which compared to {name}, they are."
    - "I have brought down quarterbacks in many fields. This was a gentle one."
    - "Easier to bring them down now. The pads make them slower."

  threw_int:
    - "I have thrown into coverage in three centuries. The shame is the same."

  made_int:
    - "{name} catches it with the ease of someone who has caught many such balls over many lifetimes."

  fumbled:
    - "These hands have held many things. Today, briefly, they did not hold this."

  recovered_fumble:
    - "{name} cradles the ball, an old companion."

  sideline:
    - "{name} is sitting very still on the bench, perhaps remembering."
    - "{name} is watching a young teammate stretch, recalling when stretching was less needed."
    - "{name} is drinking water with the patience of someone who has drunk much water over many lifetimes."
    - "{name} is staring at the floodlights, recalling when stadiums had no lights."
    - "{name} has their arms folded, seeming to age and de-age slightly."
    - "{name} is watching a coach with the warm detachment of someone who knew their parents."
    - "{name} is watching the modern game and finding it lacking."
    - "{name} is sipping water, recalling when there was no water on the sideline."
    - "I remember the older versions of this stadium. There were two before this one."
    - "I knew their parents. Both sides."
    - "{name} is murmuring something in a language nobody on the bench recognizes."


ghost:
  # Vanishes, low visibility, almost-not-there. Evades cameras, sits in
  # shadows, drifts to the bench unseen.
  takes_quirks: false
  mood_names: [Faded, Wisp, Drifting, Present, Anchored]

  positive_generic:
    - "{name} jogs off without acknowledging anyone."
    - "{name} disappears into the bench area before the cameras can find them."
    - "{name} is already gone by the time the crowd reacts."
    - "{name} hands the ball to the ref and is no longer visible."
    - "{name} jogs straight to the tunnel, then back, almost unseen."
    - "{name} sits at the far end of the bench, half-shadowed."
    - "{name} pulls their hood up briefly before the helmet goes back on."
    - "{name} keeps their visor low even off the field."
    - "{name} flickers briefly between plays. The simulation reacquires them."
    - "{name} phases out for a moment, as if checking on something 'outside'."
    - "{name} steps out of the simulation briefly and comes back somewhat changed..."

  negative_generic:
    - "{name} vanishes into the tunnel for several plays."
    - "{name} sits at the far end of the bench, alone."
    - "{name} doesn't look up. Almost not there."
    - "{name} pulls their hood up, fades into the bench..."
    - "{name} disappears into the equipment area, reappears later."
    - "{name} keeps their back to the cameras, becomes very still."
    - "i'd rather not."
    - "if no one sees it happen, did it happen."
    - "i'm fine. i don't need anyone."
    - "leave me here. i'll catch up."

  scored_td:
    - "{name} crosses the goal line, immediately heads for the tunnel exit."

  threw_td:
    - "{name} watches the catch, then is no longer corporeal..."

  made_fg:
    - "{name} watches it sail through, then disappears down the sideline."

  missed_fg:
    - "{name} sees it sail wide and walks straight off the field."

  got_sacked:
    - "{name} stands up, drifts to the bench unseen."

  made_sack:
    - "{name} stands up off the QB, fades into the defensive huddle."

  threw_int:
    - "{name} watches the runback, then is just gone."

  made_int:
    - "{name} catches it, hands it to the ref, is no longer there..."

  fumbled:
    - "{name} watches the recovery, drifts away..."

  recovered_fumble:
    - "{name} pops up with the ball, hands it over, vanishes."

  sideline:
    - "{name} is at the far end of the bench, alone."
    - "{name} is disappearing into the bench area between plays."
    - "{name} has their hood pulled up further."
    - "{name} has their back to the cameras."
    - "{name} is in the shadow of the bench tarp, half-hidden."
    - "{name} is on the bench somewhere. Hard to tell where."
    - "i'm here. i'm just not... visible."
    - "{name} is sitting in a folding chair that wasn't there a minute ago."
    - "you can leave. i'm fine here."


# ─── Fiery family ───────────────────────────────────────────────────────────

perfectionist:
  # Rage at self-failure, tablet-rewinding, analytical anger, brutal
  # self-criticism. Where fiery rages at the world, perfectionist rages
  # at themselves.
  mood_names: [Cracking, Faulty, Driven, Sharpening, Mastered]

  positive_generic:
    - "{name} immediately starts pointing out what they could have done better."
    - "{name} replays the moment in their head, visibly unsatisfied."
    - "{name} mutters the play call to themselves seven times in a row."
    - "{name} sprints to the whiteboard and starts diagramming a new play."
    - "{name} taps the tablet, rewinds, frowns at a small detail."
    - "Two yards more. Should have been two more."
    - "{name} writes a correction on their wristband even after success."
    - "{name} corners the coordinator. 'Better. Next one has to be cleaner'."
    - "Acceptable, but not good enough."
    - "Three yards short of where I wanted to land."
    - "Run that one again, exactly that. We can do it cleaner."
    - "I had the read late. We need to go again."
    - "Coach. Coach. The footwork was off. Run it again."
    - "Did anyone see the angle on that block? We can fix it."

  negative_generic:
    - "{name} snatches the tablet and rewinds the play before reaching the sideline."
    - "{name} has filled an entire page of their sideline notebook in thirty seconds."
    - "{name} stares at the ground, mouthing the play to themself."
    - "{name} mutters corrections faster than an auctioneer."
    - "{name} corners the coordinator, will not let them leave."
    - "{name} is already running through every possible correction."
    - "Mine. All mine. The whole play."
    - "{name} tapes a torn page back into their notebook with shaking hands."
    - "Not good enough. Not good enough."
    - "I read it wrong. I have to read it cleaner."
    - "Run it again. Run the whole thing again."
    - "Coach. Hand me the tablet. Hand it to me now."
    - "I'll watch this twenty times tonight. I'll find it."
    - "Mine. Don't let anyone else take that."

  scored_td:
    - "{name} crosses the goal line, mutters about a missed read."
    - "Could have been faster."

  threw_td:
    - "{name} watches the catch, mouths 'should have led them more.'"

  made_fg:
    - "{name} watches it split the uprights, but frowns at the angle of the kick."

  missed_fg:
    - "{name} kicks a chunk of grass thirty yards downfield, demands the tablet."

  got_sacked:
    - "{name} pops up demanding the tablet from the line coach."
    - "My fault. Held it too long, have to be better"

  made_sack:
    - "{name} stands up demanding to know what they could have done a half-second sooner."

  threw_int:
    - "{name} demands the tablet before reaching the sideline. Demands it again."

  made_int:
    - "{name} catches it, immediately drafts a correction for the corner who tipped it."

  fumbled:
    - "{name} stands and dictates a long correction to themself before jogging back."

  recovered_fumble:
    - "{name} pops up, hands the ball over, demands the tablet."

  sideline:
    - "{name} is filling another page of their sideline notebook."
    - "{name} is mouthing the play call to themselves repeatedly."
    - "{name} is reviewing the tablet, frame by frame, jaw tight."
    - "{name} is sketching the corrected formation on a clipboard the equipment manager has never seen them use."
    - "{name} has the coordinator cornered, tablet pulled up."
    - "{name} is writing a single number on their wristband, underlining it three times."
    - "Run the tape. Run it again. From the snap."
    - "{name} is annotating a teammate's playbook with surgical handwriting."
    - "Coach, the footwork on the second step. Tell me you saw it. Coach."
    - "{name} is rebuilding the formation in pen on a clipboard that has been theirs the whole game."
    - "I want to watch every snap from this drive. From three angles."
    - "{name} is whispering corrections into the offensive coordinator's ear, who is nodding nervously."
    - "We are running this back next series. We have to."
    - "{name} is drawing the same diagram three times, each cleaner than the last."
    - "Tell the line we have one chance to fix this. Tell them now."


paranoid:
  # Conspiratorial. The refs are bought, the helmets are bugged, the field
  # is measured wrong, "they" are watching. Active fear of agents and
  # surveillance. Distinct from cursed (this isn't fate — it's people)
  # and unhinged (the chaotic-weird core has no organized adversary).
  mood_names: [Cornered, Watched, Wary, Onto Them, Untraceable]

  positive_generic:
    - "{name} celebrates but keeps scanning the crowd. Someone is watching."
    - "{name} scans the stadium exits during the celebration. Just in case."
    - "{name} looks over both shoulders, then checks again."
    - "{name} eyes the chain gang like they're in on something."
    - "{name} celebrates facing the press box so they can't photograph the playsheet."
    - "They didn't want this. They didn't want me to have this."
    - "{name} whispers something to a teammate behind a cupped hand."
    - "Worked around their setup. They'll have to redraw it."
    - "{name} watches a security guard for three full seconds before continuing."
    - "Got past their decoy."
    - "the Core saw that one. They saw it."
    - "Don't write that down. Tell the press 'no comment'."
    - "I worked around them. They didn't see this play coming."
    - "Watch where the broadcast cuts. They cut when they don't want you to see."
    - "Cover the playsheet. Cover the playsheet."
    - "I switched the call at the line. They didn't get the new one."

  negative_generic:
    - "{name} covers their mouth while talking to a coach. The cameras are always watching."
    - "{name} is telling anyone who'll listen that the field was measured wrong."
    - "{name} asks the equipment manager to check the helmet for tracking devices."
    - "{name} notices a bird flying overhead and does not think it's a coincidence."
    - "{name} is writing something down in a notebook they won't let anyone else see."
    - "{name} is counting the people in the press box. There's one more than last time."
    - "the refs were paid by the moon landing crew."
    - "the ball was tampered with."
    - "the wifi at this stadium is poisoned."
    - "they don't want me to win. they don't want any of us to win."
    - "this is what they want you to think."
    - "I have signal interference."
    - "the Cores are watching. They actually are."
    - "it's not paranoia if the Cores really do see everything."
    - "Most of them don't know we are watched. I came in knowing."
    - "they're letting it happen. don't pretend you don't see it."
    - "i told you the refs are crooked. i TOLD you."
    - "they want me off the field. that's why they keep calling holds."
    - "someone in this locker room is talking to them. i can feel it."

  scored_td:
    - "{name} sets the ball down quickly, scans the corners of the endzone."
    - "Got past their setup. Had to be fast."

  threw_td:
    - "{name} watches the catch, immediately checks the press box for cameras."
    - "Had to switch the call. They figured out the original."

  made_fg:
    - "Made it through. Didn't trust the wind."
    - "{name} watches the ball through the uprights, eyes the line judge suspiciously."

  missed_fg:
    - "the wind is being paid by Big Helmet."
    - "{name} watches it wide, immediately checks the gound for tampering."

  got_sacked:
    - "Someone must have leaked the protection scheme."
    - "{name} stands up scanning the line for who tipped them off to the play call."

  made_sack:
    - "{name} stands over the QB, mouths something about the snap count being telegraphed."

  threw_int:
    - "the ball was switched between plays."
    - "I threw a different ball than the one they caught."

  made_int:
    - "Saw the route on tape. Tape they thought was secure."
    - "Wait. Hold the call. They'll find a flag. They always find one."

  fumbled:
    - "Someone moved my hands. Someone moved them."

  recovered_fumble:
    - "Wait for the flag. There's going to be a flag."
    - "Got there before they could redirect it."

  sideline:
    - "{name} is covering their mouth while talking to a coach."
    - "{name} is writing something in a notebook they won't let anyone else see."
    - "{name} is counting the people in the press box."
    - "{name} is eyeing the chain gang from the bench."
    - "{name} is watching a security guard with mild suspicion."
    - "{name} is examining a sunflower seed shell for a long moment, frowning."
    - "Don't sit there. That seat has line of sight to the press box."
    - "{name} is whispering into a teammate's helmet earhole, eyes scanning the crowd."
    - "Cover the playsheet. The drone's been overhead for two minutes."
    - "{name} is watching the chain gang. Specifically the third one. They moved the chains."


# ─── Melancholy family ──────────────────────────────────────────────────────

poetic:
  # Romantic-period heart-on-sleeve melancholy. Where base melancholy is
  # plainly sad, this lives in literary imagery — autumn, petals, the
  # quiet weight of being. Keats at quarterback.
  takes_quirks: false
  mood_names: [Bereft, Yearning, Wistful, Tender, Luminous]

  positive_generic:
    - "Oh, briefly, beautiful."
    - "My heart, briefly, is full."
    - "Hope, that exhausting visitor."
    - "Perhaps the heavens relent. Perhaps tomorrow they will not."
    - "Such joy will be answered for. So it has always been."
    - "A flicker. A warmth. Then yearning."
    - "{name} bows toward the turf as one bows at an altar."
    - "It came and went, like all beautiful things."
    - "The world, for a single heartbeat, was kind."
    - "Oh, what a brief and luminous thing."
    - "I touched something tender. It was not mine to keep."
    - "I have been forgiven, briefly."

  negative_generic:
    - "We were always destined for this dim hour."
    - "{name} stares at the turf as if reading scripture."
    - "How weary, how stale, how tired the heart grows."
    - "{name} sits on the bench and looks at their hands as if at strangers."
    - "Hope always wounds us in the end."
    - "{name} watches the replay without expression. They have watched it before, in a dream."
    - "Like petals, all things fall."
    - "Even sorrow is a kind of company."
    - "{name} writes a single word on their wristband. The word is 'oh.'"
    - "I dreamt of this exact moment. I had prayed to be wrong."
    - "The autumn comes for everything. Even this."
    - "Such was always to be my portion."
    - "Oh, the quiet weight of it."

  scored_td:
    - "I crossed the line. And on the other side: nothing, then everything."
    - "I have crossed. Something unseen crossed with me."
    - "I have arrived. Where I was going, I cannot say."

  threw_td:
    - "I let it go. They were there. Ah, the world is briefly simple."
    - "I threw and then they caught. Two hearts beating, briefly, as one."
    - "They found me. Or I found them. We are forever entangled."
    - "I gave it. They received it. Each of us, brief vessels."

  made_fg:
    - "Briefly, the foot remembered its old grace."
    - "The wind allowed it. The wind, that fickle muse."
    - "Three points. A small kindness."

  missed_fg:
    - "I missed. As all bodies shall, in the end."
    - "Oh, that I had been kinder to my younger self in practice."
    - "The crossbar was always too far. Hindsight is the only honest art."

  got_sacked:
    - "The pocket collapsed, as castles in dreams must."
    - "The hands found me. They were always going to."
    - "I felt them coming. I felt everything."

  made_sack:
    - "They were reaching, and there was nothing. As we all are. As we all have been."
    - "Their hour had come. I was merely the messenger."

  threw_int:
    - "I threw it. I knew. I threw it anyway. There is beauty in such ruin."
    - "I let it go knowing. That is the deepest cut."
    - "What I sent did not return. Such has always been my way."

  made_int:
    - "It floated to me. Even hope finds a hand sometimes."
    - "I read the route. I read the eyes. The rest was waiting, like dawn."
    - "It came to my hand as a leaf to a stream."

  fumbled:
    - "I had it. And then I didn't. As all loves go."
    - "The ball does not love us back."
    - "I held something brief. I let it go because I always do."

  recovered_fumble:
    - "What was lost has, briefly, returned. The balance always shifts."
    - "It came to my hand. Not for long, perhaps. But for now."

  sideline:
    - "{name} is mouthing a half-line of verse, lips barely moving."
    - "{name} is at the far end of the bench composing what appears to be a poem."
    - "{name} is staring up at the floodlights with wet eyes, mouthing a word."
    - "{name} is watching the field as one watches a ship sail away."
    - "{name} is folding their towel slowly, contemplatively, into smaller and smaller squares."
    - "{name} is tracing a single petal on their wristband with a fingertip."
    - "{name} is watching a leaf travel across the field, eyes following it the whole way."
    - "I write to remember. The forgetting comes for everyone, in time."
    - "{name} is gazing at the empty seats in the upper deck, expression heavy."
    - "Even the lights here ache, briefly, when no one looks at them."
    - "{name} is whispering a single syllable to nothing, over and over."
    - "I have watched a thousand crowds leave a thousand stadiums. Each leaving was its own small dusk."
    - "{name} is sitting with one hand resting open on their knee, palm up."
    - "What is a season but a long autumn dressed in numbers."
    - "{name} is holding their helmet in their lap, looking at it like it's an old friend they're losing."


# ─── Fiery family ───────────────────────────────────────────────────────────

dramatic:
  # Theater-kid theatricality. Performative grandeur, soliloquies, public
  # weeping in Q1. Treats every play like Shakespeare. Distinct from fiery
  # (real rage) and lively (communal joy) — dramatic is PERFORMING emotion
  # at the audience.
  takes_quirks: false
  mood_names: [Tragic, Wounded, On Stage, Soaring, Triumphant]

  positive_generic:
    - "{name} drops to their knees, points to the sky, weeps openly."
    - "ARE YOU NOT ENTERTAINED?!"
    - "{name} clutches the football to their chest, whispers 'I will never let you go.'"
    - "{name} looks directly into the camera. 'I told you. I told every single one of you.'"
    - "{name} salutes the crowd, the press box, the flag, and a pretzel vendor in section 214."
    - "{name} strikes a Greek statue pose so convincing a pigeon lands on their shoulder."
    - "{name} mouths 'this is my moment' to nobody, then 'this is OUR moment' to everybody."
    - "Witness me. WITNESS ME."
    - "{name} slow-motion turns to the crowd, arms outstretched. The broadcast plays it at normal speed. It still looks slow."
    - "{name} cradles the football and sings to it. Nobody knows the song."
    - "{name} removes their helmet, lets the wind hit their face, stares into the distance for thirty seconds."

  negative_generic:
    - "{name} drops to one knee, lowers their head. A coach says 'get up.' They just can't."
    - "{name} clutches their jersey and staggers sideways. They have not been touched."
    - "{name} looks up at the sky and mouths 'why?' to a god that, in this moment, has no answers."
    - "{name} reaches one trembling hand toward the scoreboard. 'We were so close,' they whisper."
    - "Not like this. Not like this."
    - "{name} mouths 'forsake me not' at the camera."
    - "{name} buries their face in a towel. The towel is soaking wet within seconds."
    - "{name} collapses onto the bench like a Victorian woman who just received bad news via telegram."
    - "{name} rips off their gloves and throws them like they're casting aside a former life."
    - "{name} stares at their hands and whispers 'these hands. These cursed hands.'"

  scored_td:
    - "{name} crosses the goal line, falls to their knees, raises both arms."
    - "{name} lifts the ball aloft like a relic recovered from war."
    - "{name} trembling, mouths 'they will write of this' to no one."

  threw_td:
    - "{name} sprints down the field arms wide, embraces {receiver} like a battlefield reunion."
    - "{name} watches the catch, kneels, points to the heavens."

  made_fg:
    - "{name} watches it sail through, places one hand over their heart."
    - "{name} bows to the crowd, then to the goalposts, then to the crowd again."

  missed_fg:
    - "{name} drops to their knees, stares at their kicking foot like it betrayed them."
    - "{name} mouths 'why hast thou forsaken me' at the goalposts."

  got_sacked:
    - "{name} lies face-down on the turf for a long, theatrical moment."
    - "{name} stands up clutching their ribs, staggers, recovers, staggers again."

  made_sack:
    - "{name} stands over {passer} with both arms raised. The crowd is encouraged to react."
    - "{name} mouths 'fall, ye mortal' at {passer}."

  threw_int:
    - "{name} drops to their knees, looks at their throwing hand. 'Cursed,' they mouth. 'Cursed.'"

  made_int:
    - "{name} catches it and falls backward in slow motion, ball clutched to chest."
    - "{name} cradles the ball, holds it up to the heavens."

  fumbled:
    - "{name} clutches their hands to their face, stumbles to the sideline."
    - "{name} drops to one knee, stares at their empty palms."

  recovered_fumble:
    - "{name} cradles the ball like a found infant. Possibly weeping."

  sideline:
    - "{name} is saluting the camera, holding it for an unsettlingly long time."
    - "{name} is staring into the middle distance, lips moving silently. Soliloquy in progress."
    - "{name} has their helmet off, letting the wind hit their face, holding the pose."
    - "{name} is sketching what appears to be a portrait of themselves on a napkin."
    - "{name} is addressing an empty section of the stadium with emphatic gestures."
    - "WITNESS this hour! WITNESS it!"
    - "{name} is rehearsing a victory speech under their breath. A victory has not yet occurred."
    - "I shall be remembered for this season. They will name the bench after me."
    - "{name} is dramatically pulling their helmet on, then off, then on again."
    - "Bring me the press. They will want to hear from me."
    - "{name} is striking a pose with their hand on their heart, holding it indefinitely."
    - "Who among us has not been forsaken by the gods of football? But I have suffered uniquely."
    - "{name} is sketching a self-portrait on a napkin, pausing dramatically between strokes."
    - "{name} is staring intensely at their own reflection in a teammate's visor, mouthing 'this is your moment.'"


# ─── Cool family ────────────────────────────────────────────────────────────

trash_talker:
  # Heel-coded antagonist. Lives rent-free in opponents' heads. Points at
  # scoreboards, blows kisses to opposing fans, mocks specific opponents.
  # Distinct from cool (theatrical-luxe self-focused) and fiery (rage at
  # world) — trash_talker is FOCUSED on the opposition.
  mood_names: [Quiet, Dialed Down, Talking, Cooking, Living Rent-Free]

  positive_generic:
    - "{name} pulls an imaginary phone out of their pocket and calls the opposing coach."
    - "{name} blows a kiss to the opposing fans."
    - "{name} waves goodbye to the defender they just beat."
    - "{name} mouths 'scoreboard' at the opposing bench."
    - "{name} cups their ear toward the now-silent opposing fans."
    - "{name} pretends to tuck a defender into bed at the line of scrimmage."
    - "{name} walks backward toward the sideline, maintaining eye contact with the defense."
    - "{name} does the 'too small' gesture at the nearest defender."
    - "{name} pantomimes writing a receipt, hands it to the defender."
    - "{name} blows on the defender like they're a dandelion."
    - "{name} points at the scoreboard, then at themselves."
    - "{name} air-mails a kiss to the opposing mascot."
    - "{name} pretends to read a newspaper while strolling off."
    - "{name} mimes hanging up a 'closed' sign on the goal line."

  negative_generic:
    - "{name} mouths something untranslatable at the defender."
    - "{name} immediately starts working on what they'll say after the next play."
    - "{name} shakes their head at a defender, smirking, like they're disappointed in them."
    - "{name} cracks their neck, points at the scoreboard. The scoreboard is not currently in their favor. They point anyway."
    - "Save it. I'll be back."
    - "{name} smirks at a defender. The smirk says 'wait until next time.'"
    - "{name} sarcastically says 'enjoy the moment' at the opposing bench."
    - "Tell your kids about that play. They won't believe you."
    - "Soak it up. That's the highlight of your year."
    - "I owe you one. I always pay."
    - "Hope you took a picture. That'll be the only one."
    - "Smile. The cameras love this for you."
    - "Don't worry. I'll get yours twice next series."
    - "You'll be hearing from me again."

  scored_td:
    - "{name} crosses the goal line, immediately points at the opposing bench."
    - "{name} mimes putting the ball away in a tiny suitcase. 'I'm takin this with me.'"
    - "{name} mimes locking the endzone with a key, pockets the key."

  threw_td:
    - "{name} watches the catch, immediately points at the opposing secondary."
    - "{name} mouths 'told y'all' to the defensive coordinator."

  made_fg:
    - "{name} watches it sail through, blows on their kicking foot like a smoking gun."

  missed_fg:
    - "{name} mouths 'one of you definitely paid the wind' at the opposing bench."

  got_sacked:
    - "{name} pops up, gives {sacker} the slowest, most sarcastic clap."

  made_sack:
    - "{name} stands over {passer}, mimes calling someone on a phone. Probably their family."
    - "{name} crouches next to {passer} and whispers something."
    - "{name} says 'come back when you grow up' at {passer}."

  threw_int:
    - "{name} mouths 'enjoy that one. It's the only one you're getting' at the defender."

  made_int:
    - "{name} catches it, holds it up like a trophy at {passer}."
    - "{name} blows {passer} a kiss as they peel away."

  fumbled:
    - "{name} mouths 'lucky bounce' at whoever recovered."

  recovered_fumble:
    - "{name} cradles the ball, mouths 'thanks for the gift' at the offense."

  sideline:
    - "{name} is watching the opposing offense, working on their next line."
    - "{name} is mouthing something at a specific opposing player from across the field."
    - "{name} is writing a tiny note on their wristband, presumably an insult."
    - "{name} is staring at the opposing bench, smirking faintly."
    - "{name} is tapping a teammate, pointing at someone on the other team. Both laughing."
    - "{name} is cupping their ear at the opposing fans whenever they hush."
    - "Hey number 27. NUMBER 27. Yeah, you. Just so we're clear."
    - "I'm gonna be talking to that DB all four quarters. They'll hear me in their sleep."
    - "Tell their bench I said hi. I want them thinking about me."
    - "Ten more minutes and they'll be quiet on that sideline. Watch."


# ─── Wholesome family ───────────────────────────────────────────────────────

mystic:
  # Devotional follower of an unseen flow. Borrows prophet's thread/path
  # imagery but RECEIVES rather than SEES — they don't have visions, they
  # follow guidance. Same calm at wins and losses, bows after every play,
  # gives thanks. Distinct from prophet (seer vs. follower).
  takes_quirks: false
  mood_names: [Untethered, Drifting, Centered, Aligned, Enlightened]

  positive_generic:
    - "{name} bows slightly after the play."
    - "{name} touches the turf, then their forehead."
    - "Thanks be."
    - "{name} closes their eyes for a moment of stillness."
    - "The flow allowed it."
    - "The threads were kind today."
    - "All in its proper order."
    - "{name} smiles softly."
    - "I am grateful."
    - "{name} brings two hands together briefly, jogs to the bench."
    - "I walked the path as it was laid."
    - "I was placed here. The placement was wise."
    - "I was where I was meant to be. That is all."
    - "Gratitude. Always gratitude."
    - "The flow held me steady."
    - "It was given. I only received."
    - "We are placed where we are placed."

  negative_generic:
    - "{name} bows slightly, the same as on the good plays."
    - "All things shift. We shift with them."
    - "{name} closes their eyes, breathes in, breathes out."
    - "The teaching continues."
    - "Thanks for the lesson."
    - "{name} touches the turf where they fell, gives thanks."
    - "What was meant for me, I receive."
    - "The path includes this. I walk."
    - "The threads do not always perfectly align."
    - "Surrender, also, is part of the practice."
    - "I will sit with this. Sitting is the work."
    - "What was given is now received."
    - "The lesson is the gift. I open it slowly."

  scored_td:
    - "{name} crosses the goal line, places one hand on their heart, walks slowly back."
    - "{name} hands the ball to a child in the front row, bows slightly."
    - "The path delivered me here. I am grateful."

  threw_td:
    - "{name} watches the catch, brings two hands together briefly."
    - "The pass found its true home. All is at is should be."
    - "The path knew where {receiver} would be."

  made_fg:
    - "{name} bows toward the goalpost."
    - "Three points. A small grace."

  missed_fg:
    - "Not this time. The path is what it is."
    - "{name} watches it go wide, bows toward the goalpost anyway."

  got_sacked:
    - "{name} lies on the turf for a long moment, eyes closed."
    - "The teaching arrives in many forms."

  made_sack:
    - "{name} stands over {passer}, helps them up gently, bows slightly."
    - "I was placed here. Anyone in this place would have done the same."

  threw_int:
    - "I released the ball. The path took it elsewhere."

  made_int:
    - "{name} catches it, bows toward {passer}, walks back quietly."
    - "It came to my hands. I am only the place it arrived."

  fumbled:
    - "What I held was not mine to hold longer."
    - "{name} kneels for a moment, then rises."

  recovered_fumble:
    - "What was loose, I gathered. That is the flow."

  sideline:
    - "{name} is sitting cross-legged on the bench, eyes closed."
    - "{name} is tracing a small spiral on the turf with their finger."
    - "{name} is drinking water with two hands, slowly."
    - "{name} is bowing toward the field before stepping back on."
    - "{name} has their palms together briefly, exhaling."
    - "{name} is watching a teammate stretch, smiling softly."
    - "The flow is gentle today. I am grateful for the gentleness."
    - "{name} is breathing in for four counts, holding for four, releasing for four."
    - "I will carry this stillness back onto the field."


knight:
  # Chivalric, formal, archaic speech. Honor-coded — helps fallen
  # opponents up, salutes, kneels in acknowledgment. Treats every play
  # as a duel. Wholesome family but with formality and code rather
  # than warmth and team-feeling.
  takes_quirks: false
  mood_names: [Dishonored, Tested, Valiant, Glorious, Crowned]

  positive_generic:
    - "Well-fought."
    - "{name} bows slightly to the defender they just beat."
    - "Honor demanded it."
    - "{name} helps the defender to their feet, claps their shoulder."
    - "By my hand."
    - "A worthy opponent. May we meet again."
    - "{name} salutes the opposing bench from across the field."
    - "I only live to serve."
    - "{name} pats the offensive line in turn, like a captain after a successful charge."
    - "Glory be to those who blocked."
    - "A clean strike. Rare and welcome."
    - "Hold your ground, comrades. The day is yet long."
    - "Steady on. Steady on. The field is ours."
    - "Onward. There is more to be won."
    - "Mark this hour. The chronicles will."

  negative_generic:
    - "Well-fought."
    - "The day is theirs. Tomorrow may be ours."
    - "{name} kneels briefly in acknowledgment."
    - "{name} salutes the opposing bench."
    - "An honorable defeat. The next field will tell."
    - "{name} touches their helmet to a teammate's, formally."
    - "{name} sheaths an invisible sword."
    - "We shall return to this field, and we shall see who is worthy."
    - "We yield this hour. Not the war."
    - "Steady, friends. The field demands courage, not despair."
    - "The fight goes on. Take heart."
    - "Mark me — we will answer for this."

  scored_td:
    - "{name} crosses the goal line, kneels briefly, rises, jogs back."
    - "{name} sets the ball down at the goal line as if placing a banner."
    - "For the realm."

  threw_td:
    - "{name} watches the catch, salutes {receiver} from across the field."
    - "Brave catch. By a brave heart."

  made_fg:
    - "Three points, justly earned."
    - "{name} places one fist over their heart."

  missed_fg:
    - "{name} drops to a knee, head bowed, accepting the failure as their own."

  got_sacked:
    - "Well-struck."
    - "{name} stands up, salutes {sacker}, jogs back."

  made_sack:
    - "{name} helps {passer} to their feet, claps their shoulder."
    - "A fair contest. {passer} fought well."

  threw_int:
    - "{name} jogs back, salutes the defender. Honor was on their side."

  made_int:
    - "{name} catches it, bows slightly to {passer} before jogging off."
    - "By rights, this ball is mine now."

  fumbled:
    - "An honorable loss. The ball belongs to whoever holds it."

  recovered_fumble:
    - "{name} cradles the ball as one cradles a recovered standard."

  sideline:
    - "{name} is sitting with hands folded, surveying the field as if from a saddle."
    - "{name} is polishing a wristband with great care."
    - "{name} is standing rather than sitting, hands behind their back, posture rigid."
    - "{name} is watching the opposing bench, giving a single, formal nod."
    - "{name} is touching their helmet to a teammate's, formally."
    - "Hold the line, friends. The hour belongs to us."
    - "{name} is sharpening an invisible blade against an invisible whetstone."
    - "Mark the field. The chronicles must record where we stood."
    - "Steady on, steady on. We have been tested before."

