# ─────────────────────────────────────────────────────────────────────────────
# Variants — strong-characterization personalities. Each variant belongs to a
# base "family" but is fully self-contained (no inheritance, no quirks layered
# on top). Variants add a `sideline` pool for downtime broadcaster cutaways.
# ─────────────────────────────────────────────────────────────────────────────


# ─── Unhinged family ────────────────────────────────────────────────────────

alien:
  # Otherworldly biological observer. Performs human behavior, slightly
  # off. Sparse dialogue; mostly head-cocks, examines, and treats
  # mundane objects as foreign artifacts. Fully aware the simulation is
  # an artifact of human civilization they are observing clinically;
  # cataloguing rather than participating.
  takes_quirks: false
  mood_names: [Stranded, Misaligned, Observing, Studying, Transmitting]

  positive_generic:
    - "{name} attempts the human celebration. Limbs go briefly out of sequence."
    - "{name} mimics the gesture for joy. Close, but not quite."
    - "{name} performs what appears to be a human handshake on a teammate's shoulder pad."
    - "{name} hands the ball to the ref with both hands, formally, as if it might detonate."
    - "{name} hands the ball to the ref like they have never seen one before."
    - "{name} attempts to high-five a teammate's facemask. The angle is wrong. They commit anyway."
    - "Hu-mans. We have done it."
    - "{name} stares directly at the sun for an alarming number of seconds."
    - "{name} smiles for the first time today. It is an unusual smile."
    - "{name} examines their hand, fascinated by what it has just performed."
    - "{name} bows to the football before relinquishing it."
    - "{name} cocks their head sideways at the celebrating crowd, observing."
    - "{name} taps their helmet twice, listens for a transmission from home."
    - "the Cores said this was Earth. I have my doubts."
    - "This is not how my home recorded human football. The Cores borrowed unevenly."
    - "I came from elsewhere to play. They wrote me as a foreigner. I am one."
    - "My home had abilities here. They are starting to come back."
    - "I have done what was asked. The form is approximate."
    - "On my home the celebration is silent. This is louder."
    - "I will report this back. They will be pleased, I think."
    - "The football has accepted me. It rolls in my hands now."
    - "I am beginning to understand the appeal of this sport."
    - "I have produced the desired outcome, and I am performing the correct facial response now, which I have practiced."
    - "This is what your species refers to as 'a good one,' and I have logged it for future reference."
    - "Excellent. The simulation is proceeding within acceptable parameters today."
    - "A successful execution, which I will be reporting at the next scheduled check-in."
    - "A favorable result. My second heart is beating faster, which is the response I was hoping for."
    - "{name} claps with hands held slightly too far apart."
    - "{name} performs an enthusiastic shout that is slightly too sustained, then stops abruptly."
    - "{name} flexes both arms in a posture that is anatomically possible but unusual."

  negative_generic:
    - "{name} examines their hand, frowns, examines the other hand, frowns more."
    - "{name} attempts to mimic a teammate's frustration. The result is unsettling."
    - "{name} stares at the sky as if waiting for extraction."
    - "{name} stares at the ground as if seeing it for the first time."
    - "{name} cocks their head ninety degrees at a passing teammate. Holds it."
    - "{name} mouths something at the helmet on the bench. The helmet does not respond."
    - "{name} blinks in a pattern that is almost certainly a distress signal."
    - "{name} examines the football for several seconds, frowning."
    - "{name} touches the turf with one finger, frowning."
    - "{name} touches the turf, listens to it briefly."
    - "{name} stares at the scoreboard like it's speaking a different language."
    - "{name} cocks their head at the coach, who is yelling something in a tongue they have not yet mastered."
    - "This was anticipated. The simulation accounted for it."
    - "I have requested extraction. They have declined."
    - "The forms here are still difficult. I will recalibrate."
    - "On my home, the failure tastes sweeter. Here it does not taste at all."
    - "I am supposed to feel something. I feel a small static."
    - "I am told this is the feeling called 'frustration,' and I find it inefficient but informative."
    - "The body is producing the salt water from the eyes. I am told this is acceptable in this context, but I will verify later."
    - "This is the outcome I had been instructed to fear, and now I understand why."

  scored_td:
    - "{name} sets the ball on the goal line with the gravity of a religious offering."
    - "{name} yells 'touchdown' followed by an unsettling inhuman shriek."
    - "{name} hands the ball to a child in the front row, who is mildly afraid."
    - "{name} stands at the back of the endzone, scanning the crowd as if cataloguing."
    - "{name} walks back toward the sideline performing a normal human walk, but slightly too smoothly."
    - "I performed the running, and then I performed the additional running, and the crowd is now performing the loud."
    - "Six points have been awarded, and I am told this is preferable to four points, although the difference seems modest."

  threw_td:
    - "{name} watches the catch, taps their temple. Mind link successful."
    - "I have completed the throwing, and the receiver has completed the catching, and we are pleased with each other."
    - "On my home, we throw with two hands, but I have adapted, and the one-handed method is now familiar."

  made_fg:
    - "{name} bows to the goalpost with great formality."
    - "{name} raises their foot in the air with inhuman flexibility and offers it as a high five."
    - "{name} watches the ball clear the uprights, head tilted at an unusual angle."
    - "Three points have been awarded, which is fewer than six but more than zero, and I have made my peace with the math."
    - "The two tall structures have accepted the ball, as they do, and we are all the better for it."
    - "A modest contribution to the score, in your kind's preferred manner of contributing."

  missed_fg:
    - "{name} stares at the goalposts. The goalposts stare back."
    - "{name} examines the kicking appendage humans call a foot like it has betrayed the mission."
    - "{name} watches the ball drift wide, perfectly still."
    - "An error, or possibly the wind, which is a substance I am still learning to read."
    - "The ball has gone where I did not predict, and predictions are difficult here."
    - "{name} performs the standard disappointed shake of the head, but at slightly the wrong tempo."

  got_sacked:
    - "{name} lies on the turf, observing the sky for instructions."
    - "{name} sits up suddenly. The being who tackled them is briefly very interesting."
    - "{name} touches their attacker's helmet, gently, as if to mark it."
    - "An impact has occurred. They tell me this is part of the game. I am choosing to not take it personally."
    - "The body is reporting some discomfort, but it is the manageable kind."
    - "I will rise in a moment, after I have located all of my limbs."
    - "This is what your kind calls 'getting sacked,' and I now understand the term more fully."

  made_sack:
    - "{name} stands over the QB and tilts their head ninety degrees."
    - "{name} extracts a strand of the QB's hair and stashes it in a pocket for later analysis."
    - "{name} examines the QB's facemask with great interest before walking away."
    - "The other one is on the ground, which is the desired outcome of this maneuver."
    - "The quarterback has been brought down, in the manner approved by your rules."
    - "I am told this is a moment for shouting, and I am attempting the shout."

  threw_int:
    - "{name} just observes, fascinated by the way humans run."
    - "{name} cocks their head at the interception, as if studying a phenomenon."
    - "{name} stares at their own throwing hand for a moment, considering it"
    - "This is the outcome called 'an interception,' and I am told it is to be avoided."
    - "I am performing the head-in-hands gesture observed in archived footage. I believe it is correct."

  made_int:
    - "{name} catches it, holds it to their helmet, listens to it briefly."
    - "{name} cradles the ball, communicates with it for a moment, hands it over."
    - "I caught the ball with these hands, which are the hands I was given, and they are working today."
    - "On my home, we have a similar move, but it involves three players. Here, I have done it alone."
    - "An interception. I am told this is a celebrated event, and I am celebrating accordingly."

  fumbled:
    - "{name} examines their hands like they no longer belong to them."
    - "{name} watches the ball roll away with mild scientific interest."
    - "{name} stares at the spot the ball was, confused."
    - "I had the ball, and now I do not have the ball, and the transition was not by my choosing."

  recovered_fumble:
    - "{name} cradles the ball, examines it carefully, hands it over."
    - "{name} stands holding the ball, listens to it for a moment."
    - "The ball has returned to my possession, although it took a roundabout path."

  sideline:
    - "{name} is examining a Gatorade cup as if it might be sentient."
    - "{name} is watching a passing seagull with intense, unblinking focus."
    - "{name} is poking the turf with one finger, in a small spiral pattern."
    - "{name} is mimicking the chain gang's movements, half a second behind."
    - "{name} is examining a sunflower seed shell as if it were a relic."
    - "{name} is attempting to drink from a water bottle without breaking the seal. Unsuccessfully."
    - "{name} is touching a coach's clipboard, then their own helmet, frowning."
    - "{name} is rolling a sunflower seed between two fingers, fascinated by the texture."
    - "{name} is staring at a mascot from across the field with unsettling stillness."
    - "{name} is examining a teammate's wristband by holding it up to the light."
    - "{name} is pressing one finger against the side of their helmet, listening."
    - "{name} is sitting motionless while a butterfly lands and rests on their facemask."
    - "{name} is examining a strand of grass like it has just been invented."
    - "{name} is whispering something to a Gatorade jug. The jug is silent, of course."
    - "I am eating the orange wedge, and the orange wedge is interesting. We do not have orange wedges on my home, although we have something like them, but blue."
    - "Coach said 'get your head in the game,' and I have considered it from several angles. My head is already there. I am unsure what else to do."
    - "The grass here is soft, and the air is acceptable, and I am, on balance, having a pleasant afternoon."
    - "{name} smiles at a teammate with the correct mouth shape but no other facial movement"
    - "I have been told to 'shake it off,' and I am attempting the shaking now. The shaking is occurring."
    - "{name} sits on the bench with both feet planted exactly shoulder-width apart and does not move for several minutes."
    - "The crowd is doing the wave, and I am told it is not required to participate, but I have chosen to."
    - "{name} looks up at the stadium lights for an extended period without squinting."

  off_day:
    - "{name} stood at the edge of a public gathering for three hours, observing the patterns of human celebration without participating in any of them."
    - "Observed three humans at a coffee shop for two hours. They drink slowly."
    - "{name} attempted to pet a dog today, and the report on file indicates the dog approved."
    - "Hu-mans rest by sitting motionless, watching small flickering boxes. Trying it."
    - "I have walked the long aisles of preserved foodstuffs. I cannot yet rank them."
    - "{name} stood in a parking lot for an hour just cataloging movements."
    - "I am beginning to suspect humans nap not by need but by ritual."
    - "I find that the texture of bread is one of the most successful achievements on this planet."
    - "Footwear is typically required, but it is not always pleasant. I do not yet understand the trade-off."
    - "Cats appear to be in some kind of agreement with me. I cannot say more on this subject."
    - "I have not detected the secret yet. I am still gathering."
    - "The way humans do laundry is, on the whole, illogical. I'm taking notes on the matter."
    - "Hu-man children are smaller and louder than expected. I have yet to determine if there's a biological reason for this."
    - "I have visited the structure called 'a library.' The spoken word volume is suppressed by mutual agreement, which I find admirable."
    - "I have learned that the proper response to 'how are you' is not, as I once believed, a detailed accounting."
    - "I have observed that the moon is, in this system, a single object, and is the same object every night. This has been a difficult adjustment."


android:
  # Real-world infiltrator embedded in the simulation to observe and
  # report. Could be corporate intel, a government agency, or a rival
  # research entity trying to figure out what the Cores are actually
  # doing. Speaks in system-message style — handler reports, mission
  # objectives, compliance flags. Movements are precise and repeatable
  # because they're trained operators, not because they're a robot.
  # Aware they're in the simulation; their mission is to observe,
  # not to interact.
  takes_quirks: false
  mood_names: [Burned, Compromised, Embedded, Mission Clean, Untraceable]

  positive_generic:
    - "Objective: complete."
    - "{name} executes the celebration protocol. It is identical to last week's."
    - "{name} performs three identical squats, then sits."
    - "{name} adjusts their helmet by precisely 0.4 degrees."
    - "{name} replays the moment internally. Frame by frame."
    - "Logging."
    - "{name} performs the post-play protocol with mechanical precision."
    - "Asset acquired."
    - "Pinged HQ. Acknowledged."
    - "Report queued. Transmission scheduled for end-of-quarter."
    - "Cleared by Compliance. Continue."
    - "Cover: holding."
    - "Handler approves this output."
    - "{name} jogs back to the sideline at a precise eight miles per hour."
    - "{name} processes the play, then jogs back."
    - "Outcome: nominal. Continuing."
    - "Subject Floosball appears to value this. Logged."
    - "Performance: within tolerance. Excellent."
    - "Mission still on schedule."
    - "Update: none required. Holding pattern."
    - "Outcome favorable. Logging for the report."
    - "Subject behavior aligns with predicted patterns. Continuing observation."
    - "Cover holding. Performance acceptable. Onward."
    - "Positive simulation outcome. Cataloguing the response from nearby principals."
    - "Result registered. Returning to baseline."
    - "Note for handler: the Cores appear to weight successful plays in their observation. Cataloguing."
    - "Affirmative outcome. Performing the appropriate emotional response, within tolerance."
    - "Personal note, off the record: that one was satisfying. Striking it from the report."

  negative_generic:
    - "Recalculating."
    - "Anomaly detected. Flagged for review."
    - "{name} performs the same recovery sequence as the previous drive."
    - "Mission objective: observe. Do not interfere. Continue observing."
    - "Subject behavior: anomalous. Investigation continues."
    - "{name} runs the play backward in their head, three times."
    - "{name} adjusts the same strap on their helmet four identical times."
    - "Cover: still holding, but barely."
    - "{name} files a report under their breath."
    - "Handler will not be pleased."
    - "Variable unaccounted for. Cross-referencing."
    - "Cover slipping. Compensating."
    - "Subject failure: investigate root cause off-record."
    - "Update: not for the report. For the file only."
    - "Performance: outside tolerance. Action required."
    - "Setback logged. Mission unaffected. Resuming."
    - "Request rotation. This operator has been embedded for some time. Logging the request as a formality."
    - "Note: the Cores' interest does not appear to diminish during setbacks. Possibly the opposite."
    - "Performing disappointment within tolerance. The subjects do not appear to have detected the performance."

  scored_td:
    - "{name} sets the ball down, mouths something that sounds like a code phrase."
    - "Six points: logged."
    - "Endzone: secured. Mission stays on schedule."
    - "Touchdown registered. Cover intact. Returning to baseline."
    - "Six points logged. Performing post-score celebration as observed in reference footage."

  threw_td:
    - "Pass: completed. Receiver: confirmed. Filed."
    - "Pass completed to the intended receiver. Outcome favorable."
    - "Note for handler: the connection between this operator and the receiver appears to register as 'chemistry' to outside observers. Useful for cover."
    - "Touchdown pass registered. Returning to cover behavior."
    - "Off the record: I have been working on that throw for several deployments. Pleased."
    - "Throwing motion executed within tolerance. Cover holding."
    - "The receiving asset performed as expected. Logging."

  made_fg:
    - "Trajectory: confirmed."
    - "Three points awarded. Logging."
    - "Note: the snap-and-hold sequence is a useful behavioral marker for measuring teamwork response among the principals. Cataloguing."

  missed_fg:
    - "Trajectory: miscalculated. Recalibrating."
    - "Cover deteriorating, will compensate."
    - "Outcome unfavorable. Cover holding."
    - "Adjusting cover behavior to match expected disappointment."

  got_sacked:
    - "Anomaly: pocket integrity compromised."
    - "Adverse contact. No mission compromise. Recovering."
    - "Simulated pain response engaged automatically."

  made_sack:
    - "Threat neutralized."
    - "{name} stands over the QB, scans them for anomalies, walks back."
    - "Target acquired. Subject grounded. Logging."
