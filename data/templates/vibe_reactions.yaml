    - "PICK SIX, ALMOST! ALMOST!"
    - "Right to me, baby! Right to me!"
    - "BALL HAWK!"
    - "{name} holds the ball over their head as they sprint to the sideline."

  fumbled:
    - "{name} smacks the turf, gets up shaking their head."
    - "NOOOO!"
    - "I had it!"
    - "NO, NO, BRING IT BACK!"
    - "{name} chases the ball into a pile, keeps hollering."

  recovered_fumble:
    - "{name} pops up holding the ball over their head, runs to the sideline pumping their arms."
    - "BALL! BALL! BALL!"
    - "{name} hugs everyone within reach."
    - "I GOT IT! I GOT IT!"
    - "{name} pops up holding the ball, points at the bench."

  sideline:
    - "Y'all having fun? I'm having fun."
    - "{name} is leading a chant. Most of the bench is now chanting."
    - "Hey now, HEY NOW! Get on your feet for these guys!"
    - "{name} is doing a little shuffle dance to absolutely no music."
    - "I love this stadium. I LOVE this stadium."
    - "{name} is high-fiving every single member of the special teams unit."
    - "How are we feeling out there? GOOD? Yeah we're good!"
    - "{name} is teaching a kid in the front row how to clap on beat."
    - "WHO'S READY? WHO'S READY?"
    - "{name} is gathering the line for what appears to be a hug."
    - "{name} is humming on the bench, then singing softly, then loudly enough to start a chant."
    - "{name} is passing around a bag of something they've been calling 'the team snack.'"

  off_day:
    - "{name} threw a dinner that turned into a sing-along that turned into a small parade."
    - "There is no wrong time to host a party. None. I will fight you on this."
    - "{name} hosted dinner for the rookies, and there was a full team chant going by the time dessert came out."
    - "I took some prospects to the zoo and it was easily the best day I've had in months."
    - "{name} ran a youth football camp this past month and came back exhausted and smiling at the same time."
    - "We had a team dinner and I gave a toast that ran way too long, and I regret absolutely nothing."
    - "I love crowds the way most folks love a quiet room. Absolutely zero apologies for it."
    - "I'm telling you right now, the way some of these defensive coordinators draw it up is just terrible."
    - "{name} bought everyone on the offensive line steaks at a place they own a piece of."
    - "I had four people over for dinner last night, and somehow there were twenty before the night was over."
    - "I will bet you a hundred dollars on damn near anything. Try me."

fiery:
  # Intensity, controlled rage, animalistic. Self-focused ("I was BUILT
  # for this") or destructive (toward inanimate objects — coolers,
  # goalposts, helmets). Mean serious energy, not joyful. Inspired by
  # Tiger Woods / Michael Jordan / Tom Brady obsessive-competitor energy
  # — gym every morning, hates losing at any game including board games,
  # takes losses to bed. Will do anything to win. Distinct from lively
  # (communal joy at the same volume) and trash_talker (rage focused on
  # opponents instead of self).
  mood_names: [Burning Out, Frustrated, Heated, Charged, Roaring]

  positive_generic:
    - "THERE IT IS!"
    - "{name} screams at the sky, fists clenched."
    - "WHAT'D I TELL YOU!"
    - "PUT THAT ONE ON THE WALL!"
    - "{name} pounds their chest, screaming."
    - "HERE WE GO!"
    - "{name} kicks at the turf, then roars."
    - "I LIVE FOR THIS!"
    - "TASTE IT!"
    - "WRITE THIS ONE DOWN!"
    - "{name} runs at the camera, helmet off, screaming."
    - "I WAS BUILT FOR THIS!"
    - "RING THE BELL!"
    - "{name} pounds their head with their own helmet."
    - "I AM A LIVING WEAPON!"
    - "{name} is apparently trying to bend the metal of their facemask."
    - "{name} is screaming at the sky. A passing bird changes direction."
    - "{name} headbutts the goalpost. The goalpost vibrates. {name} does not."
    - "{name} grabs two teammates by the facemask and screams obscenities."
    - "{name} is doing a war dance that has never been seen in any culture, anywhere, ever."
    - "{name} headbutts a teammate so hard both helmets crack."
    - "{name} punts a cooler into the second row. Gatorade everywhere."
    - "{name} flexes so hard their facemask creaks."
    - "{name} stares directly into a teammate's facemask and growls something."
    - "{name} runs three tight laps around the goalpost before being collected by a coach."
    - "{name} screams the play number into the camera. The camera person retreats."
    - "{name} rips off their jersey, then realizes they shouldn't have."
    - "{name} clamps a hand on the back of a lineman's neck and screams instructions an inch from their facemask."
    - "{name} sprints back to the huddle. Several teammates flinch."
    - "{name} grabs a coach's clipboard, draws something furiously, hands it back. The coach studies it."
    - "{name} stares down the opposing bench from forty yards away. The opposing bench feels it."
    - "I FEEL ALIVE!"
    - "I'M GETTING ANOTHER ONE."
    - "{name} screams the snap count at a teammate who isn't even on the field."
    - "{name} tries to do a backflip. Coaches intervene before takeoff."
    - "{name} headbutts an offensive lineman. Both helmets ring. Both players continue."
    - "{name} is roaring at a Gatorade jug. The jug appears intimidated."
    - "I knew the moment I woke up today."
    - "Run it again. Run it again right now."
    - "Tell me one more time it's not my year."
    - "I see them starting to quit. I see it."
    - "I want it again. I want it again."
    - "Build the statue now. I'll come back for it."
    - "They thought they could match us. They were wrong."
    - "I'm just getting hungry."
    - "You feel that? That's what we do here."
    - "Don't anyone come near me. I'm cooking."
    - "I'm telling you, this is the easy part."
    - "{name} screams into the turf, and the turf does not respond."
    - "That is the standard. You match it or you lose."
    - "{name} points at the opposing sideline, and names a specific person."
    - "{name} runs to the bench and immediately demands to know what the next play is."
    - "Their corner cheats inside. I told you he cheats inside. Are you listening yet?"
    - "Run that again. Run it the same way. I want to see if they figured it out."

  negative_generic:
    - "I CAN'T BELIEVE THIS!"
    - "{name} throws their helmet at the bench."
    - "ARE YOU KIDDING ME?!"
    - "RUN IT BACK. I WANT IT AGAIN!"
    - "{name} kicks the gatorade cooler."
    - "WE HAD THAT! WE HAD IT!"
    - "{name} screams into a towel on the bench."
    - "WHAT IS HAPPENING?!"
    - "NO. NO. NO."
    - "{name} refuses to come off the field, has to be jogged back by a coach."
    - "I'M GONNA LOSE MY MIND!"
    - "UNBELIEVABLE!"
    - "{name} kicks their own helmet down the sideline."
    - "{name} headbutts the gatorade table."
    - "DOES ANYONE WANT TO PLAY FOOTBALL?!"
    - "WHO TAUGHT YOU TO PLAY?!"
    - "{name} kicks a Gatorade cooler so hard it explodes. The sideline looks like a crime scene."
    - "{name} is arguing with a sideline marker. The marker is inanimate. {name} does not care."
    - "{name} flips a folding chair. Then another one."
    - "{name} headbutts the bench. The bench loses."
    - "{name} rips their gloves off and throws them in different directions. Both hit a coach."
    - "{name} storms to the sideline. A path clears. People have learned."
    - "{name} rips a sleeve off their own jersey."
    - "{name} starts pacing. The pacing has a rhythm. The rhythm is escalating."
    - "{name} screams something at a teammate who had nothing to do with the play. The teammate accepts it."
