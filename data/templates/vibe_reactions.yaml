    - "{name} writes the word 'good' on their wristband, then replaces the wristband."
    - "{name}'s heart rate, per the trainers, has not exceeded 62."
    - "{name} hands the ball to the ref like they're returning a library book."
    - "{name} jogs to the bench and sits in silence."
    - "{name} taps a teammate's shoulder pad on the way past."
    - "{name} folds their arms on the bench and just watches."
    - "{name} retightens their wristband and returns to the huddle."
    - "{name} cracks their knuckles one at a time."
    - "..."
