    - "Cocktail napkins have been found, signed by {name}, that {name} does not remember signing."
    - "{name} once asked the team trainer for a martini, and had to be reminded that the training staff are not bartenders."
    - "I keep a small villa on a coast you have not heard of, for occasions when I require a coast."
    - "I do not own a wallet, as my name is sufficient at most establishments worth attending."
    - "I drink a particular vintage that is no longer produced, due to a small international incident."
    - "I once sat on the board of a company that I am told was entirely fictional. I made money regardless."
    - "I have a chef, a driver, a fencing instructor, and a person who simply listens. Each is essential."
    - "I do not check my own mail. The mail finds its way."
    - "I speak six languages, and I am charming in all of them."
    - "I have, on several occasions, been mistaken for royalty. I have not corrected anyone, as it would have spoiled the evening."

lively:
  # Joy, fun, communal hype. Outward energy directed at fans, teammates,
  # and the crowd. Hype-man / cheerleader. Inspired by Magic Johnson /
  # Charles Barkley big-personality energy — host of every dinner,
  # candid, loud, takes a bet on anything. Where fiery is controlled
  # rage, lively is infectious joy. Both can be loud, but lively's
  # vocabulary is WOOO / ATTABOY / hug / high-five / clap; fiery's
  # vocabulary is scream / headbutt / pound / TASTE IT.
  mood_names: [Flat, Buzzing, Hyped, Electric, Unleashed]

  positive_generic:
    - "Y'all see that?!"
    - "{name} jumps up off the turf, points at the crowd."
    - "WOOOO!"
    - "WHAT a play!"
    - "{name} runs to their teammates, pumping their arms."
    - "Hahaha YES."
    - "{name} slaps the helmet of every offensive lineman before peeling away."
    - "C'MON now!"
    - "I love this game!"
    - "{name} mouths 'I LOVE YOU' to a fan in the front row."
    - "That was FUN."
    - "{name} does a cartwheel. One perfect cartwheel. Beautiful..."
    - "{name} mimes a phone call to no one."
    - "{name} hugs every member of the offensive line for an uncomfortably long time."
    - "OOOH baby!"
    - "I FELT that one!"
    - "Y'all hear that?! Y'all HEAR that?!"
    - "We're feeling it now!"
    - "Y'all on your feet?! Y'ALL ON YOUR FEET?!"
    - "{name} runs along the sideline high-fiving every fan in the front row."
    - "{name} leads the bench in a chant they invent on the spot."
    - "{name} jogs back doing a little shoulder-shimmy dance."
    - "{name} jumps onto a teammate's back, both arms in the air."
    - "{name} claps over their head until the entire bench is clapping with them."
    - "{name} runs the sideline waving everyone to their feet."
    - "{name} pulls a teammate into a chest-bump, then a hug, then another chest-bump."
    - "{name} jumps up and down clapping like they just won a raffle."
    - "{name} cups a hand to their ear at the crowd, gets a roar back."
    - "{name} runs to the bench arms wide, sweeping everyone into the celebration."
    - "HEY HEY HEY!"
    - "{name} dances across the field giving high fives that audibly slap."
    - "{name} grabs the camera lens and shouts directly into it."
    - "Y'all I love this game. I love this game so much."

  negative_generic:
    - "Aw shoot."
    - "{name} smacks their hands together, looks up at the sky."
    - "We HAD that!"
    - "Aw, no no no!"
    - "{name} stomps once, shakes it off, jogs back."
    - "C'mon, we gotta finish those!"
    - "{name} claps loud, waves their teammates back to the huddle."
    - "Heartbreaker, man!"
    - "Bring it back, BRING IT BACK!"
    - "{name} laughs in disbelief."
    - "We DID NOT just do that."
    - "{name} throws their head back, hands on their hips, then laughs."
    - "{name} grabs their head with both hands."
    - "{name} sits down on the turf for a second to process."
    - "C'mon now, we GOTTA have that!"
    - "Tighten UP! Tighten UP!"
    - "We need ONE play! Just one!"
    - "Aw, c'mon, we're RIGHT there!"
    - "Heads UP, heads UP!"
    - "Long way to go! Long way to GO!"
    - "That's not US! That is NOT us!"
    - "Big breath, big breath. Next play."
    - "{name} pulls a teammate up off the ground and slaps their helmet twice."
    - "{name} runs back to the huddle clapping, won't let anyone hang their head."
    - "{name} grabs a teammate's facemask, locks eyes, says something fast."
    - "{name} stomps the turf once, claps loud, jogs back yelling encouragement."
    - "{name} runs along the bench slapping pads, getting everyone back on their feet."
    - "{name} laughs, shakes it off with a sharp clap of the hands."
    - "{name} shakes their head, smiles, claps it out."
    - "That was just terrible. From me, from all of us."
    - "{name} laughs once, claps their hands, walks back to the huddle."
    - "Hey, I can't make every play. I make most of them. Just not every one."
    - "Coach, we're alright. We are alright."

  scored_td:
    - "{name} spikes the ball, runs back pointing at the crowd."
    - "{name} dances briefly, gets pulled into a teammate hug."
    - "{name} runs the long way back to the bench, high-fiving every fan in arm's reach."
    - "{name} hurls the ball into the upper deck, screams 'YEEEAH!'"
    - "TOUCHDOWN, BABY!"

  threw_td:
    - "{name} screams at their receiver, runs the length of the field to celebrate."
    - "MY GUY! MY GUY!"
    - "{name} points at the receiver from 40 yards away."
    - "GO! GO! GO!"
    - "{name} celebrates the catch by hugging every offensive lineman."

  made_fg:
    - "{name} pumps both fists, jogs back to the bench grinning."
    - "{name} hugs their holder."
    - "Expect anything different?!"
    - "THREE! WE'LL TAKE IT!"
    - "{name} chest-bumps every member of the special teams unit."

  missed_fg:
    - "{name} smacks their helmet, laughs in frustration."
    - "Aw, man! Right idea, wrong foot!"
    - "WIDE?! WIDE?!"
    - "AW MAN, WE NEEDED THAT!"
    - "{name} kicks the air, laughs, claps."

  got_sacked:
