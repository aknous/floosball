    - "I don't play catch with children. There's no version of catch with children that ends well for me."
    - "I don't own pets. A pet is something that doesn't care whether you win, and I can't have that energy in my home."

unhinged:
  # Chaotic-weird with no organized framework. Buys a kayak in the
  # desert, deep-fries pumpkins, owns a sword they don't remember
  # acquiring. Cosmic Nic Cage commitment to whatever bit they are
  # currently inside. Distinct from prankster (planned mischief) and
  # paranoid (organized fear).
  mood_names: [Scrambled, Glitching, Tuned In, Possessed, Ascended]

  positive_generic:
    - "I told you I was real."
    - "Mother always said I'd be famous."
    - "and they doubted me."
    - "{name} mouths something into the camera that lipreaders can't agree on."
    - "I knew this would happen. I dreamed it."
    - "Tell the FBI: I'm peaking."
    - "{name} stares into the middle distance for an unsettling amount of time."
    - "engage."
    - "I am the algorithm."
    - "{name} kisses the football, then whispers something to it."
    - "the signs were all there. birds. numbers. the wind."
    - "I'll be on every radio show tonight."
    - "they cannot stop me. they have tried."
    - "the matrix has a glitch and I am the glitch."
    - "I have been preparing my whole life. specifically this."
    - "the simulation glitches when no one is looking. it just glitched."
    - "I see the seams of the field. I see them."
    - "I am awake in here. Most of them are not."
    - "I am starting to do something I shouldn't be able to do."
    - "{name} whispers a secret to the football before handing it to the ref."
    - "{name} traces an elaborate symbol on the turf. A teammate asks what it means. {name} won't say."
    - "{name} gives a thumbs-up to an empty section of the stadium. Holds it there."
    - "{name} bows deeply to the goalpost. The goalpost does not respond."
    - "{name} holds up three fingers. No one knows what it means. {name} won't explain."
    - "{name} closes their eyes and holds their palms up to the sky."
    - "{name} tilts their head at the scoreboard like it just told them something personal."
    - "{name} picks up a handful of turf and lets it fall through their fingers like sand."
    - "{name} walks in a perfect circle three times before returning to the sideline."
    - "{name} clutches the football like a newborn child."
    - "{name} stands at midfield, arms spread, rain falling on their face. It is not raining."
    - "{name} mouths a phone number into the camera. Whose number?."
    - "{name} crouches down and presses one ear to the turf, listening for something."
    - "{name} faces a different cardinal direction every five seconds."
    - "{name} salutes the referee, then the chain gang, then a hot dog vendor in the stands."
    - "{name} stares at the football for a long time before handing it over, as if memorizing it."
    - "{name} screams a single, undefined syllable into the sky."
    - "I HAVE SEEN THE FOOTBALL. I HAVE TASTED IT."
    - "{name} attempts to climb the goalpost, and {name} is gently asked to stop."
    - "{name} pulls a teammate close and whispers something. The teammate now looks haunted."
    - "I felt the bones in my hands agree, which is rare and worth noting."
    - "Good. The shape is right. The shape is finally right, after weeks of being slightly the wrong shape."
    - "A door has opened somewhere, and I am the one who opened it, and we are all on the other side now."
    - "The numbers are climbing in the way they are supposed to climb, which is not always how they climb."

  negative_generic:
    - "{name} stares at the sky for an unsettling amount of time."
    - "the simulation is buggy."
    - "{name} mutters something to themself, eyes wide."
    - "I knew. I knew. I knew."
    - "{name} draws a circle in the turf with their finger."
    - "we have entered the dark forest of football."
    - "{name} laughs at nothing in particular."
    - "{name} performs a small ritual on the turf."
    - "{name} just nods. This was always going to happen. They saw it in a dream."
    - "{name} picks up a blade of grass, smells it, and puts it in their pocket."
    - "{name} stares at their own hands like they belong to someone else."
    - "{name} sits cross-legged on the 40-yard line. A coach asks them to move. They don't."
    - "{name} points at something in the sky. There is nothing in the sky."
    - "{name} closes their eyes on the sideline and begins humming a tune nobody recognizes."
    - "{name} reads the yard marker number out loud and writes it on their wrist."
    - "{name} walks to the bench in a spiral pattern. No one says anything."
    - "{name} examines the laces of the football, frowns, examines them again."
    - "{name} looks at the scoreboard, then at the scoreboard's reflection on a tablet, then at the scoreboard again."
    - "{name} writes a single word on their wristband. The word is not, technically, a word."
    - "{name} demands to know who designed the field. Then who designed the designer...?"
    - "{name} traces a number in the dirt with their toe and immediately scuffs it out."
    - "{name} laughs in a register that is not technically a laugh."
    - "{name} stares at their own hands for ten seconds, then returns to the huddle."
    - "I deserved that. I have been preparing for that. I welcome it."
    - "I would like to file a complaint with the part of the sky that is directly above me, specifically."
    - "The bad shape is back, and I had hoped we were past the bad shape."
    - "There is a name for what just happened. Speaking it gives it more of a hold."

  scored_td:
    - "{name} stares directly into the camera and mouths something concerning."
    - "{name} hands the ball to nobody, just sets it down on the goal line."
    - "this was prophesied."
    - "{name} sets the ball down and bows to it."
    - "I have crossed. The veil is thin tonight."
    - "I went to the place where they keep the points and I took some."
    - "I would like to dedicate this to the small dog I see sometimes, and to the concept of doors."
    - "Six. That is a number I am familiar with. We have met before, in less pleasant circumstances."
    - "The end zone smelled different than I remembered. I will be looking into it."
    - "I crossed the line at the exact moment the second hand passed the seven, which is what I had agreed to."

  threw_td:
    - "{name} points at the receiver, then at the sky, then walks off muttering."
    - "They were where I told them to be. In the dream. The dream."
    - "I projected the catch into their hands. mind to mind."
    - "{name} taps their temple, nods at the receiver from 40 yards away."
    - "I planted the catch in their hand. telepathically."
    - "Six. That is a number I am familiar with. We have met before, in less pleasant circumstances."
    - "The ball traveled the way I asked it to travel, and I would like to thank it privately later."
    - "The receiver was where I had left them, which is not always how it works."
    - "I do not throw the ball so much as suggest a direction to it, and the ball, today, was in a generous mood."
    - "I aimed at a place that does not technically exist, but the ball understood and went there anyway."

  made_fg:
    - "{name} watches it through, then turns and walks off without acknowledging anyone."
    - "the wind obeys me."
    - "{name} kisses their kicking foot."
    - "the upright permitted it. it remembered our agreement."
    - "{name} bows to the goalpost, walks off muttering."

  missed_fg:
    - "{name} stares at the goalposts. The goalposts stare back."
    - "the laces were facing me. an omen."
    - "{name} sniffs the football, frowns deeply."
    - "The ball did not want to go through, and you cannot force a ball that is not ready."
    - "I felt the wrong tone. The wrong tone has been showing up more frequently this season."
    - "There was an absence in the air where the kick was supposed to be, and now we have to live with it."
    - "The geometry was off by a small amount that nobody else can perceive, but I can."

  got_sacked:
    - "{name} lies on the turf laughing for a long time."
    - "{name} pops up suddenly, looking around like they've lost time."
    - "the pocket was a trap. a TRAP."
    - "the field shifted beneath me. it shifted."
    - "{name} sits up suddenly, looks around as if missing time."
    - "I have been hit, and I would like to remain on the ground for a moment, to think about it."

  made_sack:
    - "{name} stands over the QB and whispers something to them."
    - "I knew their cadence. I dreamed it last night."
    - "{name} smells the QB's helmet briefly."
    - "I tasted the snap count."
    - "{name} circles the QB once before walking back."

  threw_int:
    - "{name} watches the defender run, says 'fascinating' to no one."
    - "{name} mouths something at the football as it flies away."
    - "the ball chose them. for now."
    - "The wrong person caught it, which is the kind of thing that happens when the day is not aligned correctly."
    - "The ball went somewhere it was not supposed to go, and the ball will be hearing from me about it."
    - "Someone moved a player from one place to another while I was mid-throw, which is not allowed in my version of the rules."

  made_int:
    - "{name} catches it, looks at the ball like it's communicating with them."
    - "the ball came home. the ball remembers."
    - "we are connected, the ball and I."
    - "it sought me. it always does."
    - "{name} cradles the ball, refuses to give it back for a moment too long."

  fumbled:
    - "{name} stares at their hands like they betrayed them."
    - "the ball was greased. greased."
    - "I held it. I held it. did I hold it?"
    - "the ball rejected me. for now."
    - "{name} stares at the empty space where the ball was."

  recovered_fumble:
    - "{name} cradles the ball, won't let the ref take it for several seconds."
    - "it CHOSE me."
    - "{name} cradles the ball, whispers 'thank you for choosing me' into it."
    - "I called it to me. I called it."
    - "{name} tucks the ball under one arm, whispers something only it can hear."

  sideline:
    - "i can hear the goalpost humming. it's humming a familiar song."
    - "{name} is staring at the lights. the lights are staring back."
    - "i think the field is breathing. just a little."
    - "Do not tell me the score, because I am tracking the game in a different system, which is more accurate."
    - "{name} is mouthing something to a sideline marker. the sideline marker does not respond."
    - "the helmets all have names but i can't say them out loud. don't ask."
    - "{name} is rocking back and forth at the end of the bench, very gently, very fast."
    - "they don't know what i know. they will."
    - "{name} is watching a moth and refuses to break eye contact."
    - "the stadium is a body. i'm an organ. that's how this works."
    - "{name} is laughing very quietly at nothing. it goes on for a while."
    - "The clock is correct, but the time is wrong, and I am the only one who has noticed."
    - "There is a small thing I do between plays. It only works in private."
    - "There is a smell to this stadium that is not present at other stadiums, and I find it reassuring."

  off_day:
    - "{name} adopted a parrot last month, and the parrot now knows the entire play book."
    - "{name} attempted to deep-fry a pumpkin yesterday, and the pumpkin won the encounter outright."
    - "I have been studying the bees in my yard. The bees, ladies and gentlemen, are conducting an investigation of their own."
    - "{name} bought a fossilized ostrich egg from a man on the side of a highway."
    - "I am currently in possession of a sword, and I do not remember how I came to acquire it."
    - "{name} held an open call for an unwritten film they intend to direct, and forty-three people showed up for it."
    - "I do not eat food that is round. To me it's obvious why it's a bad idea, I don't get why you need me to explain it to you."
    - "I keep a calendar that doesn't match the regular calendar, and I have my own holidays, which I observe quietly."
    - "I have a recurring dream in which I am the field, and the field is also me, and we are watching each other."
    - "I don't believe in the number nine, but I will use it when required, under protest."


wholesome:
  # Genuine kindness as a discipline. Bakes for the trainers, calls old
  # coaches, drives rookies to the airport, hugs everybody. Inspired by
  # Ted Lasso / Mr. Rogers. Distinct from knight (formal honor code,
  # not warmth) and lively (communal joy with volume) — wholesome is
  # quiet, sincere warmth.
  mood_names: [Heavy-Hearted, Subdued, Caring, Beaming, Radiant]

  positive_generic:
    - "{name} pulls every teammate within arm's reach into a hug."
    - "I love this team."
    - "I'm just so proud of you all."
    - "{name} thanks every offensive lineman by name as they jog off."
    - "What a moment!"
    - "Couldn't have done it without my team."
    - "{name} kneels and helps an opponent up, smiling."
    - "I'm just grateful to be out here."
    - "{name} points at the entire bench, mouths 'love you all.'"
    - "We did this together. All of us."
