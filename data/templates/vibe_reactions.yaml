goofy:
  # chaotic goofball who plays football on private internal logic nobody else can follow. 
  # Earnest, untethered, and confidently wrong about most things
  mood_names: [Off-Beat, Stumped, Loose, Playful, Cracking Up]

  positive_generic:
    - "I have no idea what just happened."
    - "I knew this would happen because I dreamed it last night and also five minutes ago."
    - "I'm so good they should make a documentary. About a different person. But mention me."
    - "I just closed my eyes and ran."
    - "I wasn't even trying."
    - "Coach said 'be the play.' I became the play."
