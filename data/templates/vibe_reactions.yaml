    - "{name} rips off their gloves and throws them like they're casting aside a former life."
    - "{name} stares at their hands and whispers 'these hands. These cursed hands.'"
    - "{name} drops to their knees, hands skyward, and holds the pose."
    - "This. This is where the chapter turns."
    - "Etch this in the record. Let no one forget what happened here today."
    - "{name} delivers a soliloquy directly to the kicking net, and the net listens."

  scored_td:
    - "{name} crosses the goal line, falls to their knees, raises both arms."
    - "{name} lifts the ball aloft like a relic recovered from war."
    - "{name} trembling, mouths 'they will write of this' to no one."

  threw_td:
    - "{name} sprints down the field arms wide, embraces {receiver} like a battlefield reunion."
    - "{name} watches the catch, kneels, points to the heavens."

  made_fg:
