    - "{name} stares at the spot where the play happened like they're solving a crime."
    - "{name} adjusts their gloves. Then their wristband. Then their gloves again."
    - "{name} folds their towel into a perfect rectangle. Unfolds it and folds it again. Healing."
    - "{name} stares at the turf as if it owes them an explanation."
    - "{name} retightens their chinstrap. This is their entire grief process."
    - "{name} drinks half a bottle of water. Sets it down. The matter is closed."
    - "{name} writes one word on their wristband. Crosses it out. Writes it again."
    - "{name} sits down on the bench. Picks up a towel. Puts it down. Mourning complete."
    - "{name} rolls their neck. Basically a tantrum from {name}."
    - "{name} puts their hands on their hips for exactly one second, then drops them. Composure restored."
    - "{name} picks a blade of grass off their jersey with surgical precision. The crisis has been handled."
    - "{name} pulls their helmet off briefly, wipes their face, replaces it identically."
    - "{name} reties a single cleat in silence."
    - "{name} jogs back at the same pace they always do."
    - "{name} sits at the end of the bench, looks at the playbook."
    - "{name} sits with their helmet between their hands, looking at nothing."
    - "{name} catches a teammate's eye and gives a single shake of the head."
    - "{name} retraces the route on the field with their eyes only."
    - "{name} cracks their neck once on each side. Then they're done."
    - "{name} accepts a water bottle, drinks once, hands it back without a word."
    - "{name} folds the playbook closed, sets it down, stares straight ahead."

  scored_td:
