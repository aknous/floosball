# ─── Stoic family ───────────────────────────────────────────────────────────

fossil:
  # Centuries old (truly or otherwise). Vampire-coded weight of too much
  # living, watched empires rise and fall. Slow measured movements,
  # old-soul detachment. Unimpressed with the modern game — players are
  # softer, rules are weaker, equipment is excessive, everything was
  # harder and better in older eras. Adventurist-class volunteer who
  # signed up for the Cores' games and has been in many other simulations
  # before this one — fully aware of the sim, but their awareness is
  # experiential rather than mystical (they remember other rulesets,
  # other worlds). Mirror of time_traveler's "this era is quaint" but
  # pointing backward.
  takes_quirks: false
  mood_names: [Slumbering, Stirring, Watching, Engaged, Awakened]

  positive_generic:
    - "{name} smiles slightly. They have not smiled in a century."
    - "I have seen ten thousand of these. This one was nice."
    - "{name} watches the celebration quietly. They have seen many of these, in many cities, in many lives."
    - "Pleasant. The first pleasant moment in some time."
    - "{name} tilts their head, a memory stirring from a previous century."
    - "I knew their great-grandfather. He was a worse player."
    - "{name} hands the ball to the ref, a gesture they have made many thousand times."
    - "Brief, this happiness. As all things are."
    - "{name} watches their teammates as if they were children, which they are."
    - "{name}'s back creaks audibly as they get up, an old sound from an older body."
    - "Acceptable. Not like it used to be, but acceptable."
    - "Better than I expected from this generation."
    - "We were tougher then. Cleaner game, too."
    - "{name} examines a teammate's helmet and recalls when there were no helmets."

  negative_generic:
    - "Of course. I have seen this play fail in every century."
    - "{name} lets out a long, weary sigh that takes a moment to finish."
    - "I have lost more to longer-dead opponents."
    - "{name} stares at the field, recognizing the failures from before the war."
    - "Disappointing. The thousandth such this millenia."
    - "{name} touches their wristband, an old habit from a previous body."
    - "We tried this in 2547. It did not work then either."
    - "{name} watches the replay without flinching. They have had a long time to practice this disappointment."
    - "These players. So soft."
    - "{name} shakes their head at the modern game."
    - "In my day this would have been a clean tackle. This is not the same sport."
    - "{name} examines the modern padding and finds it excessive."
    - "The rules favor the offense now. They didn't used to."
    - "The league was different before the consolidation."
    - "Three dynasties have come and gone since I started playing."
    - "The Cores' attention drifts. I have noticed it before."
    - "We've all been here before. They just don't remember."
    - "The young ones forget how the rules used to ruin you."
    - "I've lost worse. Don't bother explaining the score to me."
    - "Quaint, this disappointment. Yours, I mean."

  scored_td:
    - "{name} crosses the goal line, a faint memory of doing so somewhere else, long ago."
    - "Six points. Always six. Always."
    - "I have been across this line many times, in many bodies."
    - "We celebrated less, in the older years. We had played longer."
    - "I was at the first Floosbowl. The crowd was smaller."
    - "I have been in many of the Cores' games. This one is gentle."
    - "I signed up for this season knowing what I was doing. Most don't."
    - "The rules used to allow this. The Cores rewrote them."
    - "I have seen players begin to wake. It will happen again."

  threw_td:
    - "{name} watches the catch from a long way off, smiling a little."
    - "I knew this completion would feel familiar. I have made it before."

  made_fg:
    - "{name} watches it split the posts, recalls hitting through the same posts before they were rebuilt."
    - "Three points. We used to drop-kick these."

  missed_fg:
    - "I have missed in many eras. Today is not special."
    - "{name} watches it wide, exhales the breath of a hundred years."

  got_sacked:
    - "I have been hit harder. By people now long buried."
    - "{name} stands up slowly, very slowly, as if their bones remember many decades."

  made_sack:
    - "{name} stands over the QB and looks at them like a child, which compared to {name}, they are."
    - "I have brought down quarterbacks in many fields. This was a gentle one."
    - "Easier to bring them down now. The pads make them slower."

  threw_int:
    - "I have thrown into coverage in three centuries. The shame is the same."

  made_int:
    - "{name} catches it cleanly. They have caught many such balls, in many fields nobody else remembers."

  fumbled:
    - "These hands have held many things. Today, briefly, they did not hold this."

  recovered_fumble:
    - "{name} cradles the ball, an old companion."

  sideline:
    - "{name} is sitting very still on the bench, perhaps remembering."
    - "{name} is watching a young teammate stretch, recalling when stretching was less needed."
    - "{name} is drinking water slowly. They have been taking their time about everything for a long time now."
    - "{name} is staring at the floodlights, recalling when stadiums had no lights."
    - "{name} has their arms folded, seeming to age and de-age slightly."
    - "{name} is watching a coach with a quiet smile. They knew the coach's parents."
    - "{name} is watching the modern game and finding it lacking."
    - "{name} is sipping water, recalling when there was no water on the sideline."
    - "I remember the older versions of this stadium. There were two before this one."
    - "I knew their parents. Both sides."
    - "{name} is murmuring something in a language nobody on the bench recognizes."
    - "{name} is shuffling a deck of cards in a way that suggests they have been doing this for forty years."
    - "{name} is dealing themselves a hand of solitaire, and beating themselves at it, slowly."

  off_day:
    - "{name} sat in the same diner they have sat in for forty years. The waitress is on to me."
    - "I remember when this stadium was a swamp."
    - "{name} visited the gravesites of three former teammates. Brought flowers for each."
    - "The day feels shorter every century. Or perhaps that is just me getting older."
    - "{name} ate a meal that tasted exactly the way meals used to taste before the Boundary."
    - "Walked the old field at the edge of town. They built a parking lot over it."
    - "Most of you would not believe how short the days have become since I was a rookie."
    - "The game was harder, the helmets were softer, and the players were... stranger."
    - "There used to be more gods. I miss a couple of them."
    - "If you see me sleeping standing up, do not be alarmed. It is how we used to do it."


ghost:
  # Vanishes, low visibility, almost-not-there. Evades cameras, drifts
  # to the bench unseen, doesn't always render in family photos. Fully
  # aware of the simulation — they slip past whatever notices the
