app = "floosball-api"
primary_region = "ord"

[build]

[env]
  PORT = "8080"
  DATABASE_DIR = "/data"
  TIMING_MODE = "scheduled"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "floosball_data"
  destination = "/data"
