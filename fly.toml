app = "floosball-api"
primary_region = "ord"

[build]

[env]
  PORT = "8080"
  DATABASE_DIR = "/data"
  TIMING_MODE = "scheduled"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    type = "http"
    port = 8080
    path = "/api/season"
    interval = "15s"
    timeout = "10s"
    grace_period = "60s"

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "1gb"
  cpu_kind = "performance"
  cpus = 1

[mounts]
  source = "floosball_data"
  destination = "/data"
