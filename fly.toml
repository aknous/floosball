app = "floosball-api"
primary_region = "ord"

[build]

[env]
  PORT = "8080"
  DATABASE_DIR = "/data"
  TIMING_MODE = "scheduled"
  # Keep fewer backups: the DB is ~90M and grows each season, so the default 7
  # (~630M) overran the 974M volume. 3 leaves ample headroom and 3 recovery points.
  BACKUP_KEEP = "3"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    type = "http"
    port = 8080
    path = "/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "2gb"
  cpu_kind = "performance"
  cpus = 1

[mounts]
  source = "floosball_data"
  destination = "/data"
